<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER ITALIAN BROS</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Share Tech Mono',monospace; overflow:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px);
    pointer-events:none; z-index:10;
  }
  #hud {
    display:flex; justify-content:space-between; align-items:flex-end;
    width:800px; margin-bottom:8px; padding:0 4px;
  }
  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-block.right { align-items:flex-end; }
  .hud-label { font-size:10px; letter-spacing:5px; color:rgba(0,255,255,0.4); text-transform:uppercase; }
  .hud-value { font-size:28px; color:#fff; text-shadow:0 0 15px #0ff,0 0 35px #0ff; letter-spacing:3px; }
  #lives-row { display:flex; gap:6px; align-items:center; margin-top:2px; }
  #game-wrapper { position:relative; }
  canvas {
    display:block;
    border:1px solid rgba(0,255,255,0.2);
    box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04);
    border-radius:2px;
  }
  #overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.88); text-align:center; gap:10px;
  }
  #overlay h1 {
    font-size:42px; color:#fff;
    text-shadow:0 0 20px #0ff,0 0 60px #0ff;
    letter-spacing:6px; text-transform:uppercase;
  }
  #overlay h1 span { color:#ff3366; text-shadow:0 0 20px #ff3366,0 0 60px #ff3366; }
  .ov-detail { font-size:12px; color:#0ff; opacity:0.6; letter-spacing:4px; }
  .ov-sub { font-size:13px; color:#0ff; opacity:0.65; letter-spacing:5px; animation:blink 1.2s step-start infinite; margin-top:8px; }
  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:0} }
  #controls { margin-top:10px; font-size:11px; color:rgba(0,255,255,0.3); letter-spacing:3px; text-align:center; line-height:2; }

  #leon-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
  #leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}


  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(800px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 1.6667)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>
<div id="hud">
  <div class="hud-block"><span class="hud-label">Score</span><span class="hud-value" id="score-el">0</span></div>
  <div class="hud-block"><span class="hud-label">Coins</span><span class="hud-value" id="coins-el">0</span></div>
  <div class="hud-block right"><span class="hud-label">Lives</span><div id="lives-row"></div></div>
</div>
<div id="game-wrapper">
  <canvas id="c" width="800" height="480"></canvas>
  <div id="overlay">
    <h1>SUPER <span>ITALIAN</span> BROS</h1>
    <div class="ov-detail">← → to run &nbsp;·&nbsp; Z or ↑ to jump &nbsp;·&nbsp; stomp enemies to defeat them</div>
    <div class="ov-detail" style="color:#ffff00;opacity:0.7">Reach the flag to complete the level!</div>
    <div class="ov-sub" id="ov-sub">Press SPACE to start</div>
  </div>
</div>
<div id="controls">← → &nbsp;·&nbsp; Run &nbsp;&nbsp;|&nbsp;&nbsp; Z / ↑ / W &nbsp;·&nbsp; Jump &nbsp;&nbsp;|&nbsp;&nbsp; P &nbsp;·&nbsp; Pause</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = canvas.width, CH = canvas.height;
const TAU = Math.PI * 2;
const T = 32; // tile size

// ── COLOURS ───────────────────────────────────────────────────────────────────
const COL = {
  sky:     '#0a0a2e',
  ground:  '#1a5c1a',
  brick:   '#8B4513',
  brickHL: '#c46a2a',
  qblock:  '#cc9900',
  qblockHL:'#ffcc00',
  pipe:    '#007700',
  pipeHL:  '#00aa00',
  coin:    '#ffdd00',
  flag:    '#00ffcc',
  mario:   '#ff3333',
  marioH:  '#ffaaaa',
  goomba:  '#cc6600',
  goombaD: '#994400',
  cloud:   'rgba(200,220,255,0.15)',
  hill:    'rgba(0,180,80,0.18)',
};

// ── LEVEL DATA ────────────────────────────────────────────────────────────────
// Tile types: 0=empty 1=ground 2=brick 3=?-block 4=pipe-bot 5=pipe-top 6=solid 7=coin-block(used)
// Level is 160 tiles wide, 15 tiles tall
// Row 0 = top, Row 14 = bottom ground
const LW = 160, LH = 15;
const GROUND_ROW = 13;

function makeLevelMap() {
  const m = [];
  for (let r=0;r<LH;r++) { m.push([]); for(let c=0;c<LW;c++) m[r].push(0); }

  // Ground
  for (let c=0;c<LW;c++) {
    if (c>=38&&c<=41) continue; // gap 1
    if (c>=80&&c<=82) continue; // gap 2
    if (c>=110&&c<=112) continue; // gap 3
    m[GROUND_ROW][c]=1; m[GROUND_ROW+1][c]=1;
  }

  // Platforms / bricks / q-blocks (col, row)
  const bricks = [
    // first section
    [16,10],[17,10],[18,10],
    [20,8],[21,8],[22,8],[21,6],
    [25,10],[26,10],
    // ?-blocks
    [17,7],[21,7],[23,7],
    // after first gap
    [45,10],[46,10],[47,10],[48,10],
    [50,8],[51,8],[52,8],
    [50,7], // ?-block row 7
    // pipes section
    [57,12],[57,11],   // pipe h=2
    [63,12],[63,11],[63,10], // pipe h=3
    [70,12],[70,11],[70,10],[70,9], // pipe h=4
    // staircase up
    [90,12],[91,12],[92,12],[93,12],[94,12],
    [91,11],[92,11],[93,11],[94,11],
    [92,10],[93,10],[94,10],
    [93,9],[94,9],
    [94,8],
    // blocks above
    [85,8],[86,8],[87,8],[88,8],
    [85,7], // ?-block
    // middle section
    [100,10],[101,10],[102,10],
    [104,8],[105,8],
    [107,9],[108,9],[109,9],
    // final run
    [120,10],[121,10],[122,10],[123,10],
    [125,8],[126,8],[127,8],
    [130,6],[131,6],[132,6],[133,6],[134,6],
    [130,5],[131,5],
  ];

  const qblocks = [[17,7],[21,7],[23,7],[50,7],[85,7],[105,9],[126,8]];
  const qSet = new Set(qblocks.map(([c,r])=>c+','+r));

  bricks.forEach(([c,r])=>{
    if (!qSet.has(c+','+r)) m[r][c]=2;
  });
  qblocks.forEach(([c,r])=>m[r][c]=3);

  // Pipes (top tile = 5, bot tile = 4) — already placed above via coords
  [[57,11],[57,12],[63,10],[63,11],[63,12],[70,9],[70,10],[70,11],[70,12]].forEach(([c,r])=>{
    m[r][c] = r===Math.min(...[[57,11],[57,12],[63,10],[63,11],[63,12],[70,9],[70,10],[70,11],[70,12]].filter(([cc])=>cc===c).map(([,rr])=>rr)) ? 5 : 4;
  });
  // Set pipes properly
  // pipe at col 57: rows 11(top),12(bot)
  m[11][57]=5; m[12][57]=4;
  // pipe at col 63: rows 10(top),11,12
  m[10][63]=5; m[11][63]=4; m[12][63]=4;
  // pipe at col 70: rows 9(top),10,11,12
  m[9][70]=5; m[10][70]=4; m[11][70]=4; m[12][70]=4;

  // Solid staircase blocks
  [[90,12],[91,12],[92,12],[93,12],[94,12],
   [91,11],[92,11],[93,11],[94,11],
   [92,10],[93,10],[94,10],
   [93,9],[94,9],[94,8]].forEach(([c,r])=>m[r][c]=6);

  // Flag pole at col 150
  for (let r=3;r<=GROUND_ROW;r++) m[r][150]=6;

  return m;
}

const LEVEL = makeLevelMap();

// Goombas starting positions [col, row-above-ground]
const GOOMBA_SPAWN = [
  {col:35,row:GROUND_ROW-1},{col:38,row:GROUND_ROW-1},
  {col:55,row:GROUND_ROW-1},
  {col:72,row:GROUND_ROW-1},{col:75,row:GROUND_ROW-1},
  {col:95,row:GROUND_ROW-1},
  {col:108,row:GROUND_ROW-1},{col:111,row:GROUND_ROW-1},
  {col:128,row:GROUND_ROW-1},{col:131,row:GROUND_ROW-1},
  {col:138,row:10},{col:141,row:10},
];

// Coins
const COIN_SPAWN = [
  {col:16,row:8},{col:18,row:8},{col:25,row:9},{col:26,row:9},
  {col:46,row:7},{col:47,row:7},{col:48,row:7},
  {col:87,row:6},{col:88,row:6},
  {col:100,row:8},{col:102,row:8},
  {col:121,row:8},{col:122,row:8},{col:123,row:8},
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let gameState='idle', score=0, lives=3, coinCount=0;
let camX=0;
let particles=[], floaters=[], coinAnims=[];
let tick=0;
let firePressed=false;
const KEYS={};

let player, goombas, coins, flagReached;

function initGame(){
  score=0; lives=3; coinCount=0;
  initLevel();
}

function initLevel(){
  camX=0; particles=[]; floaters=[]; coinAnims=[]; flagReached=false;
  player={
    x:3*T, y:(GROUND_ROW-1)*T,
    w:28, h:32,
    vx:0, vy:0,
    onGround:false,
    facingRight:true,
    running:false,
    jumpTimer:0,
    dead:false,
    deadTimer:0,
    big:false,
    invincTimer:0,
    walkFrame:0, walkTimer:0,
    celebrating:false,
  };
  goombas = GOOMBA_SPAWN.map(g=>({
    x:g.col*T, y:g.row*T,
    w:28,h:28,
    vx:-0.4, vy:0,
    alive:true, dead:false, deadTimer:0,
    onGround:false,
    walkFrame:0, walkTimer:0,
  }));
  coins = COIN_SPAWN.map(c=>({x:c.col*T+8,y:c.row*T+8,w:16,h:16,collected:false,animY:0}));
  updateHUD();
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(KEYS[e.key]) return;
  KEYS[e.key]=true;
  if(e.key===' '){
    e.preventDefault();
    if(gameState==='idle'||gameState==='gameover') { gameState='playing'; initGame(); hideOverlay(); }
    else if(gameState==='dead') { gameState='playing'; initLevel(); hideOverlay(); }
    else if(gameState==='win') { gameState='playing'; initGame(); hideOverlay(); }
  }
  if(e.key==='p'||e.key==='P'){
    if(gameState==='playing') gameState='paused';
    else if(gameState==='paused') gameState='playing';
  }
});
document.addEventListener('keyup',e=>{ KEYS[e.key]=false; });

// ── TILE HELPERS ──────────────────────────────────────────────────────────────
function tileAt(col,row){
  if(col<0||col>=LW||row<0||row>=LH) return 0;
  return LEVEL[row]?.[col]??0;
}
function isSolid(col,row){
  const t=tileAt(col,row);
  return t===1||t===2||t===3||t===4||t===5||t===6||t===7;
}
function inGap(col){ return (col>=38&&col<=41)||(col>=80&&col<=82)||(col>=110&&col<=112); }

// ── PHYSICS ───────────────────────────────────────────────────────────────────
const GRAVITY=0.55, JUMP_FORCE=-12.8, MAX_FALL=14, RUN_SPD=4.2, FRICTION=0.82;

function applyPhysics(e, canJump, jumpPressed){
  e.vy = Math.min(e.vy + GRAVITY, MAX_FALL);
  e.onGround = false;

  // Horizontal
  e.x += e.vx;
  // Clamp to level bounds
  if(e.x < 0) { e.x=0; e.vx=0; }
  if(e.x + e.w > LW*T) { e.x=LW*T-e.w; e.vx=0; }

  const rowTop = Math.floor((e.y + 2) / T);
  const rowBot = Math.floor((e.y + e.h - 2) / T);

  if(e.vx > 0){
    const col1 = Math.floor((e.x + e.w - 1) / T);
    if(isSolid(col1, rowTop) || isSolid(col1, rowBot)){
      e.x = col1*T - e.w; e.vx = 0;
    }
  }
  if(e.vx < 0){
    const col0 = Math.floor(e.x / T);
    if(isSolid(col0, rowTop) || isSolid(col0, rowBot)){
      e.x = (col0+1)*T; e.vx = 0;
    }
  }

  // Vertical
  e.y += e.vy;
  const col0b = Math.floor((e.x + 2) / T);
  const col1b = Math.floor((e.x + e.w - 2) / T);
  const rowBotNew = Math.floor((e.y + e.h - 1) / T);
  const rowTopNew = Math.floor(e.y / T);

  if(e.vy > 0 && (isSolid(col0b, rowBotNew) || isSolid(col1b, rowBotNew))){
    e.y = rowBotNew*T - e.h; e.vy = 0; e.onGround = true;
  }
  if(e.vy < 0 && (isSolid(col0b, rowTopNew) || isSolid(col1b, rowTopNew))){
    if(canJump) hitBlockFromBelow(col0b, rowTopNew) || hitBlockFromBelow(col1b, rowTopNew);
    e.y = (rowTopNew+1)*T; e.vy = 0;
  }

  // Pit death — trigger as soon as they drop below the ground level
  if(e.y > CH + 32){
    if(e === player){ playerDie(); }
    else { e.alive = false; }
  }
}

function hitBlockFromBelow(col,row){
  const t=tileAt(col,row);
  if(t===2){
    // Smash brick
    LEVEL[row][col]=0;
    spawnBrickParticles(col*T+T/2, row*T+T/2);
    score+=50; updateHUD();
    return true;
  }
  if(t===3){
    // ? block — give coin
    LEVEL[row][col]=7;
    coinCount++; score+=200; updateHUD();
    coinAnims.push({x:col*T+T/2,y:row*T,life:1});
    addFloater(col*T+T/2,row*T,'200');
    return true;
  }
  return false;
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(){
  if(gameState!=='playing') return;
  tick++;

  // Player
  if(!player.dead && !player.celebrating){
    // Horizontal input
    const left = KEYS['ArrowLeft']||KEYS['a']||KEYS['A'];
    const right= KEYS['ArrowRight']||KEYS['d']||KEYS['D'];
    const jump = KEYS['ArrowUp']||KEYS['z']||KEYS['Z']||KEYS['w']||KEYS['W'];

    if(right){ player.vx = Math.min(player.vx+0.8, RUN_SPD); player.facingRight=true; player.running=true; }
    else if(left){ player.vx = Math.max(player.vx-0.8, -RUN_SPD); player.facingRight=false; player.running=true; }
    else { player.vx *= FRICTION; player.running=false; if(Math.abs(player.vx)<0.1) player.vx=0; }

    if(jump && player.onGround){ player.vy=JUMP_FORCE; player.onGround=false; }

    applyPhysics(player, true, jump);

    // Pit death — when player falls to bottom of screen
    if(!player.dead && player.y > CH){ playerDie(); return; }

    // Camera
    const targetCam = player.x - CW/3;
    camX = Math.max(0, Math.min(targetCam, (LW*T)-CW));

    // Walk animation
    player.walkTimer++;
    if(player.walkTimer>7){ player.walkFrame=(player.walkFrame+1)%3; player.walkTimer=0; }

    // Invincibility
    if(player.invincTimer>0) player.invincTimer--;

    // Collect coins
    coins.forEach(c=>{
      if(c.collected) return;
      if(Math.abs(player.x+player.w/2 - c.x)<18 && Math.abs(player.y+player.h/2 - c.y)<18){
        c.collected=true; coinCount++; score+=100; updateHUD();
        addFloater(c.x,c.y,'100');
        spawnParticles(c.x,c.y,'#ffdd00',8);
      }
    });

    // Flag
    if(!flagReached && player.x+player.w > 150*T && player.x < 151*T){
      flagReached=true; player.celebrating=true;
      score += 5000; updateHUD();
      addFloater(150*T+T/2, (GROUND_ROW-3)*T, '5000');
      setTimeout(()=>{
        gameState='win';
        showOverlay('LEVEL CLEAR!','Score: '+score,'Press SPACE to play again');
      }, 2500);
    }

    // vs goombas
    if(player.invincTimer===0){
      goombas.forEach(g=>{
        if(!g.alive||g.dead) return;
        if(rectsOverlap(player.x,player.y,player.w,player.h,g.x,g.y,g.w,g.h)){
          // Stomp?
          if(player.vy>0 && player.y+player.h < g.y+g.h*0.55){
            g.dead=true; g.deadTimer=30; score+=200; updateHUD();
            addFloater(g.x+g.w/2,g.y,'200');
            spawnParticles(g.x+g.w/2,g.y+g.h/2,'#cc6600',8);
            player.vy=-7;
          } else {
            playerDie();
            player.invincTimer = 60;
          }
        }
      });
    }
  } else if(player.dead){
    player.deadTimer--;
    player.vy += GRAVITY;
    player.y += player.vy;
    if(player.deadTimer<=0){
      lives--;
      if(lives<=0){
        gameState='gameover';
        showOverlay('GAME OVER','Score: '+score,'Press SPACE to try again');
      } else {
        gameState='dead';
        showOverlay('OH MAMMA MIA!',lives+(lives===1?' life':' lives')+' remaining','Press SPACE to continue');
      }
      updateHUD();
    }
  } else if(player.celebrating){
    // Slide down flag
    player.vx=1.5; player.vy=2;
    player.x+=player.vx;
    if(player.y < (GROUND_ROW-1)*T) player.y+=player.vy;
  }

  // Goombas
  goombas.forEach(g=>{
    if(!g.alive) return;
    if(g.dead){ g.deadTimer--; if(g.deadTimer<=0) g.alive=false; return; }
    // Only activate when player is within 16 tiles
    const playerDist = Math.abs((player.x + player.w/2) - (g.x + g.w/2));
    if(playerDist > 16*T) return;
    applyPhysics(g, false, false);
    if(g.vx===0) g.vx = g.vx<=0?0.4:-0.4; // reverse if blocked by wall
    // Reverse at edges
    const col=Math.floor((g.x+(g.vx>0?g.w:0))/T);
    const rowBelow=Math.floor((g.y+g.h+2)/T);
    if(tileAt(col,rowBelow)===0 && g.onGround) g.vx*=-1;
    g.walkTimer++; if(g.walkTimer>10){g.walkFrame=1-g.walkFrame;g.walkTimer=0;}
  });

  // Coin anims
  coinAnims.forEach(c=>{ c.y-=2; c.life-=0.04; });
  coinAnims=coinAnims.filter(c=>c.life>0);

  updateParticles(); updateFloaters();
}

function playerDie(){
  if(player.invincTimer>0||player.dead) return;
  player.dead=true; player.deadTimer=80; player.vy=-10;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff3333',16);
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,color,life:1,decay:0.03+Math.random()*0.03,size:2+Math.random()*3});
  }
}
function spawnBrickParticles(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*TAU,s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,color:'#8B4513',life:1,decay:0.02,size:3+Math.random()*4});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;});
}
function addFloater(x,y,val){ floaters.push({x,y,val,life:1}); }
function updateFloaters(){ floaters=floaters.filter(f=>f.life>0); floaters.forEach(f=>{f.y-=0.8;f.life-=0.022;}); }

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-el').textContent=score;
  document.getElementById('coins-el').textContent=coinCount;
  const lr=document.getElementById('lives-row'); lr.innerHTML='';
  for(let i=0;i<lives;i++){
    const d=document.createElement('div');
    d.style.cssText='width:16px;height:16px;background:#ff3333;border-radius:50% 50% 40% 40%;box-shadow:0 0 8px #ff3333;position:relative;';
    // Hat shape
    const hat=document.createElement('div');
    hat.style.cssText='position:absolute;top:-6px;left:2px;width:12px;height:6px;background:#ff3333;border-radius:2px 2px 0 0;';
    d.appendChild(hat);
    lr.appendChild(d);
  }
}

// ── DRAW FUNCTIONS ────────────────────────────────────────────────────────────
function drawTile(col, row){
  const t = LEVEL[row]?.[col]; if(!t) return;
  const x = col*T - camX, y = row*T;

  if(t===1){
    // Ground
    ctx.fillStyle=COL.ground;
    ctx.shadowColor='#00ff44'; ctx.shadowBlur=4;
    ctx.fillRect(x,y,T,T);
    ctx.strokeStyle='rgba(0,255,68,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(x+1,y+1,T-2,T-2);
    ctx.shadowBlur=0;
  } else if(t===2){
    // Brick
    ctx.fillStyle=COL.brick;
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=3;
    ctx.fillRect(x,y,T,T);
    ctx.fillStyle=COL.brickHL;
    // brick pattern
    const half=tick%2===0; // subtle shimmer
    ctx.fillRect(x+1,y+1,T/2-2,T/2-2);
    ctx.fillRect(x+T/2+1,y+T/2+1,T/2-2,T/2-2);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(x,y,T,T);
    ctx.shadowBlur=0;
  } else if(t===3){
    // ? block — glowing gold
    const pulse=0.85+Math.sin(tick*0.12)*0.15;
    ctx.fillStyle=COL.qblock;
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=12*pulse;
    ctx.fillRect(x,y,T,T);
    ctx.fillStyle=COL.qblockHL;
    ctx.font='bold 18px Share Tech Mono'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?',x+T/2,y+T/2+1);
    ctx.strokeStyle='rgba(255,200,0,0.5)'; ctx.lineWidth=1.5;
    ctx.strokeRect(x+2,y+2,T-4,T-4);
    ctx.shadowBlur=0;
  } else if(t===7){
    // Used block
    ctx.fillStyle='#555'; ctx.fillRect(x,y,T,T);
    ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(x,y,T,T);
  } else if(t===4){
    // Pipe body
    ctx.fillStyle=COL.pipe;
    ctx.shadowColor='#00ff00'; ctx.shadowBlur=6;
    ctx.fillRect(x+2,y,T-4,T);
    ctx.fillStyle=COL.pipeHL;
    ctx.fillRect(x+4,y,6,T);
    ctx.shadowBlur=0;
  } else if(t===5){
    // Pipe top
    ctx.fillStyle=COL.pipe;
    ctx.shadowColor='#00ff00'; ctx.shadowBlur=8;
    ctx.fillRect(x,y+2,T,T-2);
    ctx.fillStyle=COL.pipeHL;
    ctx.fillRect(x+3,y+4,8,T-4);
    ctx.strokeStyle='rgba(0,255,0,0.3)'; ctx.lineWidth=1.5;
    ctx.strokeRect(x+1,y+2,T-2,T-3);
    ctx.shadowBlur=0;
  } else if(t===6){
    // Solid / flag pole
    ctx.fillStyle='#888';
    ctx.shadowColor='#aaa'; ctx.shadowBlur=4;
    ctx.fillRect(x+T/2-3,y,6,T);
    ctx.shadowBlur=0;
  }
}

function drawBackground(){
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#0a0a2e'); grad.addColorStop(1,'#0a1a3e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CW,CH);

  // Clouds (parallax)
  const clouds=[[120,60,180],[320,40,220],[550,70,150],[750,50,200],[950,60,170],[1150,45,210],[1350,65,160],[1600,55,190],[1900,60,175]];
  clouds.forEach(([wx,wy,cw])=>{
    const cx=(wx - camX*0.3)%(LW*T+CW) - 100;
    ctx.fillStyle=COL.cloud;
    ctx.shadowColor='rgba(200,220,255,0.1)'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.ellipse(cx+cw/2,wy,cw/2,20,0,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+cw/3,wy+8,cw/3,14,0,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+cw*0.7,wy+6,cw/3.5,16,0,0,TAU); ctx.fill();
    ctx.shadowBlur=0;
  });

  // Hills (parallax)
  const hills=[[200,CH-64,220],[600,CH-80,300],[1000,CH-70,260],[1400,CH-75,280],[1800,CH-68,240]];
  hills.forEach(([hx,hy,hw])=>{
    const cx=(hx - camX*0.5)%(LW*T+CW) - 100;
    ctx.fillStyle=COL.hill;
    ctx.beginPath(); ctx.ellipse(cx,hy,hw/2,hw/3,0,0,TAU); ctx.fill();
  });
}

function drawMario(){
  const p=player;
  const sx = p.x - camX, sy = p.y;
  if(p.dead) {
    // Spinning death
    ctx.save(); ctx.translate(sx+p.w/2,sy+p.h/2);
    ctx.rotate(tick*0.3);
    drawMarioShape(ctx,0,0,p.w,p.h,p.facingRight);
    ctx.restore(); return;
  }
  if(p.invincTimer>0 && Math.floor(tick/4)%2===0) return; // blink

  ctx.save(); ctx.translate(sx,sy);
  drawMarioShape(ctx,0,0,p.w,p.h,p.facingRight,p.onGround&&(KEYS['ArrowLeft']||KEYS['ArrowRight']||KEYS['a']||KEYS['A']||KEYS['d']||KEYS['D']),p.walkFrame,!p.onGround);
  ctx.restore();
}

function drawMarioShape(ctx2,ox,oy,w,h,right,walking,frame,jumping){
  const hW=w/2;
  // Shadow glow
  ctx2.shadowColor='#ff3333'; ctx2.shadowBlur=10;

  // Body
  ctx2.fillStyle=COL.mario;
  ctx2.fillRect(ox,oy+h*0.35,w,h*0.65);

  // Head
  ctx2.fillStyle='#ffcc99';
  ctx2.fillRect(ox+hW*0.2,oy,w*0.75,h*0.45);

  // Hat
  ctx2.fillStyle=COL.mario;
  ctx2.fillRect(ox+hW*0.1,oy-h*0.18,w*0.8,h*0.2);
  ctx2.fillRect(ox+hW*0.3,oy-h*0.32,w*0.55,h*0.16);

  // Eyes
  ctx2.fillStyle='#000';
  const eyeX = right ? ox+w*0.65 : ox+w*0.2;
  ctx2.fillRect(eyeX,oy+h*0.1,4,4);

  // Mustache
  ctx2.fillStyle='#663300';
  ctx2.fillRect(ox+w*0.25,oy+h*0.28,w*0.55,3);

  // Legs (walk animation)
  ctx2.fillStyle='#3333cc';
  if(!jumping && walking && frame===1){
    ctx2.fillRect(ox,oy+h*0.72,hW-2,h*0.28);
    ctx2.fillRect(ox+hW+2,oy+h*0.8,hW-2,h*0.2);
  } else if(!jumping && walking && frame===2){
    ctx2.fillRect(ox,oy+h*0.8,hW-2,h*0.2);
    ctx2.fillRect(ox+hW+2,oy+h*0.72,hW-2,h*0.28);
  } else {
    ctx2.fillRect(ox,oy+h*0.72,hW-2,h*0.28);
    ctx2.fillRect(ox+hW+2,oy+h*0.72,hW-2,h*0.28);
  }

  // Arms
  ctx2.fillStyle=COL.mario;
  if(jumping){
    ctx2.fillRect(ox-4,oy+h*0.38,8,h*0.22);
    ctx2.fillRect(ox+w-4,oy+h*0.38,8,h*0.22);
  } else {
    ctx2.fillRect(ox-2,oy+h*0.42,8,h*0.2);
    ctx2.fillRect(ox+w-6,oy+h*0.42,8,h*0.2);
  }

  ctx2.shadowBlur=0;
}

function drawGoomba(g){
  if(!g.alive) return;
  const sx=g.x-camX, sy=g.y;
  if(g.dead){
    // Squished
    ctx.fillStyle=COL.goomba;
    ctx.shadowColor='#cc6600'; ctx.shadowBlur=6;
    ctx.fillRect(sx,sy+g.h*0.7,g.w,g.h*0.3);
    ctx.shadowBlur=0; return;
  }
  ctx.save();
  ctx.shadowColor='#cc6600'; ctx.shadowBlur=8;
  // Body
  ctx.fillStyle=COL.goomba;
  ctx.beginPath(); ctx.ellipse(sx+g.w/2,sy+g.h*0.6,g.w/2,g.h*0.55,0,0,TAU); ctx.fill();
  // Head
  ctx.fillStyle=COL.goombaD;
  ctx.beginPath(); ctx.ellipse(sx+g.w/2,sy+g.h*0.3,g.w*0.45,g.h*0.38,0,0,TAU); ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(sx+g.w*0.32,sy+g.h*0.28,5,5,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx+g.w*0.68,sy+g.h*0.28,5,5,0,0,TAU); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(sx+g.w*0.32,sy+g.h*0.28,3,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+g.w*0.68,sy+g.h*0.28,3,0,TAU); ctx.fill();
  // Angry brows
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx+g.w*0.18,sy+g.h*0.2); ctx.lineTo(sx+g.w*0.42,sy+g.h*0.25); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+g.w*0.82,sy+g.h*0.2); ctx.lineTo(sx+g.w*0.58,sy+g.h*0.25); ctx.stroke();
  // Feet
  ctx.fillStyle='#222';
  const legOff = g.walkFrame===0?2:-2;
  ctx.fillRect(sx+2,sy+g.h*0.85+legOff,10,8);
  ctx.fillRect(sx+g.w-12,sy+g.h*0.85-legOff,10,8);
  ctx.shadowBlur=0; ctx.restore();
}

function drawFlag(){
  const fx=150*T-camX, fy=3*T;
  // Pole
  ctx.strokeStyle='rgba(0,255,204,0.4)'; ctx.lineWidth=6;
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(fx+T/2,fy); ctx.lineTo(fx+T/2,(GROUND_ROW+1)*T); ctx.stroke();
  // Flag
  const wave=Math.sin(tick*0.12)*4;
  ctx.fillStyle=COL.flag;
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(fx+T/2,fy);
  ctx.lineTo(fx+T/2+28+wave,fy+10);
  ctx.lineTo(fx+T/2+24+wave*0.5,fy+20);
  ctx.lineTo(fx+T/2,fy+22);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawBackground();

  if(gameState==='idle') return;

  // Tiles
  const col0=Math.floor(camX/T), col1=Math.min(LW-1,Math.ceil((camX+CW)/T));
  for(let r=0;r<LH;r++) for(let c=col0;c<=col1;c++) drawTile(c,r);

  // Flag
  drawFlag();

  // Coins
  coins.forEach(c=>{
    if(c.collected) return;
    const pulse=0.9+Math.sin(tick*0.15+c.x*0.1)*0.1;
    ctx.fillStyle=COL.coin;
    ctx.shadowColor='#ffdd00'; ctx.shadowBlur=10*pulse;
    ctx.beginPath(); ctx.arc(c.x-camX,c.y,7*pulse,0,TAU); ctx.fill();
    ctx.shadowBlur=0;
  });

  // Coin anim (floating up from ?-block)
  coinAnims.forEach(c=>{
    ctx.save(); ctx.globalAlpha=c.life;
    ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(c.x-camX,c.y,8,0,TAU); ctx.fill();
    ctx.restore();
  });

  // Goombas
  goombas.forEach(drawGoomba);

  // Mario
  drawMario();

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,Math.max(0.1,p.size*p.life),0,TAU); ctx.fill();
    ctx.restore();
  });

  // Floaters
  floaters.forEach(f=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=6;
    ctx.font='bold 12px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('+'+f.val, f.x-camX, f.y); ctx.restore();
  });

  // Paused
  if(gameState==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.shadowColor='#0ff'; ctx.shadowBlur=20;
    ctx.font='32px Share Tech Mono'; ctx.fillText('PAUSED',CW/2,CH/2-10);
    ctx.font='13px Share Tech Mono'; ctx.fillText('P to resume',CW/2,CH/2+26);
    ctx.shadowBlur=0;
  }
}

function showOverlay(title,detail,sub){
  const ov=document.getElementById('overlay'); ov.style.display='flex';
  ov.innerHTML='<h1>'+title+'</h1><div class="ov-detail">'+detail+'</div><div class="ov-sub">'+sub+'</div>';
}
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }

updateHUD();
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
