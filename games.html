<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games – Leon Dudhill</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .games-hero-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .games-hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: block;
      height: 320px;
      position: relative;
      transition: border-color 0.25s, transform 0.25s;
      text-decoration: none;
      color: inherit;
    }

    .games-hero-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .games-hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .games-hero-emoji {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      opacity: 0.6;
      filter: drop-shadow(0 0 12px rgba(0,255,204,0.4));
      transition: opacity 0.25s, transform 0.25s;
    }

    .games-hero-card:hover .games-hero-emoji {
      opacity: 0.9;
      transform: scale(1.1);
    }

    .games-hero-overlay {
      position: absolute;
      bottom: 1.2rem;
      right: 1.4rem;
      text-align: right;
    }

    .games-hero-overlay .games-hero-award {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    @media (max-width: 640px) {
      .games-hero-card { height: 220px; }
      .games-hero-overlay .games-hero-award { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">LD</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="navMenu">
      <a href="games.html" class="active">Games</a>
      <a href="retrogames.html">Retro Games</a>
      <a href="https://www.reviseforge.com" target="_blank" rel="noopener noreferrer">Education</a>
      <a href="movieprops.html">Movie Props</a>
      <a href="tools.html">Tools</a>
      <a href="fun.html">Fun</a>
      <a href="experiments.html">Experiments</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="page-header">
    <span class="tag">🎮 Play</span>
    <h1>Games</h1>
    <p>Games built from scratch. Pick one and play.</p>
  </div>

  <div class="page-content">
    <div class="games-hero-grid">

      <a href="crushendo.html" class="games-hero-card">
        <img src="images/crushendo.jpg" alt="Crushendo" class="games-hero-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="games-hero-emoji" style="display:none;">💥</div>
      </a>

      <a href="clay-verse.html" class="games-hero-card">
        <img src="images/clay-verse.jpg" alt="Clay-Verse" class="games-hero-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="games-hero-emoji" style="display:none;">🌍</div>
        <div class="games-hero-overlay">
          <div class="games-hero-award">BAFTA Young Game Designer 2025 – Game Concept Finalist</div>
        </div>
      </a>

      <a href="trash.html" class="games-hero-card">
        <img src="images/trash.jpg" alt="Trash" class="games-hero-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="games-hero-emoji" style="display:none;">🗑️</div>
        <div class="games-hero-overlay">
          <div class="games-hero-award">BAFTA Young Game Designer 2024 – Game Concept Finalist</div>
        </div>
      </a>

    </div>
  </div>

  <footer>
    <p>© 2025 Leon Dudhill</p>
  </footer>

  <script>
    const toggle = document.getElementById("navToggle");
    const menu = document.getElementById("navMenu");
    toggle.addEventListener("click", () => {
      toggle.classList.toggle("open");
      menu.classList.toggle("open");
    });
  </script>
</body>
</html>
