<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONKEY KONG</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono',monospace;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px);pointer-events:none;z-index:10;}
  #hud{display:flex;justify-content:space-between;align-items:flex-end;width:560px;margin-bottom:8px;padding:0 4px;}
  .hud-block{display:flex;flex-direction:column;gap:2px;}
  .hud-block.right{align-items:flex-end;}.hud-block.center{align-items:center;}
  .hud-label{font-size:10px;letter-spacing:5px;color:rgba(0,255,255,0.4);text-transform:uppercase;}
  .hud-value{font-size:28px;color:#fff;text-shadow:0 0 15px #0ff,0 0 35px #0ff;letter-spacing:3px;}
  #lives-row{display:flex;gap:6px;align-items:center;margin-top:2px;}
  #game-wrapper{position:relative;}
  canvas{display:block;border:1px solid rgba(0,255,255,0.2);box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04);border-radius:2px;}
  #overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);text-align:center;gap:10px;}
  #overlay h1{font-size:36px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:6px;text-transform:uppercase;}
  #overlay h1 span{color:#ff3366;text-shadow:0 0 20px #ff3366,0 0 60px #ff3366;}
  .ov-detail{font-size:11px;color:#0ff;opacity:0.6;letter-spacing:4px;}
  .ov-sub{font-size:12px;color:#0ff;opacity:0.65;letter-spacing:5px;animation:blink 1.2s step-start infinite;margin-top:8px;}
  @keyframes blink{0%,100%{opacity:.65}50%{opacity:0}}
  #splash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:20;opacity:0;transition:opacity 0.8s ease;}
  #splash .sp-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;}
  #splash .sp-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;}
  #splash .sp-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}
  #controls{margin-top:10px;font-size:11px;color:rgba(0,255,255,0.3);letter-spacing:3px;text-align:center;line-height:2;}

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(560px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 1.0769)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="hud">
  <div class="hud-block"><span class="hud-label">Score</span><span class="hud-value" id="score-el">0</span></div>
  <div class="hud-block center"><span class="hud-label">Level</span><span class="hud-value" id="level-el">1</span></div>
  <div class="hud-block right"><span class="hud-label">Lives</span><div id="lives-row"></div></div>
</div>
<div id="game-wrapper">
  <canvas id="c" width="560" height="520"></canvas>
  <div id="splash">
    <div class="sp-by">A game by</div>
    <div class="sp-name"><span>Leon Dudhill</span></div>
  </div>
  <div id="overlay">
    <h1>MONKEY <span>KONG</span></h1>
    <div class="ov-detail">← → Run &nbsp;·&nbsp; ↑ / Z Jump &nbsp;·&nbsp; Avoid barrels!</div>
    <div class="ov-detail" style="color:#ffff00;opacity:0.8">Reach the top to rescue the princess!</div>
    <div class="ov-sub" id="ov-sub">Press SPACE to start</div>
  </div>
</div>
<div id="controls">← → &nbsp;·&nbsp; Run &nbsp;|&nbsp; Z / ↑ &nbsp;·&nbsp; Jump &nbsp;|&nbsp; P &nbsp;·&nbsp; Pause</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TAU = Math.PI*2;

const PLATFORMS = [
  {x:0,   y:480, w:560, slant:0},
  {x:0,   y:388, w:480, slant:6},
  {x:80,  y:296, w:480, slant:-6},
  {x:0,   y:204, w:480, slant:6},
  {x:80,  y:112, w:480, slant:-6},
];

const LADDERS = [
  {x:460, y1:388, y2:480},
  {x:100, y1:296, y2:388},
  {x:440, y1:204, y2:296},
  {x:120, y1:112, y2:204},
  {x:460, y1:80,  y2:160},
];

const CELL = 16;
const GRAVITY = 0.55;
const JUMP_FORCE = -7.0;
const MOVE_SPD = 3.2;
const BARREL_SPD_BASE = 2.4;

let gameState = 'splash';
let score=0, best=0, lives=3, level=1;
let player, barrels=[], particles=[], floaters=[];
let barrelTimer=0, barrelInterval=120;
let hammer={x:200, y:PLATFORMS[3].y-20, active:true};
let hammerTimer=0;
let kongDead=false, kongDeadTimer=0;
const HAMMER_DURATION=300;
let tick=0, jumpPressed=false, deathTimer=0;
const KEYS={};

const stars = Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,b:Math.random()*0.4+0.2,t:Math.random()*TAU}));

function makePlayer(){
  return {
    x:40, y:430, vx:0, vy:0,
    w:22, h:28,
    onGround:false, onLadder:false,
    facingRight:true,
    walkFrame:0, walkTimer:0,
    climbing:false, climbFrame:0, climbTimer:0,
    dead:false, deadTimer:0, deadVy:0,
    jumping:false,
  };
}

document.addEventListener('keydown', e=>{
  if(KEYS[e.key]) return; KEYS[e.key]=true;
  if(gameState==='splash') return;
  if(e.key===' '){
    e.preventDefault();
    if(gameState==='idle'||gameState==='gameover') startGame();
    else if(gameState==='waiting') respawn();
    else if(gameState==='playing') jumpPressed=true;
  }
  if(e.key==='z'||e.key==='Z'||e.key==='ArrowUp'){
    e.preventDefault();
    if(gameState==='playing') jumpPressed=true;
  }
  if(e.key==='p'||e.key==='P'){
    if(gameState==='playing') gameState='paused';
    else if(gameState==='paused') gameState='playing';
  }
});
document.addEventListener('keyup',e=>{KEYS[e.key]=false;});

function startGame(){
  score=0; lives=3; level=1;
  barrelInterval=120;
  particles=[]; floaters=[]; barrels=[];
  player=makePlayer();
  barrelTimer=80;
  hammer={x:200, y:PLATFORMS[3].y-20, active:true};
  hammerTimer=0;
  kongDead=false; kongDeadTimer=0;
  gameState='playing';
  hideOverlay(); updateHUD();
}
function respawn(){
  particles=[]; barrels=[];
  player=makePlayer();
  barrelTimer=80;
  hammer={x:200, y:PLATFORMS[3].y-20, active:true};
  hammerTimer=0;
  kongDead=false; kongDeadTimer=0;
  gameState='playing';
  hideOverlay();
}
function nextLevel(){
  level++;
  score+=2000;
  barrelInterval=Math.max(55,120-level*10);
  particles=[]; barrels=[];
  player=makePlayer();
  barrelTimer=80;
  updateHUD();
  addFloater(W/2,H/2,'LEVEL '+level+' +2000');
}

function platformYAt(plat, px){
  const t=(px-plat.x)/plat.w;
  return plat.y + plat.slant*t;
}
function onAnyPlatform(px, py, pw, ph){
  for(const p of PLATFORMS){
    if(px+pw>p.x && px<p.x+p.w){
      const surfY=platformYAt(p,px+pw/2);
      if(py+ph>=surfY-4 && py+ph<=surfY+10) return {plat:p, surfY};
    }
  }
  return null;
}
function nearLadder(px,py,pw,ph){
  for(const l of LADDERS){
    if(px+pw>l.x-14&&px<l.x+14&&py+ph>l.y1&&py<l.y2) return l;
  }
  return null;
}

function update(){
  tick++;
  if(gameState==='dead'||gameState==='dying'){
    deathTimer--;
    player.deadVy+=0.6; player.y+=player.deadVy;
    updateParticles(); updateFloaters();
    if(deathTimer<=0){
      lives--; updateHUD();
      if(lives<=0){
        if(score>best) best=score;
        gameState='gameover';
        showOverlay('GAME OVER','Score: '+score+'  Best: '+best,'Press SPACE to try again');
      } else {
        gameState='waiting';
        showOverlay('ZAPPED!',lives+(lives===1?' life':' lives')+' remaining','Press SPACE to continue');
      }
    }
    return;
  }
  if(gameState!=='playing'){updateParticles();updateFloaters();return;}

  const p=player;
  const left=KEYS['ArrowLeft']||KEYS['a']||KEYS['A'];
  const right=KEYS['ArrowRight']||KEYS['d']||KEYS['D'];
  const up=KEYS['ArrowUp']||KEYS['w']||KEYS['W'];
  const down=KEYS['ArrowDown']||KEYS['s']||KEYS['S'];
  const wantJump=jumpPressed; jumpPressed=false;

  const lad=nearLadder(p.x,p.y,p.w,p.h);

  if(p.climbing){
    if(!lad){ p.climbing=false; p.onLadder=false; }
    else {
      p.x=lad.x-p.w/2;
      p.vy=(up?-2.5:down?2.5:0);
      p.vx=0;
      p.y+=p.vy;
      if(up||down){ p.climbTimer++; if(p.climbTimer>8){p.climbFrame=1-p.climbFrame;p.climbTimer=0;} }
      if(p.y<=lad.y1-p.h+4){ p.y=lad.y1-p.h; p.climbing=false; p.onLadder=false; p.vy=0; }
      if(p.y+p.h>=lad.y2){ p.y=lad.y2-p.h; p.climbing=false; p.onLadder=false; p.vy=0; }
    }
  }

  if(!p.climbing && lad && (up||down) && !wantJump){
    p.climbing=true; p.onLadder=true;
    p.x=lad.x-p.w/2; p.vy=0; p.vx=0;
  }

  if(!p.climbing){
    if(right){p.vx=Math.min(p.vx+1,MOVE_SPD);p.facingRight=true;}
    else if(left){p.vx=Math.max(p.vx-1,-MOVE_SPD);p.facingRight=false;}
    else p.vx*=0.75;
    if(wantJump&&p.onGround){p.vy=JUMP_FORCE;p.onGround=false;spawnJumpDust();}
    p.vy=Math.min(p.vy+GRAVITY,14);
    p.y+=p.vy;
    p.x+=p.vx;
    p.onGround=false;
    if(p.vy>=0){
      const hit=onAnyPlatform(p.x,p.y,p.w,p.h);
      if(hit){p.y=hit.surfY-p.h;p.vy=0;p.onGround=true;}
    }
    if(p.x<0)p.x=0; if(p.x+p.w>W)p.x=W-p.w;
    if(p.y>H+40) playerDie();
  }

  if(p.onGround&&Math.abs(p.vx)>0.5){
    p.walkTimer++; if(p.walkTimer>5){p.walkFrame=(p.walkFrame+1)%3;p.walkTimer=0;}
  }

  if(hammer.active && Math.abs(p.x+p.w/2-hammer.x)<24 && Math.abs(p.y+p.h/2-(hammer.y+10))<24){
    hammer.active=false; hammerTimer=HAMMER_DURATION;
    addFloater(p.x+p.w/2,p.y-10,'HAMMER!');
    spawnParticles(p.x+p.w/2,p.y,'#ffff00',14);
  }
  if(hammerTimer>0) hammerTimer--;

  const dkx=450, dky=PLATFORMS[4].y-62;
  if(!p.dead){
    if(Math.abs(p.x+p.w/2-dkx)<40 && Math.abs(p.y+p.h/2-(dky+30))<44){
      if(hammerTimer>0){
        score+=5000; updateHUD();
        kongDead=true; kongDeadTimer=90;
        for(let e=0;e<6;e++) setTimeout(()=>{
          spawnParticles(dkx+(Math.random()-0.5)*60,dky+10+(Math.random()*50),'#ff8800',12);
          spawnParticles(dkx+(Math.random()-0.5)*60,dky+10+(Math.random()*50),'#ffff00',8);
        }, e*120);
        addFloater(W/2,H/2-30,'KO! +5000');
      } else {
        playerDie();
      }
    }
  }

  barrelTimer--;
  if(barrelTimer<=0){
    barrelTimer=barrelInterval+Math.floor(Math.random()*40);
    barrels.push({x:420,y:PLATFORMS[4].y-20,vx:-(BARREL_SPD_BASE+level*0.3+Math.random()*0.5),vy:0,onGround:false,rot:0,frame:0});
  }

  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    b.rot+=b.vx*0.06;
    b.vy=Math.min(b.vy+GRAVITY,14);
    b.y+=b.vy;
    b.x+=b.vx;
    b.onGround=false;
    if(b.vy>=0){
      const bHit=onAnyPlatform(b.x,b.y,20,20);
      if(bHit){
        b.y=bHit.surfY-20; b.vy=0; b.onGround=true;
        const plat=bHit.plat;
        if(plat.slant < 0) b.vx = -Math.abs(b.vx);
        else if(plat.slant > 0) b.vx = Math.abs(b.vx);
      }
    }
    if(b.x<-40||b.x>W+40||b.y>H+60){barrels.splice(i,1);score+=10;updateHUD();continue;}
    if(!p.dead&&Math.abs(b.x+10-p.x-p.w/2)<22&&Math.abs(b.y+10-p.y-p.h/2)<22){
      if(hammerTimer>0){
        spawnParticles(b.x+10,b.y+10,'#ff8800',12);
        spawnParticles(b.x+10,b.y+10,'#ffff00',8);
        addFloater(b.x+10,b.y-10,'+300');
        score+=300; updateHUD();
        barrels.splice(i,1); continue;
      }
      playerDie(); break;
    }
    if(!p.dead&&p.vy<0&&p.x+p.w>b.x&&p.x<b.x+20&&p.y+p.h>b.y&&p.y+p.h<b.y+22){
      score+=100; updateHUD(); addFloater(b.x,b.y-10,'+100');
      spawnParticles(b.x+10,b.y+10,'#ffff00',8);
    }
  }

  if(p.x>460&&p.y<130&&gameState==='playing'){
    score+=3000; updateHUD();
    if(score>best) best=score;
    spawnParticles(p.x+p.w/2,p.y,'#ff3366',20);
    spawnParticles(p.x+p.w/2,p.y,'#ffff00',20);
    gameState='cutscene';
    setTimeout(()=>{
      showOverlay('LEVEL COMPLETE!','Score: '+score+'  Best: '+best,'Press SPACE to continue');
      gameState='gameover';
    }, 1200);
  }

  if(kongDead && kongDeadTimer>0){
    kongDeadTimer--;
    if(kongDeadTimer%8===0){
      spawnParticles(dkx+(Math.random()-0.5)*50,dky+20+Math.random()*40,'#ff8800',6);
    }
  }
  updateParticles(); updateFloaters();
}

function playerDie(){
  if(player.dead||gameState==='dying'||gameState==='dead') return;
  player.dead=true; player.deadVy=-8;
  gameState='dying'; deathTimer=60;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff3333',20);
}
function spawnJumpDust(){
  for(let i=0;i<5;i++){
    const a=Math.PI+Math.random()*Math.PI;
    particles.push({x:player.x+player.w/2,y:player.y+player.h,vx:Math.cos(a)*2,vy:Math.sin(a)*1.5,color:'rgba(0,255,204,0.6)',life:1,decay:0.06,size:2+Math.random()*2});
  }
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,color,life:1,decay:0.02+Math.random()*0.025,size:2+Math.random()*3});
  }
}
function updateParticles(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;});}
function addFloater(x,y,val){floaters.push({x,y,val,life:1});}
function updateFloaters(){floaters=floaters.filter(f=>f.life>0);floaters.forEach(f=>{f.y-=0.7;f.life-=0.018;});}

function updateHUD(){
  document.getElementById('score-el').textContent=score;
  document.getElementById('level-el').textContent=level;
  const lr=document.getElementById('lives-row');lr.innerHTML='';
  for(let i=0;i<lives;i++){
    const d=document.createElement('div');
    d.style.cssText='width:14px;height:14px;background:#00ffcc;border-radius:50%;box-shadow:0 0 6px #00ffcc;';
    lr.appendChild(d);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020a0a';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    const tw=0.3+Math.sin(tick*0.018+s.t)*0.15;
    ctx.globalAlpha=s.b*tw*1.5;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TAU);ctx.fill();
  });
  ctx.globalAlpha=1;
  if(gameState==='splash'||gameState==='idle'){drawScenery();return;}
  drawScenery();drawGoal();drawHammer();barrels.forEach(drawBarrel);drawDK();drawParticles();drawPlayer();drawFloaters();
  if(gameState==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.shadowColor='#0ff';ctx.shadowBlur=20;
    ctx.font='30px Share Tech Mono';ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font='13px Share Tech Mono';ctx.fillText('P to resume',W/2,H/2+22);
    ctx.shadowBlur=0;
  }
}

function drawScenery(){
  PLATFORMS.forEach((plat,i)=>{
    const yL=plat.y, yR=plat.y+plat.slant;
    const grad=ctx.createLinearGradient(plat.x,yL,plat.x+plat.w,yR);
    grad.addColorStop(0,'#0a2a3a');grad.addColorStop(1,'#0a1e2e');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(plat.x,yL);ctx.lineTo(plat.x+plat.w,yR);ctx.lineTo(plat.x+plat.w,yR+14);ctx.lineTo(plat.x,yL+14);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,255,204,0.6)';ctx.lineWidth=2;ctx.shadowColor='#00ffcc';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(plat.x,yL);ctx.lineTo(plat.x+plat.w,yR);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,255,204,0.2)';
    for(let rx=plat.x+20;rx<plat.x+plat.w-10;rx+=40){
      const ry=platformYAt(plat,rx)+6;
      ctx.beginPath();ctx.arc(rx,ry,3,0,TAU);ctx.fill();
    }
  });
  LADDERS.forEach(l=>{
    ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=3;ctx.shadowColor='#ffcc00';ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(l.x-7,l.y1);ctx.lineTo(l.x-7,l.y2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(l.x+7,l.y1);ctx.lineTo(l.x+7,l.y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,200,0,0.35)';ctx.lineWidth=2;ctx.shadowBlur=0;
    for(let ry=l.y1+12;ry<l.y2;ry+=16){ctx.beginPath();ctx.moveTo(l.x-7,ry);ctx.lineTo(l.x+7,ry);ctx.stroke();}
    ctx.shadowBlur=0;
  });
}

function drawGoal(){
  const gx=520,gy=PLATFORMS[4].y-50;
  ctx.save();ctx.shadowColor='#ff3366';ctx.shadowBlur=16;
  ctx.fillStyle='#ff3366';ctx.beginPath();ctx.moveTo(gx,gy+14);ctx.lineTo(gx-14,gy+38);ctx.lineTo(gx+14,gy+38);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffcc99';ctx.fillRect(gx-7,gy+4,14,16);
  ctx.beginPath();ctx.arc(gx,gy+4,9,0,TAU);ctx.fill();
  ctx.fillStyle='#ffaa00';ctx.shadowColor='#ffaa00';
  ctx.beginPath();ctx.arc(gx,gy-2,10,Math.PI,TAU);ctx.fill();
  ctx.fillRect(gx-10,gy-2,20,6);
  const wave=Math.sin(tick*0.1)*0.4;
  ctx.fillStyle='#ffcc99';ctx.shadowBlur=0;
  ctx.save();ctx.translate(gx-12,gy+10);ctx.rotate(-0.5+wave);ctx.fillRect(-4,-2,10,5);ctx.restore();
  ctx.save();ctx.translate(gx+12,gy+10);ctx.rotate(0.5-wave);ctx.fillRect(-4,-2,10,5);ctx.restore();
  ctx.fillStyle='rgba(255,50,100,0.08)';ctx.beginPath();ctx.arc(gx,gy+20,30,0,TAU);ctx.fill();
  ctx.restore();
}

function drawDK(){
  if(kongDead) return;
  const dkx=450, dky=PLATFORMS[4].y-62;
  ctx.save();ctx.translate(dkx,0);ctx.scale(-1,1);ctx.translate(-dkx,0);
  ctx.shadowColor='#ff8800';ctx.shadowBlur=14;
  ctx.fillStyle='#663300';ctx.beginPath();ctx.ellipse(dkx,dky+28,22,26,0,0,TAU);ctx.fill();
  ctx.fillStyle='#7a4000';ctx.beginPath();ctx.ellipse(dkx,dky+4,18,16,0,0,TAU);ctx.fill();
  ctx.fillStyle='#cc8844';ctx.beginPath();ctx.ellipse(dkx+2,dky+7,10,8,0,0,TAU);ctx.fill();
  ctx.fillStyle='#442200';ctx.beginPath();ctx.arc(dkx-3,dky+8,2.5,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(dkx+7,dky+8,2.5,0,TAU);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(dkx-6,dky,4,4,0,0,TAU);ctx.fill();ctx.beginPath();ctx.ellipse(dkx+6,dky,4,4,0,0,TAU);ctx.fill();
  ctx.fillStyle='#f00';ctx.shadowColor='#f00';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(dkx-6,dky,2,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(dkx+6,dky,2,0,TAU);ctx.fill();
  const beat=Math.sin(tick*0.15)*5;
  ctx.fillStyle='#663300';ctx.shadowBlur=0;ctx.beginPath();ctx.ellipse(dkx-28,dky+22+beat,10,8,0.4,0,TAU);ctx.fill();ctx.beginPath();ctx.ellipse(dkx+28,dky+22-beat,10,8,-0.4,0,TAU);ctx.fill();
  ctx.fillStyle='#ff3333';ctx.shadowColor='#ff3333';ctx.shadowBlur=6;ctx.beginPath();ctx.moveTo(dkx,dky+15);ctx.lineTo(dkx-6,dky+42);ctx.lineTo(dkx+6,dky+42);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawHammer(){
  if(!hammer.active) return;
  const hx=hammer.x,hy=hammer.y,pulse=0.8+Math.sin(tick*0.1)*0.2;
  ctx.save();ctx.shadowColor='#ffff00';ctx.shadowBlur=14*pulse;
  ctx.fillStyle='#8B4513';ctx.fillRect(hx+7,hy+10,6,22);
  ctx.fillStyle='#aaa';ctx.shadowColor='#fff';ctx.shadowBlur=10;ctx.fillRect(hx,hy,20,12);
  ctx.strokeStyle='rgba(255,255,0,0.4)';ctx.lineWidth=2;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(hx+10,hy+10,18,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawBarrel(b){
  ctx.save();ctx.translate(b.x+10,b.y+10);ctx.rotate(b.rot);
  ctx.shadowColor='#ff6600';ctx.shadowBlur=12;
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.ellipse(0,0,10,10,0,0,TAU);ctx.fill();
  ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;ctx.shadowBlur=4;ctx.beginPath();ctx.ellipse(0,0,10,10,0,0,TAU);ctx.stroke();
  ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(0,8);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

function drawPlayer(){
  const p=player;
  if(p.dead&&Math.floor(tick/4)%2===0) return;
  const px=p.x,py=p.y,flip=!p.facingRight;
  ctx.save();
  if(flip){ctx.translate(px+p.w,py);ctx.scale(-1,1);}else ctx.translate(px,py);
  ctx.shadowColor='#00ffcc';ctx.shadowBlur=12;
  ctx.fillStyle='#3366ff';
  if(p.climbing){ctx.fillRect(2,p.h*0.6,8,p.h*0.4);ctx.fillRect(12,p.h*0.6,8,p.h*0.4);}
  else if(p.onGround&&p.walkFrame===1){ctx.fillRect(2,p.h*0.62,8,p.h*0.38);ctx.fillRect(12,p.h*0.72,8,p.h*0.28);}
  else if(p.onGround&&p.walkFrame===2){ctx.fillRect(2,p.h*0.72,8,p.h*0.28);ctx.fillRect(12,p.h*0.62,8,p.h*0.38);}
  else{ctx.fillRect(2,p.h*0.65,8,p.h*0.35);ctx.fillRect(12,p.h*0.65,8,p.h*0.35);}
  ctx.fillStyle='#ff3333';ctx.shadowBlur=10;ctx.fillRect(1,p.h*0.35,p.w-2,p.h*0.38);
  ctx.fillStyle='#ffcc99';ctx.fillRect(3,2,p.w-6,p.h*0.36);
  ctx.fillStyle='#ff3333';ctx.fillRect(2,0,p.w-4,p.h*0.16);ctx.fillRect(6,-4,p.w-10,p.h*0.16);
  ctx.fillStyle='#000';ctx.shadowBlur=0;ctx.fillRect(p.w-8,p.h*0.1,3,3);
  ctx.fillStyle='#442200';ctx.fillRect(p.w*0.3,p.h*0.26,p.w*0.55,3);
  ctx.fillStyle='#ff3333';ctx.shadowBlur=4;
  if(p.climbing){ctx.fillRect(-4,p.h*0.25+(p.climbFrame?-4:4),8,p.h*0.2);ctx.fillRect(p.w-4,p.h*0.25+(p.climbFrame?4:-4),8,p.h*0.2);}
  else{ctx.fillRect(-3,p.h*0.4,7,p.h*0.2);}
  if(hammerTimer>0){
    const swing=Math.sin(tick*0.25)*0.4;
    ctx.save();ctx.translate(p.w*0.6,p.h*0.25);ctx.rotate(-0.9+swing);
    ctx.shadowColor='#ffff00';ctx.shadowBlur=16;ctx.fillStyle='#8B4513';ctx.fillRect(-3,-20,6,22);
    ctx.fillStyle='#cccccc';ctx.shadowColor='#fff';ctx.shadowBlur=10;ctx.fillRect(-10,-32,20,13);
    ctx.strokeStyle='rgba(255,220,0,0.8)';ctx.lineWidth=1.5;ctx.shadowBlur=8;ctx.strokeRect(-10,-32,20,13);
    ctx.restore();
  }
  ctx.shadowBlur=0;ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,TAU);ctx.fill();ctx.restore();});
}
function drawFloaters(){
  floaters.forEach(f=>{ctx.save();ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle='#fff';ctx.shadowColor='#0ff';ctx.shadowBlur=8;ctx.font='bold 13px Share Tech Mono';ctx.textAlign='center';ctx.fillText(f.val,f.x,f.y);ctx.restore();});
}

function showOverlay(title,detail,sub){const ov=document.getElementById('overlay');ov.style.display='flex';ov.innerHTML=`<h1>${title}</h1><div class="ov-detail">${detail}</div><div class="ov-sub">${sub}</div>`;}
function hideOverlay(){document.getElementById('overlay').style.display='none';}

(function(){
  const splash=document.getElementById('splash');
  setTimeout(()=>{splash.style.opacity='1';},50);
  setTimeout(()=>{splash.style.opacity='0';},3000);
  setTimeout(()=>{splash.style.display='none';document.getElementById('overlay').style.display='flex';gameState='idle';},3900);
})();


updateHUD();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>


<script>
// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.querySelectorAll('.ov-sub, .overlay-sub').forEach(function(el) {
    el.textContent = el.textContent.replace(/Press SPACE.*/, 'Tap to start');
  });
}

// Overlay tap to start
document.getElementById('overlay').addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (gameState==='idle'||gameState==='gameover') { startGame(); return; }
  if (gameState==='waiting') { respawn(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});

// Canvas tap to start (when overlay hidden)
document.getElementById('c').addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (gameState==='idle'||gameState==='gameover') { startGame(); return; }
  if (gameState==='waiting') { respawn(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});

// On-screen buttons (mobile only)
if (isMobile) {
  var btns = document.createElement('div');
  btns.style.cssText = 'position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px;z-index:500;pointer-events:none;';
  btns.innerHTML = `
    <div style="display:flex;gap:10px;pointer-events:all;">
      <button id="tb-left"  style="width:72px;height:72px;background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.3);border-radius:12px;color:#0ff;font-size:26px;touch-action:manipulation;">←</button>
      <button id="tb-right" style="width:72px;height:72px;background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.3);border-radius:12px;color:#0ff;font-size:26px;touch-action:manipulation;">→</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:all;">
      <button id="tb-up"   style="width:72px;height:52px;background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.3);border-radius:12px;color:#0ff;font-size:11px;letter-spacing:2px;touch-action:manipulation;">UP</button>
      <button id="tb-jump" style="width:72px;height:72px;background:rgba(255,220,0,0.1);border:1px solid rgba(255,220,0,0.4);border-radius:12px;color:#ffdd00;font-size:11px;letter-spacing:2px;touch-action:manipulation;">JUMP</button>
    </div>`;
  document.body.appendChild(btns);
  var _km = {'tb-left':'ArrowLeft','tb-right':'ArrowRight','tb-up':'ArrowUp','tb-jump':'z'};
  Object.keys(_km).forEach(function(id) {
    var btn = document.getElementById(id);
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (gameState==='idle'||gameState==='gameover') { startGame(); return; }
      if (gameState==='waiting') { respawn(); return; }
      document.dispatchEvent(new KeyboardEvent('keydown',{key:_km[id],bubbles:true,cancelable:true}));
    }, {passive:false});
    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      document.dispatchEvent(new KeyboardEvent('keyup',{key:_km[id],bubbles:true,cancelable:true}));
    }, {passive:false});
    btn.addEventListener('touchcancel', function() {
      document.dispatchEvent(new KeyboardEvent('keyup',{key:_km[id],bubbles:true,cancelable:true}));
    });
  });
}
</script>
</body>
