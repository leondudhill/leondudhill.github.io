<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Email</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f6f8fc;
  --sidebar-bg: #f6f8fc;
  --white: #ffffff;
  --text: #202124;
  --text-light: #5f6368;
  --text-lighter: #80868b;
  --border: #e0e0e0;
  --hover: #e8eaed;
  --active: #d3e3fd;
  --active-text: #041e49;
  --red: #d93025;
  --blue: #1a73e8;
  --unread-bg: #ffffff;
  --read-bg: #f2f6fc;
  --unread-text: #202124;
  --read-text: #5f6368;
  --unread-weight: 600;
  --read-weight: 400;
  --shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px rgba(60,64,67,0.15);
  --shadow-lg: 0 2px 6px rgba(60,64,67,0.3), 0 1px 6px rgba(60,64,67,0.15);
}

body {
  font-family: 'Roboto', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.6s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
#splash.hidden { display: none; }
.splash-by { font-family: 'Google Sans', sans-serif; font-size: 16px; color: #5f6368; }
.splash-name { font-family: 'Google Sans', sans-serif; font-size: 30px; font-weight: 500; color: #202124; margin-top: 4px; }
.splash-dots { display: flex; gap: 8px; margin-top: 28px; }
.splash-dot { width: 10px; height: 10px; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.splash-dot:nth-child(1) { background: #4285F4; animation-delay: 0s; }
.splash-dot:nth-child(2) { background: #EA4335; animation-delay: 0.15s; }
.splash-dot:nth-child(3) { background: #FBBC05; animation-delay: 0.3s; }
.splash-dot:nth-child(4) { background: #34A853; animation-delay: 0.45s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5}40%{transform:scale(1.1);opacity:1} }

/* ===== TOP BAR ===== */
#topbar {
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  background: var(--bg);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.menu-btn {
  width: 40px; height: 40px;
  border-radius: 50%; border: none;
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light);
  font-size: 20px;
}
.menu-btn:hover { background: var(--hover); }

.app-logo {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Google Sans', sans-serif;
  font-size: 22px; font-weight: 400;
  color: var(--text-light);
  margin-right: 8px;
  cursor: pointer;
  text-decoration: none;
  flex-shrink: 0;
}
.app-logo img { max-height: 32px; max-width: 140px; object-fit: contain; }
.logo-char { display: inline-block; }

.search-bar {
  flex: 1;
  max-width: 720px;
  background: #eaf1fb;
  border-radius: 24px;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  transition: background 0.2s, box-shadow 0.2s;
}
.search-bar:focus-within {
  background: white;
  box-shadow: var(--shadow);
}
.search-bar svg { color: var(--text-light); flex-shrink: 0; }
.search-bar input {
  flex: 1; border: none; background: none;
  font-size: 16px; font-family: 'Roboto', sans-serif;
  color: var(--text); outline: none;
}

.topbar-right {
  display: flex; align-items: center; gap: 4px;
  margin-left: auto;
}
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light);
}
.icon-btn:hover { background: var(--hover); }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: #1a73e8; color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.customize-btn {
  font-size: 13px; color: var(--text);
  background: none; border: none; cursor: pointer;
  padding: 8px 12px; border-radius: 4px;
  font-family: 'Roboto', sans-serif;
}
.customize-btn:hover { background: var(--hover); }

/* ===== MAIN LAYOUT ===== */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 256px;
  flex-shrink: 0;
  padding: 8px 0;
  overflow-y: auto;
  transition: width 0.2s;
}

.compose-btn {
  margin: 4px 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  background: var(--white);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, background 0.2s;
  width: calc(100% - 16px);
}
.compose-btn:hover { box-shadow: var(--shadow-lg); background: #f0f4ff; }
.compose-btn svg { color: var(--blue); flex-shrink: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 16px 4px 26px;
  height: 32px;
  border-radius: 0 16px 16px 0;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  width: calc(100% - 8px);
  border: none; background: none;
  font-family: 'Roboto', sans-serif;
  text-align: left;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active { background: var(--active); font-weight: 500; }
.nav-item svg { color: var(--text-light); flex-shrink: 0; }
.nav-item.active svg { color: var(--active-text); }
.nav-count { margin-left: auto; font-size: 12px; color: var(--text); font-weight: 500; }

.nav-section { margin-top: 8px; padding: 0 0 0 0; }
.nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

/* ===== EMAIL LIST ===== */
#email-list-panel {
  flex: 1;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  background: var(--white);
  border-radius: 16px 0 0 0;
  margin-top: 0;
}

.email-list-toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  height: 48px;
  position: sticky; top: 0;
  background: var(--white);
  z-index: 5;
}
.toolbar-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light);
}
.toolbar-btn:hover { background: var(--hover); }
.toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

.inbox-label {
  font-family: 'Google Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  padding: 12px 20px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.inbox-count-badge {
  font-size: 12px;
  background: #1a73e8;
  color: white;
  border-radius: 10px;
  padding: 1px 8px;
}

/* Email row */
.email-row {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 52px;
  gap: 8px;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
  transition: box-shadow 0.1s, background 0.1s;
  position: relative;
}
.email-row.unread { background: var(--unread-bg); }
.email-row.read { background: var(--read-bg); }
.email-row:hover {
  box-shadow: var(--shadow);
  z-index: 1;
}
.email-row .check-box {
  width: 18px; height: 18px; border: 2px solid #bdc1c6;
  border-radius: 2px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: white;
}
.email-row:hover .check-box { border-color: #5f6368; }
.email-row.selected .check-box { background: #1a73e8; border-color: #1a73e8; }

.star-btn {
  width: 24px; flex-shrink: 0;
  background: none; border: none; cursor: pointer;
  color: #bdc1c6; font-size: 18px; padding: 0;
  line-height: 1;
}
.star-btn.starred { color: #f4b400; }
.star-btn:hover { color: #f4b400; }

.email-from {
  width: 180px;
  flex-shrink: 0;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.email-row.unread .email-from { font-weight: var(--unread-weight); color: var(--unread-text); }
.email-row.read .email-from { font-weight: var(--read-weight); color: var(--read-text); }

.email-body-preview {
  flex: 1;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.email-subject-inline {
  font-weight: inherit;
}
.email-snippet-inline {
  color: var(--text-lighter);
  font-weight: 400;
}
.email-row.unread .email-subject-inline { font-weight: 600; color: var(--unread-text); }
.email-row.read .email-subject-inline { font-weight: 400; color: var(--read-text); }

.email-time {
  font-size: 12px;
  flex-shrink: 0;
  margin-left: 8px;
}
.email-row.unread .email-time { font-weight: 600; color: var(--text); }
.email-row.read .email-time { color: var(--text-lighter); }

/* ===== EMAIL VIEW PANEL ===== */
#email-view-panel {
  display: none;
  flex: 1;
  border-left: 1px solid var(--border);
  background: var(--white);
  overflow-y: auto;
  padding: 20px 28px;
  border-radius: 16px 0 0 0;
}
#email-view-panel.open { display: block; }

.email-view-back {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 16px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-light);
}
.back-btn:hover { background: var(--hover); }

.email-view-subject {
  font-family: 'Google Sans', sans-serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.3;
}

.email-view-meta {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.sender-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: #4285F4; color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Google Sans', sans-serif;
  font-size: 16px; font-weight: 500; flex-shrink: 0;
}
.email-view-from-name {
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500; color: var(--text);
}
.email-view-addresses {
  font-size: 12px; color: var(--text-lighter); margin-top: 2px;
}
.email-view-time {
  margin-left: auto; font-size: 12px; color: var(--text-lighter);
  flex-shrink: 0;
}

.email-view-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ===== COMPOSE MODAL ===== */
#compose-modal {
  display: none;
  position: fixed;
  bottom: 0; right: 24px;
  width: 540px;
  max-width: calc(100vw - 48px);
  background: white;
  border-radius: 8px 8px 0 0;
  box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14), 0 3px 14px 2px rgba(0,0,0,0.12), 0 5px 5px -3px rgba(0,0,0,0.2);
  z-index: 500;
  flex-direction: column;
}
#compose-modal.open { display: flex; }
.compose-header {
  background: #404040;
  color: white;
  padding: 8px 16px;
  border-radius: 8px 8px 0 0;
  display: flex;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.compose-header span {
  font-family: 'Google Sans', sans-serif;
  font-size: 14px;
  flex: 1;
}
.compose-header-btns { display: flex; gap: 4px; }
.compose-hdr-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: none; background: none; color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.compose-hdr-btn:hover { background: rgba(255,255,255,0.2); }

.compose-field {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding: 4px 16px;
  gap: 8px;
  min-height: 40px;
}
.compose-field label {
  font-size: 13px; color: var(--text-lighter);
  flex-shrink: 0; width: 36px;
}
.compose-field input {
  flex: 1; border: none; outline: none;
  font-size: 14px; font-family: 'Roboto', sans-serif;
  color: var(--text);
}
.compose-body-area {
  flex: 1;
  padding: 12px 16px;
  min-height: 200px;
}
.compose-body-area textarea {
  width: 100%; height: 200px;
  border: none; outline: none; resize: none;
  font-size: 14px; font-family: 'Roboto', sans-serif;
  color: var(--text); line-height: 1.6;
}
.compose-footer {
  display: flex;
  align-items: center;
  padding: 8px 16px 12px;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.send-btn {
  background: var(--blue); color: white;
  border: none; border-radius: 4px;
  padding: 8px 24px;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.send-btn:hover { background: #1765cc; }

/* ===== SENT TOAST ===== */
#toast {
  display: none;
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: #323232;
  color: white;
  padding: 12px 20px;
  border-radius: 4px;
  font-size: 14px;
  z-index: 9000;
  box-shadow: var(--shadow-lg);
  gap: 16px;
  align-items: center;
}
#toast.show { display: flex; }

/* ===== CUSTOMISE MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 8px;
  width: 680px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: white; z-index: 1;
}
.modal-header h2 { font-size: 18px; font-weight: 500; }
.modal-close {
  background: none; border: none; font-size: 22px;
  cursor: pointer; color: var(--text-lighter); padding: 2px 8px; border-radius: 4px;
}
.modal-close:hover { background: var(--hover); }
.modal-body { padding: 20px 24px; }
.modal-section { margin-bottom: 24px; }
.modal-section h3 {
  font-size: 14px; font-weight: 500;
  margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px;
}
.modal-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.modal-row label { font-size: 13px; color: var(--text-lighter); }
.modal-row input[type="text"],
.modal-row input[type="url"],
.modal-row textarea {
  border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 10px; font-size: 14px; font-family: 'Roboto', sans-serif;
  color: var(--text); width: 100%; outline: none; resize: vertical;
}
.modal-row input[type="color"] {
  border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 4px; height: 36px; width: 60px; cursor: pointer;
}
.modal-row input:focus, .modal-row textarea:focus { border-color: var(--blue); }
.email-preset {
  background: #f8f9fa; border-radius: 6px; padding: 12px;
  margin-bottom: 10px; border: 1px solid #e0e0e0;
}
.email-preset-title {
  font-size: 12px; font-weight: 500; color: var(--text-lighter); margin-bottom: 8px;
}
.modal-row-inline { display: flex; gap: 10px; }
.modal-row-inline .modal-row { flex: 1; }
.tabs-nav {
  display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.tabs-nav-btn {
  padding: 8px 16px; font-size: 13px; color: var(--text-lighter); cursor: pointer;
  border: none; background: none; border-bottom: 2px solid transparent;
  font-family: 'Roboto', sans-serif;
}
.tabs-nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 10px;
  padding: 16px 24px; border-top: 1px solid var(--border);
  position: sticky; bottom: 0; background: white;
}
.btn-cancel {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 20px; font-size: 14px; cursor: pointer; color: var(--text);
}
.btn-cancel:hover { background: var(--hover); }
.btn-save {
  background: var(--blue); border: none; border-radius: 4px;
  padding: 8px 20px; font-size: 14px; color: white; cursor: pointer; font-weight: 500;
}
.btn-save:hover { background: #1765cc; }

@media (max-width: 768px) {
  #sidebar { width: 72px; }
  .nav-item span, .nav-count, .compose-btn span { display: none; }
  .compose-btn { padding: 12px; justify-content: center; width: calc(100% - 16px); }
  .email-from { width: 120px; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" style="position:fixed;inset:0;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity 0.6s ease;">
  <p style="font-family:sans-serif;font-size:14px;color:#202124;opacity:0.6;margin-bottom:6px;letter-spacing:0.5px;">An App by</p>
  <p style="font-family:sans-serif;font-size:26px;font-weight:700;color:#202124;letter-spacing:-0.5px;">Leon Dudhill</p>
  <div style="display:flex;gap:8px;margin-top:24px;"><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#4285F4;animation-delay:0.0s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#EA4335;animation-delay:0.15s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#FBBC05;animation-delay:0.3s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#34A853;animation-delay:0.44999999999999996s"></div></div>
</div>



<!-- TOP BAR -->
<div id="topbar">
  <button class="menu-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>

  <a class="app-logo" href="#" onclick="return false;" id="app-logo-el">
    <span style="color:#EA4335" class="logo-char">M</span><span style="color:#4285F4" class="logo-char">o</span><span style="color:#FBBC05" class="logo-char">v</span><span style="color:#34A853" class="logo-char">i</span><span style="color:#EA4335" class="logo-char">e</span>&nbsp;<span style="color:#4285F4" class="logo-char">M</span><span style="color:#FBBC05" class="logo-char">a</span><span style="color:#34A853" class="logo-char">i</span><span style="color:#EA4335" class="logo-char">l</span>
  </a>

  <div class="search-bar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" placeholder="Search mail">
  </div>

  <div class="topbar-right">

// ============================================================
// LOAD / SAVE
// ============================================================
function loadConfig() {
  try {
    const saved = localStorage.getItem('movieMailConfig');
    if (saved) {
      const parsed = JSON.parse(saved);
      const merged = Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_CONFIG)), parsed);
      if (!parsed.emails || parsed.emails.length < DEFAULT_CONFIG.emails.length) {
        merged.emails = DEFAULT_CONFIG.emails.map((def, i) =>
          (parsed.emails && parsed.emails[i]) ? parsed.emails[i] : def
        );
      }
      return merged;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}

function saveToStorage(cfg) {
  localStorage.setItem('movieMailConfig', JSON.stringify(cfg));
}

let config = loadConfig();

// ============================================================
// APPLY CONFIG
// ============================================================
function applyConfig() {
  document.body.style.background = config.bgColor;
  document.getElementById('topbar').style.background = config.bgColor;
  document.getElementById('sidebar').style.background = config.bgColor;
  document.getElementById('user-avatar').textContent = (config.userInitial || 'L')[0].toUpperCase();
  renderLogo();
  renderEmailList();
  updateUnreadBadge();
}

function renderLogo() {
  const el = document.getElementById('app-logo-el');
  if (!el) return;
  if (config.logoUrl) {
    el.innerHTML = `<img src="${config.logoUrl}" alt="Logo">`;
  } else {
    const name = config.appName || 'Movie Mail';
    const colors = ['#EA4335','#4285F4','#FBBC05','#34A853','#EA4335','#4285F4','#FBBC05','#34A853','#EA4335','#4285F4'];
    el.innerHTML = name.split('').map((c, i) => {
      if (c === ' ') return '&nbsp;';
      return `<span style="color:${colors[i%colors.length]}" class="logo-char">${c}</span>`;
    }).join('');
  }
}

// ============================================================
// RENDER EMAILS
// ============================================================
function renderEmailList() {
  const container = document.getElementById('email-rows');
  container.innerHTML = config.emails.map((e, i) => `
    <div class="email-row ${e.unread ? 'unread' : 'read'}" onclick="openEmail(${i})">
      <div class="check-box"></div>
      <button class="star-btn ${e.starred ? 'starred' : ''}" onclick="event.stopPropagation();toggleStar(${i})">&#9733;</button>
      <span class="email-from">${escHtml(e.from)}</span>
      <span class="email-body-preview">
        <span class="email-subject-inline">${escHtml(e.subject)}</span>
        <span class="email-snippet-inline"> &mdash; ${escHtml(e.body.replace(/\n/g,' ').substring(0,80))}</span>
      </span>
      <span class="email-time">${escHtml(e.time)}</span>
    </div>
  `).join('');
}

function updateUnreadBadge() {
  const count = config.emails.filter(e => e.unread).length;
  document.getElementById('unread-count-badge').textContent = count || '';
  document.getElementById('inbox-badge').textContent = count || '';
}

function toggleStar(i) {
  config.emails[i].starred = !config.emails[i].starred;
  saveToStorage(config);
  renderEmailList();
}

// ============================================================
// OPEN / CLOSE EMAIL
// ============================================================
function openEmail(i) {
  const e = config.emails[i];
  config.emails[i].unread = false;
  saveToStorage(config);
  updateUnreadBadge();
  renderEmailList();

  document.getElementById('view-subject').textContent = e.subject;
  document.getElementById('view-avatar').textContent = e.from[0].toUpperCase();
  document.getElementById('view-from-name').textContent = e.from;
  document.getElementById('view-addresses').textContent = `<${e.fromEmail}> to ${e.to || config.myEmail}`;
  document.getElementById('view-time').textContent = e.time;
  document.getElementById('view-body').textContent = e.body;

  document.getElementById('email-list-panel').style.display = 'none';
  document.getElementById('email-view-panel').classList.add('open');
}

function closeEmail() {
  document.getElementById('email-view-panel').classList.remove('open');
  document.getElementById('email-list-panel').style.display = '';
}

function showInbox() {
  closeEmail();
}

// ============================================================
// COMPOSE
// ============================================================
let composeMinimised = false;

function openCompose() {
  document.getElementById('compose-modal').classList.add('open');
  composeMinimised = false;
  document.getElementById('compose-body').style.display = '';
  document.getElementById('compose-to').focus();
}

function closeCompose() {
  document.getElementById('compose-modal').classList.remove('open');
  document.getElementById('compose-to').value = '';
  document.getElementById('compose-cc').value = '';
  document.getElementById('compose-subject').value = '';
  document.getElementById('compose-body-text').value = '';
}

function toggleCompose() {
  composeMinimised = !composeMinimised;
  document.getElementById('compose-body').style.display = composeMinimised ? 'none' : '';
}

function sendEmail() {
  closeCompose();
  showToast('Message sent.');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// CUSTOMISE MODAL
// ============================================================
function openCustomise() {
  populateModal();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeCustomise() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function switchModalTab(name, btn) {
  document.querySelectorAll('.tabs-nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.modal .tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('modal-' + name).classList.add('active');
}

function populateModal() {
  document.getElementById('cfg-bg').value = config.bgColor;
  document.getElementById('cfg-name').value = config.appName || 'Movie Mail';
  document.getElementById('cfg-logo').value = config.logoUrl || '';
  document.getElementById('cfg-user').value = config.userInitial || 'L';
  document.getElementById('cfg-my-email').value = config.myEmail || 'you@moviemail.com';

  const ee = document.getElementById('email-presets-editor');
  ee.innerHTML = config.emails.map((e, i) => `
    <div class="email-preset">
      <div class="email-preset-title">Email ${i+1}</div>
      <div class="modal-row-inline">
        <div class="modal-row"><label>From (name)</label><input type="text" id="ep-from-${i}" value="${escHtml(e.from)}"></div>
        <div class="modal-row"><label>From (email)</label><input type="text" id="ep-fromemail-${i}" value="${escHtml(e.fromEmail)}"></div>
      </div>
      <div class="modal-row-inline">
        <div class="modal-row"><label>To</label><input type="text" id="ep-to-${i}" value="${escHtml(e.to)}"></div>
        <div class="modal-row"><label>Time / Date</label><input type="text" id="ep-time-${i}" value="${escHtml(e.time)}"></div>
      </div>
      <div class="modal-row"><label>Subject</label><input type="text" id="ep-subject-${i}" value="${escHtml(e.subject)}"></div>
      <div class="modal-row"><label>Email Body</label><textarea id="ep-body-${i}" rows="4">${escHtml(e.body)}</textarea></div>
    </div>
  `).join('');
}

function saveConfig() {
  config.bgColor = document.getElementById('cfg-bg').value;
  config.appName = document.getElementById('cfg-name').value;
  config.logoUrl = document.getElementById('cfg-logo').value;
  config.userInitial = document.getElementById('cfg-user').value;
  config.myEmail = document.getElementById('cfg-my-email').value;

  config.emails = config.emails.map((e, i) => ({
    from: document.getElementById(`ep-from-${i}`).value,
    fromEmail: document.getElementById(`ep-fromemail-${i}`).value,
    to: document.getElementById(`ep-to-${i}`).value,
    time: document.getElementById(`ep-time-${i}`).value,
    subject: document.getElementById(`ep-subject-${i}`).value,
    body: document.getElementById(`ep-body-${i}`).value,
    unread: e.unread,
    starred: e.starred
  }));

  saveToStorage(config);
  applyConfig();
  closeCustomise();
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeCustomise();
});

// ============================================================
// SPLASH
// ============================================================
(function() {
  const splash = document.getElementById('splash');
  if (sessionStorage.getItem('mailSplashShown')) {
    splash.style.display='none'; return;
  }
  sessionStorage.setItem('mailSplashShown', '1');
  setTimeout(() => {
    splash.style.opacity='0'; splash.style.pointerEvents='none'; splash.style.transition='opacity 0.6s ease';
    setTimeout(() => { splash.style.display='none'; }, 650);
  }, 1600);
})();

// Init
applyConfig();
</script>
</body>
</html>
