<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPPY BIRD</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Share Tech Mono',monospace; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px); pointer-events:none; z-index:10; }
  #hud { display:flex; justify-content:space-between; align-items:flex-end; width:400px; margin-bottom:8px; padding:0 4px; }
  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-block.right { align-items:flex-end; }
  .hud-label { font-size:10px; letter-spacing:5px; color:rgba(0,255,255,0.4); text-transform:uppercase; }
  .hud-value { font-size:32px; color:#fff; text-shadow:0 0 15px #0ff,0 0 35px #0ff; letter-spacing:3px; }
  #game-wrapper { position:relative; }
  canvas { display:block; border:1px solid rgba(0,255,255,0.2); box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04); border-radius:2px; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); text-align:center; gap:10px; }
  #overlay h1 { font-size:46px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:8px; text-transform:uppercase; }
  #overlay h1 span { color:#ffff00; text-shadow:0 0 20px #ffff00,0 0 60px #ffaa00; }
  .ov-detail { font-size:12px; color:#0ff; opacity:0.6; letter-spacing:4px; }
  .ov-sub { font-size:13px; color:#0ff; opacity:0.65; letter-spacing:5px; animation:blink 1.2s step-start infinite; margin-top:8px; }
  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:0} }
  #controls { margin-top:10px; font-size:11px; color:rgba(0,255,255,0.3); letter-spacing:3px; text-align:center; }

  #leon-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
  #leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}


  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(400px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 0.6667)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>
<div id="hud">
  <div class="hud-block"><span class="hud-label">Score</span><span class="hud-value" id="score-el">0</span></div>
  <div class="hud-block right"><span class="hud-label">Best</span><span class="hud-value" id="best-el">0</span></div>
</div>
<div id="game-wrapper">
  <canvas id="c" width="400" height="600"></canvas>
  <div id="overlay">
    <h1>FLAPPY <span>BIRD</span></h1>
    <div class="ov-detail">tap · space · click to flap</div>
    <div class="ov-sub">Press SPACE to start</div>
  </div>
</div>
<div id="controls">SPACE / CLICK / TAP &nbsp;·&nbsp; Flap</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TAU = Math.PI * 2;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const GRAVITY     = 0.45;
const FLAP_FORCE  = -8.5;
const PIPE_SPEED  = 2.8;
const PIPE_GAP    = 155;
const PIPE_WIDTH  = 52;
const PIPE_INTERVAL = 90; // frames between pipes
const BIRD_X      = 90;
const BIRD_R      = 14;

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;
let bird, pipes = [], particles = [], floaters = [];
let tick = 0;
let groundX = 0;
let pipeTimer = 0;
let deathTimer = 0;

// Starfield
const stars = Array.from({length:100}, ()=>({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.3+0.2, b: Math.random()*0.5+0.3,
  t: Math.random()*TAU
}));

// ── INPUT ─────────────────────────────────────────────────────────────────────
function flap() {
  if (state === 'idle') { startGame(); return; }
  if (state === 'dead') { if (deathTimer <= 0) restartGame(); return; }
  if (state === 'playing') {
    bird.vy = FLAP_FORCE;
    bird.flapAnim = 1;
    spawnFlapParticles();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive:false});

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() {
  score = 0;
  tick = 0;
  pipeTimer = 40; // short delay before first pipe
  bird = { y: H/2, vy: 0, angle: 0, flapAnim: 0, wingAngle: 0 };
  pipes = [];
  particles = [];
  floaters = [];
  state = 'playing';
  hideOverlay();
  updateHUD();
}

function restartGame() {
  startGame();
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  tick++;

  // Ground scroll always
  groundX = (groundX - PIPE_SPEED) % 24;

  if (state === 'idle') return;

  if (state === 'dead') {
    deathTimer--;
    // Bird falls
    bird.vy = Math.min(bird.vy + GRAVITY * 1.5, 15);
    bird.y += bird.vy;
    bird.angle = Math.min(bird.angle + 0.08, Math.PI/2);
    updateParticles(); updateFloaters();
    return;
  }

  // Bird physics
  bird.vy = Math.min(bird.vy + GRAVITY, 12);
  bird.y += bird.vy;
  bird.angle = Math.max(-0.4, Math.min(bird.vy * 0.065, Math.PI/2));

  // Wing flap animation
  bird.flapAnim = Math.max(0, bird.flapAnim - 0.08);
  bird.wingAngle = Math.sin(tick * 0.3) * 0.4 + (bird.flapAnim * -0.8);

  // Spawn pipes
  pipeTimer--;
  if (pipeTimer <= 0) {
    pipeTimer = PIPE_INTERVAL;
    const gapY = 160 + Math.random() * (H - 320 - 80); // keep gap away from edges
    pipes.push({ x: W + PIPE_WIDTH, gapY, scored: false });
  }

  // Move pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED;
    // Score
    if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < BIRD_X) {
      pipes[i].scored = true;
      score++;
      updateHUD();
      addFloater(BIRD_X, bird.y - 20, '+1');
      spawnScoreParticles();
    }
    // Remove off screen
    if (pipes[i].x + PIPE_WIDTH < -10) pipes.splice(i, 1);
  }

  // Collision
  checkCollisions();

  updateParticles(); updateFloaters();
}

function checkCollisions() {
  // Floor and ceiling
  if (bird.y + BIRD_R >= H - 28 || bird.y - BIRD_R <= 0) {
    die(); return;
  }

  // Pipes
  for (const p of pipes) {
    const bx = BIRD_X, by = bird.y;
    const px = p.x, pw = PIPE_WIDTH;
    // Horizontal overlap
    if (bx + BIRD_R * 0.8 > px && bx - BIRD_R * 0.8 < px + pw) {
      // Vertical: top pipe or bottom pipe
      if (by - BIRD_R * 0.8 < p.gapY - PIPE_GAP/2 ||
          by + BIRD_R * 0.8 > p.gapY + PIPE_GAP/2) {
        die(); return;
      }
    }
  }
}

function die() {
  if (state === 'dead') return;
  state = 'dead';
  deathTimer = 90;
  if (score > best) best = score;
  updateHUD();
  spawnDeathParticles();
  setTimeout(()=>{
    showOverlay(
      score > 0 ? 'GAME OVER' : 'GAME OVER',
      'Score: ' + score + '  ·  Best: ' + best,
      'SPACE or tap to retry'
    );
  }, 900);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnFlapParticles() {
  for (let i = 0; i < 5; i++) {
    const a = Math.PI/2 + (Math.random()-0.5)*1.2;
    const s = 1 + Math.random() * 2.5;
    particles.push({x:BIRD_X, y:bird.y+BIRD_R, vx:Math.cos(a)*s, vy:Math.sin(a)*s, color:'rgba(0,255,204,0.7)', life:1, decay:0.06, size:2+Math.random()*2});
  }
}
function spawnScoreParticles() {
  for (let i = 0; i < 10; i++) {
    const a = Math.random()*TAU, s = 1+Math.random()*3;
    particles.push({x:BIRD_X, y:bird.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, color:'#ffff00', life:1, decay:0.03, size:2+Math.random()*2});
  }
}
function spawnDeathParticles() {
  for (let i = 0; i < 22; i++) {
    const a = Math.random()*TAU, s = 1+Math.random()*5;
    particles.push({x:BIRD_X, y:bird.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, color:i%2===0?'#ffff00':'#ff9900', life:1, decay:0.02+Math.random()*0.02, size:2+Math.random()*4});
  }
}
function updateParticles() {
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; });
}
function addFloater(x,y,val){ floaters.push({x,y,val,life:1}); }
function updateFloaters(){ floaters=floaters.filter(f=>f.life>0); floaters.forEach(f=>{f.y-=0.9;f.life-=0.03;}); }

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-el').textContent = score;
  document.getElementById('best-el').textContent = best;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  // Sky
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#020818'); grad.addColorStop(1,'#041428');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    const tw = 0.3 + Math.sin(tick*0.02+s.t)*0.15;
    ctx.globalAlpha = s.b*tw*2; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Distant city silhouette (parallax)
  ctx.fillStyle = 'rgba(0,40,80,0.5)';
  const buildings = [[20,80,30],[60,60,25],[100,90,35],[145,50,20],[175,75,28],[220,55,22],[255,85,32],[295,65,25],[330,80,30],[360,60,24],[385,70,28]];
  buildings.forEach(([bx,bh,bw])=>{
    const px = ((bx - tick*0.3) % (W+50) + W+50) % (W+50) - 25;
    ctx.fillRect(px, H-28-bh, bw, bh);
    // Windows
    ctx.fillStyle='rgba(0,255,204,0.15)';
    for(let wy=H-28-bh+6; wy<H-28-6; wy+=10)
      for(let wx=px+4; wx<px+bw-4; wx+=8)
        ctx.fillRect(wx,wy,4,5);
    ctx.fillStyle='rgba(0,40,80,0.5)';
  });

  // Pipes
  pipes.forEach(p => drawPipe(p));

  // Ground
  ctx.fillStyle = '#0a2a0a';
  ctx.shadowColor='#00ff44'; ctx.shadowBlur=6;
  ctx.fillRect(0, H-28, W, 28);
  ctx.shadowBlur=0;
  // Ground stripes (scrolling)
  ctx.strokeStyle = 'rgba(0,255,68,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-28); ctx.lineTo(W,H-28); ctx.stroke();
  for(let gx=groundX; gx<W; gx+=24) {
    ctx.beginPath(); ctx.moveTo(gx,H-28); ctx.lineTo(gx+12,H); ctx.stroke();
  }

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,TAU); ctx.fill();
    ctx.restore();
  });

  // Bird
  if (state !== 'idle') drawBird();

  // Floaters
  floaters.forEach(f=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle='#ffff00'; ctx.shadowColor='#ffff00'; ctx.shadowBlur=8;
    ctx.font='bold 14px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText(f.val, f.x, f.y); ctx.restore();
  });

  // Scanline score during play
  if (state === 'playing') {
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.shadowColor='#0ff'; ctx.shadowBlur=20;
    ctx.font='bold 48px Share Tech Mono';
    ctx.textAlign='center';
    ctx.fillText(score, W/2, 70);
    ctx.restore();
  }

  // Paused dim
  if (state === 'dead' && deathTimer > 60) {
    ctx.fillStyle='rgba(255,50,50,0.06)'; ctx.fillRect(0,0,W,H);
  }
}

function drawPipe(p) {
  const topH = p.gapY - PIPE_GAP/2;
  const botY = p.gapY + PIPE_GAP/2;
  const botH = H - 28 - botY;
  const x = p.x, pw = PIPE_WIDTH;

  // Glow
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 14;

  // Top pipe body
  ctx.fillStyle = '#005500';
  ctx.fillRect(x+3, 0, pw-6, topH-8);
  ctx.fillStyle = '#007700';
  ctx.fillRect(x+6, 0, 8, topH-8); // highlight stripe

  // Top pipe cap
  ctx.fillStyle = '#006600';
  ctx.fillRect(x, topH-14, pw, 14);
  ctx.fillStyle = '#009900';
  ctx.fillRect(x+3, topH-14, 8, 14);

  // Bottom pipe body
  ctx.fillStyle = '#005500';
  ctx.fillRect(x+3, botY+14, pw-6, botH);
  ctx.fillStyle = '#007700';
  ctx.fillRect(x+6, botY+14, 8, botH);

  // Bottom pipe cap
  ctx.fillStyle = '#006600';
  ctx.fillRect(x, botY, pw, 14);
  ctx.fillStyle = '#009900';
  ctx.fillRect(x+3, botY, 8, 14);

  ctx.shadowBlur = 0;
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate(bird.angle);

  // Glow
  ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 18;

  // Body
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath(); ctx.ellipse(0, 0, BIRD_R, BIRD_R*0.85, 0, 0, TAU); ctx.fill();

  // Wing
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffaa00';
  const wingY = Math.sin(bird.wingAngle) * 6;
  ctx.beginPath();
  ctx.ellipse(-3, wingY, BIRD_R*0.65, BIRD_R*0.4, bird.wingAngle*0.5, 0, TAU);
  ctx.fill();

  // Eye white
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(5, -3, 6, 6, 0, 0, TAU); ctx.fill();
  // Pupil
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(7, -3, 3, 0, TAU); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(8, -5, 1.2, 0, TAU); ctx.fill();

  // Beak
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.moveTo(BIRD_R-2, -2);
  ctx.lineTo(BIRD_R+9, 1);
  ctx.lineTo(BIRD_R-2, 4);
  ctx.closePath(); ctx.fill();

  // Cheek blush
  ctx.fillStyle = 'rgba(255,100,100,0.4)';
  ctx.beginPath(); ctx.ellipse(4, 4, 5, 3, 0, 0, TAU); ctx.fill();

  ctx.restore();
}

function showOverlay(title, detail, sub) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<h1>${title.includes('OVER') ? 'GAME <span>OVER</span>' : title}</h1><div class="ov-detail">${detail}</div><div class="ov-sub">${sub}</div>`;
}
function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

updateHUD();
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

(function(){
  var s=document.getElementById('leon-splash');
  setTimeout(function(){s.style.opacity='1';},50);
  setTimeout(function(){s.style.opacity='0';},3000);
  setTimeout(function(){s.style.display='none';s.style.pointerEvents='none';},3900);
})();
</script>

<!-- overlay-tap-fix -->


<script>
// ── MOBILE: tap to start / play ───────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.querySelectorAll('.ov-sub, .overlay-sub, #start-hint').forEach(function(el) {
    el.textContent = 'Tap to start';
  });
}
['overlay','c'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('touchstart', function(e) { e.preventDefault(); flap(); }, {passive:false});
});
</script>
</body>
</html>
