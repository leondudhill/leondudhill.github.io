<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Share Tech Mono',monospace; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px); pointer-events:none; z-index:10; }
  #hud { display:flex; justify-content:space-between; align-items:flex-end; width:700px; margin-bottom:8px; padding:0 4px; }
  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-block.right { align-items:flex-end; } .hud-block.center { align-items:center; }
  .hud-label { font-size:10px; letter-spacing:5px; color:rgba(0,255,255,0.4); text-transform:uppercase; }
  .hud-value { font-size:32px; color:#fff; text-shadow:0 0 15px #0ff,0 0 35px #0ff; letter-spacing:3px; }
  #lives-row { display:flex; gap:8px; align-items:center; margin-top:2px; }
  #game-wrapper { position:relative; }
  canvas { display:block; border:1px solid rgba(0,255,255,0.2); box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04); border-radius:2px; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); text-align:center; gap:10px; }
  #overlay h1 { font-size:44px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:10px; text-transform:uppercase; }
  .ov-row { display:flex; align-items:center; gap:16px; justify-content:center; margin:2px 0; }
  .ov-pts { font-size:12px; color:#0ff; opacity:0.7; letter-spacing:3px; }
  .ov-sub { font-size:13px; color:#0ff; opacity:0.65; letter-spacing:5px; animation:blink 1.2s step-start infinite; margin-top:10px; }
  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:0} }
  #controls { margin-top:12px; font-size:11px; color:rgba(0,255,255,0.3); letter-spacing:3px; text-align:center; line-height:2; }

  #leon-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
  #leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}


  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(700px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 1.2069)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>
<div id="hud">
  <div class="hud-block"><span class="hud-label">Score</span><span class="hud-value" id="score-el">0</span></div>
  <div class="hud-block center"><span class="hud-label">Wave</span><span class="hud-value" id="wave-el">1</span></div>
  <div class="hud-block right"><span class="hud-label">Lives</span><div id="lives-row"></div></div>
</div>
<div id="game-wrapper">
  <canvas id="c" width="700" height="580"></canvas>
  <div id="overlay">
    <h1>SPACE INVADERS</h1>
    <div style="margin:8px 0 4px;font-size:11px;color:rgba(0,255,255,0.5);letter-spacing:4px;">SCORE TABLE</div>
    <div class="ov-row"><canvas id="prev-a" width="32" height="24"></canvas><span class="ov-pts">= 40 PTS</span></div>
    <div class="ov-row"><canvas id="prev-b" width="32" height="24"></canvas><span class="ov-pts">= 20 PTS</span></div>
    <div class="ov-row"><canvas id="prev-c" width="32" height="24"></canvas><span class="ov-pts">= 10 PTS</span></div>
    <div class="ov-row"><canvas id="prev-ufo" width="40" height="24"></canvas><span class="ov-pts">= ???  PTS</span></div>
    <div class="ov-sub" id="start-hint">Press SPACE to start</div>
  </div>
</div>
<div id="controls">← → &nbsp;·&nbsp; Move &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &nbsp;·&nbsp; Fire &nbsp;&nbsp;|&nbsp;&nbsp; P &nbsp;·&nbsp; Pause</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TAU = Math.PI * 2;

// ── ALIEN SHAPES (pixel art, 11×8 grid) ───────────────────────────────────────
// Each shape: array of [col, row] pixels that are ON
const SHAPES = {
  // Type A — squid (top row) — 40pts
  a: [
    [4,0],[5,0],[6,0],
    [3,1],[4,1],[5,1],[6,1],[7,1],
    [2,2],[3,2],[4,2],[5,2],[6,2],[7,2],[8,2],
    [1,3],[2,3],[4,3],[5,3],[6,3],[8,3],[9,3],
    [1,4],[2,4],[3,4],[4,4],[5,4],[6,4],[7,4],[8,4],[9,4],
    [2,5],[3,5],[6,5],[7,5],
    [1,6],[3,6],[4,6],[5,6],[6,6],[8,6],
    [2,7],[3,7],[7,7],[8,7],
  ],
  // Type B — crab (middle rows) — 20pts
  b: [
    [2,0],[8,0],
    [3,1],[7,1],
    [2,2],[3,2],[4,2],[5,2],[6,2],[7,2],[8,2],
    [1,3],[2,3],[3,3],[5,3],[7,3],[8,3],[9,3],
    [0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4],[7,4],[8,4],[9,4],[10,4],
    [0,5],[2,5],[3,5],[4,5],[5,5],[6,5],[7,5],[8,5],[10,5],
    [0,6],[2,6],[8,6],[10,6],
    [3,7],[4,7],[6,7],[7,7],
  ],
  // Type C — octopus (bottom rows) — 10pts
  c: [
    [3,0],[4,0],[5,0],[6,0],[7,0],
    [2,1],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],
    [1,2],[2,2],[4,2],[5,2],[6,2],[8,2],[9,2],
    [1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],[9,3],
    [2,4],[5,4],[6,4],[9,4],
    [2,5],[3,5],[5,5],[6,5],[7,5],[8,5],
    [1,6],[4,6],[5,6],[6,6],[9,6],
    [1,7],[2,7],[8,7],[9,7],
  ],
};
// Frame 2 variants (shifted legs)
const SHAPES2 = {
  a: SHAPES.a.map(([c,r]) => [c,r]).map(([c,r]) => r===7 ? [c===2?1:c===3?4:c===7?6:c===8?9:c,r] : [c,r]),
  b: SHAPES.b.map(([c,r]) => r>=6 ? [c,r===6?c+1>10?c:c+1:c,r] : [c,r]),
  c: SHAPES.c.map(([c,r]) => r===7 ? [c===1?2:c===2?1:c===8?9:c===9?8:c,r] : [c,r]),
};

const ALIEN_COLORS = { a:'#ff3366', b:'#00ffcc', c:'#ffff00' };
const ALIEN_PX = 11; // pixel size of each dot in alien sprite
const ALIEN_W = 36, ALIEN_H = 28; // bounding box per alien cell
const COLS = 11, ALIEN_ROWS = 5;
const ALIEN_ROW_TYPES = ['a','b','b','c','c']; // top to bottom

// ── BUNKERS (pixel map 22×16) ─────────────────────────────────────────────────
function makeBunkerShape() {
  const w=22, h=16;
  const pixels = [];
  for (let r=0;r<h;r++) for (let c=0;c<w;c++) {
    // Arch cutout at bottom centre
    if (r>10 && c>7 && c<14) continue;
    // Round top corners
    if (r<3 && (c<3 || c>w-4)) continue;
    pixels.push([c,r]);
  }
  return pixels;
}
const BUNKER_SHAPE = makeBunkerShape();
const BUNKER_PX = 4;
const BUNKER_COLS = 22, BUNKER_ROWS = 16;

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = 'idle';
let score = 0, hiScore = 0, lives = 3, wave = 1;
let aliens, alienDir, alienDropPending, alienStepTimer, alienStepInterval;
let bullets, alienBullets, particles, floaters;
let bunkers;
let ship, shipCooldown = 0;
let ufo, ufoTimer = 0, ufoDir = 1;
let starfield = [];
let firePressed = false;
let tick = 0;

// Starfield
for (let i=0;i<120;i++) starfield.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,b:Math.random()*0.5+0.3,t:Math.random()*TAU});

// ── INPUT ─────────────────────────────────────────────────────────────────────
const KEYS = {};
document.addEventListener('keydown', e => {
  if (KEYS[e.key]) return;
  KEYS[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state==='idle'||state==='gameover') startGame();
    else if (state==='dead') respawn();
    else if (state==='playing') firePressed = true;
  }
  if (e.key==='p'||e.key==='P') {
    if (state==='playing') state='paused';
    else if (state==='paused') { state='playing'; firePressed=false; }
  }
});
document.addEventListener('keyup', e => { KEYS[e.key] = false; });

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() {
  score=0; lives=3; wave=1; firePressed=false;
  initWave(); state='playing'; hideOverlay(); updateHUD();
}
function respawn() {
  ship={x:W/2,y:H-48,w:36,h:20}; shipCooldown=0; firePressed=false;
  state='playing'; hideOverlay();
}
function initWave() {
  ship={x:W/2,y:H-48,w:36,h:20}; shipCooldown=0;
  bullets=[]; alienBullets=[]; particles=[]; floaters=[];
  ufo=null; ufoTimer=rndInt(400,900);
  buildAliens();
  buildBunkers();
  updateHUD();
}
function nextWave() {
  wave++; firePressed=false;
  bullets=[]; alienBullets=[]; particles=[]; floaters=[];
  ufo=null; ufoTimer=rndInt(300,700);
  buildAliens();
  updateHUD();
}

function buildAliens() {
  alienDir = 1;
  alienDropPending = false;
  alienStepInterval = Math.max(1, 4 - Math.floor(wave/2));
  alienStepTimer = alienStepInterval;
  aliens = [];
  const startX = 60, startY = 80;
  for (let row=0;row<ALIEN_ROWS;row++) {
    for (let col=0;col<COLS;col++) {
      const type = ALIEN_ROW_TYPES[row];
      aliens.push({
        col, row, type,
        x: startX + col * ALIEN_W,
        y: startY + row * ALIEN_H,
        alive: true,
        frame: 0,
      });
    }
  }
}

function buildBunkers() {
  bunkers = [];
  const positions = [110, 240, 370, 500, 630];
  positions.forEach(bx => {
    const cells = {};
    BUNKER_SHAPE.forEach(([c,r]) => { cells[c+','+r] = true; });
    bunkers.push({ x: bx - (BUNKER_COLS*BUNKER_PX)/2, y: H-150, cells });
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function rnd(a,b){return a+Math.random()*(b-a);}
function rndInt(a,b){return Math.floor(rnd(a,b));}
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  if (state!=='playing') return;
  tick++;

  moveShip();
  shootShip();
  stepAliens();
  shootAliens();
  moveUFO();
  moveBullets();
  checkCollisions();
  updateParticles(); updateFloaters();

  // Win wave
  if (aliens.every(a=>!a.alive) && !ufo) nextWave();
}

function moveShip() {
  const spd = 8;
  if (KEYS['ArrowLeft']||KEYS['a']||KEYS['A'])  ship.x = Math.max(ship.w/2, ship.x - spd);
  if (KEYS['ArrowRight']||KEYS['d']||KEYS['D']) ship.x = Math.min(W - ship.w/2, ship.x + spd);
}

function shootShip() {
  shipCooldown--;
  const wantFire = firePressed || KEYS['z'] || KEYS['Z'];
  firePressed = false;
  if (wantFire && shipCooldown<=0 && bullets.filter(b=>b.fromPlayer).length<4) {
    bullets.push({ x:ship.x, y:ship.y-ship.h/2, vy:-36, fromPlayer:true, life:200 });
    shipCooldown = 6;
  }
}

function stepAliens() {
  alienStepTimer--;
  if (alienStepTimer > 0) return;
  alienStepTimer = Math.max(3, alienStepInterval - Math.floor((COLS*ALIEN_ROWS - aliens.filter(a=>a.alive).length) * 0.4));

  if (alienDropPending) {
    aliens.forEach(a=>{ if(a.alive) a.y += 18; });
    alienDir *= -1;
    alienDropPending = false;
    // Check if aliens reached ship line
    const bottomY = Math.max(...aliens.filter(a=>a.alive).map(a=>a.y));
    if (bottomY >= ship.y - 20) { shipDeath(); return; }
  } else {
    let hitEdge = false;
    aliens.forEach(a=>{
      if (!a.alive) return;
      a.x += alienDir * 12;
      a.frame = 1 - a.frame;
      if (a.x < 20 || a.x > W-20) hitEdge = true;
    });
    if (hitEdge) alienDropPending = true;
  }
}

function shootAliens() {
  if (tick % 8 !== 0) return;
  const alive = aliens.filter(a=>a.alive);
  if (!alive.length) return;
  // Pick random bottom-most alien in a random column
  const cols = [...new Set(alive.map(a=>a.col))];
  const col = cols[rndInt(0, cols.length)];
  const colAliens = alive.filter(a=>a.col===col);
  const shooter = colAliens.reduce((bot,a)=>a.y>bot.y?a:bot, colAliens[0]);
  alienBullets.push({ x:shooter.x, y:shooter.y+14, vy:24+wave*2, life:300 });
}

function moveUFO() {
  ufoTimer--;
  if (ufoTimer<=0 && !ufo) {
    ufoDir = Math.random()<0.5 ? 1 : -1;
    ufo = { x: ufoDir===1 ? -30 : W+30, y:45, vx: ufoDir*2.2 };
    ufoTimer = rndInt(400,900);
  }
  if (!ufo) return;
  ufo.x += ufo.vx;
  if (ufo.x < -40 || ufo.x > W+40) ufo = null;
}

function moveBullets() {
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i]; b.y+=b.vy; b.life--;
    if (b.life<=0||b.y<0||b.y>H) { bullets.splice(i,1); }
  }
  for (let i=alienBullets.length-1;i>=0;i--) {
    const b=alienBullets[i]; b.y+=b.vy; b.life--;
    if (b.life<=0||b.y>H) { alienBullets.splice(i,1); }
  }
}

function checkCollisions() {
  // Player bullets vs aliens
  for (let bi=bullets.length-1;bi>=0;bi--) {
    const b=bullets[bi];
    if (!b.fromPlayer) continue;
    // vs UFO
    if (ufo && Math.abs(b.x-ufo.x)<22 && Math.abs(b.y-ufo.y)<12) {
      const pts=[50,100,150,300][rndInt(0,4)];
      score+=pts; updateHUD();
      addFloater(ufo.x,ufo.y,pts);
      explode(ufo.x,ufo.y,'#ff3366',16);
      ufo=null; ufoTimer=rndInt(400,900);
      bullets.splice(bi,1); continue;
    }
    // vs aliens
    let hit=false;
    for (let ai=aliens.length-1;ai>=0;ai--) {
      const a=aliens[ai]; if(!a.alive) continue;
      if (Math.abs(b.x-a.x)<16 && Math.abs(b.y-a.y)<14) {
        a.alive=false;
        const pts=a.type==='a'?40:a.type==='b'?20:10;
        score+=pts; updateHUD();
        addFloater(a.x,a.y,pts);
        explode(a.x,a.y,ALIEN_COLORS[a.type],8);
        bullets.splice(bi,1); hit=true; break;
      }
    }
    if (hit) continue;
    // vs bunkers
    if (!hit) hitBunker(b, bi, true);
  }

  // Alien bullets vs ship
  for (let bi=alienBullets.length-1;bi>=0;bi--) {
    const b=alienBullets[bi];
    if (Math.abs(b.x-ship.x)<16 && Math.abs(b.y-ship.y)<12) {
      explode(ship.x,ship.y,'#00ffcc',20);
      alienBullets.splice(bi,1);
      shipDeath(); return;
    }
    // vs bunkers
    hitBunker(b, bi, false);
  }

  // Aliens marching into bunkers
  aliens.forEach(a=>{
    if (!a.alive) return;
    bunkers.forEach(bk=>{
      const bx=bk.x, by=bk.y;
      if (a.x+12>bx && a.x-12<bx+BUNKER_COLS*BUNKER_PX && a.y+10>by && a.y-10<by+BUNKER_ROWS*BUNKER_PX) {
        // Crush several cells
        for (let r=0;r<BUNKER_ROWS;r++) for (let c=0;c<BUNKER_COLS;c++) delete bk.cells[c+','+r];
      }
    });
  });
}

function hitBunker(b, bi, fromPlayer) {
  bunkers.forEach(bk=>{
    if (!bullets[bi] && !alienBullets[bi]) return;
    const lc = Math.floor((b.x - bk.x) / BUNKER_PX);
    const lr = Math.floor((b.y - bk.y) / BUNKER_PX);
    // Check a small area
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      const key=(lc+dc)+','+(lr+dr);
      if (bk.cells[key]) {
        delete bk.cells[key];
        spawnParticle(b.x,b.y,'#00ff88',4);
        if (fromPlayer) { const idx=bullets.indexOf(b); if(idx>=0) bullets.splice(idx,1); }
        else { const idx=alienBullets.indexOf(b); if(idx>=0) alienBullets.splice(idx,1); }
        return;
      }
    }
  });
}

function shipDeath() {
  lives--; updateHUD();
  if (lives<=0) {
    if (score>hiScore) hiScore=score;
    state='gameover';
    showOverlay('GAME OVER','Score: '+score, isMobile ? 'Tap to try again' : 'Press SPACE to try again');
  } else {
    state='dead';
    showOverlay('DESTROYED!',lives+(lives===1?' life':' lives')+' remaining', isMobile ? 'Tap to continue' : 'Press SPACE to continue');
  }
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParticle(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU,s=rnd(0.5,3);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,life:rnd(15,35),maxLife:35,size:rnd(1,2.5)});
  }
}
function explode(x,y,color,n){spawnParticle(x,y,color,n);}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life--;});
}
function addFloater(x,y,val){floaters.push({x,y,val,life:1});}
function updateFloaters(){floaters=floaters.filter(f=>f.life>0);floaters.forEach(f=>{f.y-=0.7;f.life-=0.022;});}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-el').textContent=score;
  document.getElementById('wave-el').textContent=wave;
  const lr=document.getElementById('lives-row'); lr.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','20');svg.setAttribute('height','18');svg.setAttribute('viewBox','0 0 20 18');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','10,1 18,16 14,13 6,13 2,16');
    p.setAttribute('fill','none');p.setAttribute('stroke','#0ff');p.setAttribute('stroke-width','1.5');
    p.style.filter='drop-shadow(0 0 3px #0ff)';
    svg.appendChild(p);lr.appendChild(svg);
  }
}

// ── DRAW ALIEN (pixel art) ────────────────────────────────────────────────────
function drawAlienSprite(ctx2, type, frame, color, scale) {
  const shape = frame===0 ? SHAPES[type] : SHAPES2[type];
  const px = scale || 2.8;
  ctx2.fillStyle = color;
  ctx2.shadowColor = color; ctx2.shadowBlur = 4;
  shape.forEach(([c,r]) => {
    ctx2.fillRect(c*px - 5.5*px, r*px - 4*px, px-0.5, px-0.5);
  });
  ctx2.shadowBlur = 0;
}

// ── DRAW SHIP ─────────────────────────────────────────────────────────────────
function drawShip(ctx2, x, y, scale) {
  const s = scale || 1;
  ctx2.strokeStyle = '#00ffcc'; ctx2.lineWidth = 1.5*s;
  ctx2.shadowColor = '#00ffcc'; ctx2.shadowBlur = 12*s;
  ctx2.beginPath();
  ctx2.moveTo(x, y - 10*s);
  ctx2.lineTo(x + 14*s, y + 8*s);
  ctx2.lineTo(x + 8*s, y + 5*s);
  ctx2.lineTo(x - 8*s, y + 5*s);
  ctx2.lineTo(x - 14*s, y + 8*s);
  ctx2.closePath(); ctx2.stroke();
  // Cannon
  ctx2.beginPath();ctx2.moveTo(x,y-10*s);ctx2.lineTo(x,y-16*s);ctx2.stroke();
  ctx2.shadowBlur = 0;
}

// ── DRAW UFO ──────────────────────────────────────────────────────────────────
function drawUFO(ctx2, x, y) {
  ctx2.strokeStyle='#ff3366'; ctx2.lineWidth=1.5;
  ctx2.shadowColor='#ff3366'; ctx2.shadowBlur=14;
  ctx2.beginPath(); ctx2.ellipse(x,y,22,9,0,0,TAU); ctx2.stroke();
  ctx2.beginPath(); ctx2.ellipse(x,y-5,11,7,0,Math.PI,0); ctx2.stroke();
  // lights
  [-8,0,8].forEach(ox=>{
    ctx2.fillStyle='#ff3366'; ctx2.shadowBlur=8;
    ctx2.beginPath(); ctx2.arc(x+ox,y-4,2,0,TAU); ctx2.fill();
  });
  ctx2.shadowBlur=0;
}

// ── MAIN DRAW ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#020a0a'; ctx.fillRect(0,0,W,H);

  // Stars
  starfield.forEach(s=>{
    const tw=0.3+Math.sin(tick*0.018+s.t)*0.15;
    ctx.globalAlpha=s.b*tw*2; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill();
  });
  ctx.globalAlpha=1;

  if(state==='idle') return;

  // Ground line
  ctx.strokeStyle='rgba(0,255,204,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-28); ctx.lineTo(W,H-28); ctx.stroke();

  // Bunkers
  bunkers.forEach(bk=>{
    for(const key in bk.cells){
      const [c,r]=key.split(',').map(Number);
      const hp=1;
      ctx.fillStyle=`rgba(0,255,136,${0.7+Math.random()*0.1})`;
      ctx.shadowColor='#00ff88'; ctx.shadowBlur=2;
      ctx.fillRect(bk.x+c*BUNKER_PX, bk.y+r*BUNKER_PX, BUNKER_PX-0.5, BUNKER_PX-0.5);
    }
  });
  ctx.shadowBlur=0;

  // Aliens
  aliens.forEach(a=>{
    if(!a.alive) return;
    ctx.save(); ctx.translate(a.x, a.y);
    drawAlienSprite(ctx, a.type, a.frame, ALIEN_COLORS[a.type], 2.8);
    ctx.restore();
  });

  // UFO
  if(ufo) drawUFO(ctx, ufo.x, ufo.y);

  // Ship
  if(state==='playing'||state==='paused') drawShip(ctx, ship.x, ship.y, 1);

  // Player bullets
  bullets.forEach(b=>{
    ctx.fillStyle='#00ffcc'; ctx.shadowColor='#00ffcc'; ctx.shadowBlur=10;
    ctx.fillRect(b.x-1.5, b.y-6, 3, 12);
    ctx.shadowBlur=0;
  });

  // Alien bullets — zigzag style
  alienBullets.forEach(b=>{
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.5;
    ctx.shadowColor='#ff2222'; ctx.shadowBlur=8;
    const zig=Math.sin(tick*0.4+b.x*0.3)*3;
    ctx.beginPath(); ctx.moveTo(b.x+zig,b.y-5); ctx.lineTo(b.x-zig,b.y); ctx.lineTo(b.x+zig,b.y+5); ctx.stroke();
    ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.size),0,TAU); ctx.fill();
    ctx.restore();
  });

  // Floaters
  floaters.forEach(f=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=6;
    ctx.font='bold 11px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('+'+f.val, f.x, f.y); ctx.restore();
  });

  // Alien count warning
  const aliveCount=aliens.filter(a=>a.alive).length;
  if(aliveCount<=6) {
    ctx.save(); ctx.globalAlpha=0.5+Math.sin(tick*0.15)*0.2;
    ctx.fillStyle='#ff3366'; ctx.font='10px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText('⚠ CRITICAL — '+aliveCount+' INVADERS REMAIN', W/2, H-10);
    ctx.restore();
  }

  // Paused
  if(state==='paused') {
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.shadowColor='#0ff'; ctx.shadowBlur=20;
    ctx.font='32px Share Tech Mono'; ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font='13px Share Tech Mono'; ctx.fillText('P to resume',W/2,H/2+26);
    ctx.shadowBlur=0;
  }
}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
function showOverlay(title,detail,sub){
  const ov=document.getElementById('overlay'); ov.style.display='flex';
  ov.innerHTML='<h1>'+title+'</h1><div class="ov-detail">'+detail+'</div><div class="ov-sub">'+sub+'</div>';
}
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }

// ── SCORE TABLE PREVIEWS ─────────────────────────────────────────────────────
function drawPreviews() {
  [['a','#ff3366'],['b','#00ffcc'],['c','#ffff00']].forEach(([type,color],i)=>{
    const cv=document.getElementById('prev-'+type);
    if(!cv) return;
    const c2=cv.getContext('2d'); c2.clearRect(0,0,cv.width,cv.height);
    c2.save(); c2.translate(cv.width/2, cv.height/2);
    drawAlienSprite(c2,type,0,color,2.2);
    c2.restore();
  });
  const cu=document.getElementById('prev-ufo');
  if(cu){const c2=cu.getContext('2d');c2.clearRect(0,0,cu.width,cu.height);drawUFO(c2,cu.width/2,cu.height/2+2);}
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
updateHUD(); drawPreviews();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();

(function(){
  var s=document.getElementById('leon-splash');
  // Hide canvas on mobile to prevent flash at native size before CSS scales it
  var _cv=document.getElementById('c');
  if(('ontouchstart' in window)||navigator.maxTouchPoints>0){ _cv.style.visibility='hidden'; }
  setTimeout(function(){s.style.opacity='1';},50);
  setTimeout(function(){s.style.opacity='0';},3000);
  setTimeout(function(){s.style.display='none';s.style.pointerEvents='none';if(_cv)_cv.style.visibility='visible';},3900);
})();
</script>



<script>
// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.querySelectorAll('.ov-sub, .overlay-sub, #start-hint, .ov-sub-mobile').forEach(function(el) {
    if (el.textContent.indexOf('SPACE') !== -1 || el.textContent.indexOf('start') !== -1 || el.textContent.indexOf('again') !== -1 || el.textContent.indexOf('continue') !== -1) {
      el.textContent = el.textContent.replace('Press SPACE to start', 'Tap to start').replace('Press SPACE to play again', 'Tap to play again').replace('Press SPACE to try again', 'Tap to try again').replace('Press SPACE to continue', 'Tap to continue');
    }
  });
}

document.getElementById('overlay').addEventListener('touchstart', function(e) {
  e.preventDefault();
    if (state==='idle'||state==='gameover') { startGame(); return; }
  if (state==='paused') { state='playing';firePressed=false; return; }
}, {passive:false});

var _touchStartTime = 0, _touchDidDrag = false, _touchLastX = null;
document.getElementById('c').addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0]; _touchLastX = t.clientX; _touchStartTime = Date.now(); _touchDidDrag = false;
    if (state==='idle'||state==='gameover') { startGame(); return; }
  if (state==='paused') { state='playing';firePressed=false; return; }
}, {passive:false});
document.getElementById('c').addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (state !== 'playing') return;
  var t = e.touches[0];
  var dx = t.clientX - _touchLastX; _touchLastX = t.clientX;
  if (Math.abs(dx) > 2) _touchDidDrag = true;
  var rect = document.getElementById('c').getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  ship.x += dx * scaleX; ship.x = Math.max(ship.w/2, Math.min(W - ship.w/2, ship.x));
}, {passive:false});
document.getElementById('c').addEventListener('touchend', function(e) {
  e.preventDefault();
  if (state !== 'playing') return;
  if (!_touchDidDrag && Date.now() - _touchStartTime < 250) { firePressed = true; }
}, {passive:false});

</script>
