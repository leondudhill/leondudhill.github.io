<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Search</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --text: #202124;
    --link: #1a0dab;
    --link-visited: #681da8;
    --url-green: #006621;
    --snippet: #4d5156;
    --border: #dfe1e5;
    --hover-bg: #f8f9fa;
    --tab-active: #1a73e8;
    --btn-bg: #f8f9fa;
    --btn-hover: #e8eaed;
    --header-border: #e0e0e0;
    --news-date: #70757a;
  }

  body {
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HOME PAGE ===== */
  #home-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  .home-logo {
    margin-bottom: 28px;
    font-size: 72px;
    font-family: 'Google Sans', Arial, sans-serif;
    letter-spacing: -2px;
    user-select: none;
  }
  .home-logo img { max-height: 92px; max-width: 320px; object-fit: contain; }
  .logo-m { color: #4285F4; }
  .logo-o1 { color: #EA4335; }
  .logo-v { color: #FBBC05; }
  .logo-i { color: #4285F4; }
  .logo-e { color: #34A853; }
  .logo-space { display: inline-block; width: 10px; }
  .logo-s { color: #EA4335; }
  .logo-e2 { color: #4285F4; }
  .logo-a { color: #FBBC05; }
  .logo-r { color: #34A853; }
  .logo-c { color: #EA4335; }
  .logo-h { color: #4285F4; }

  .home-search-box {
    display: flex;
    align-items: center;
    width: 560px;
    max-width: 90vw;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 16px;
    background: white;
    box-shadow: none;
    transition: box-shadow 0.2s;
    cursor: text;
  }
  .home-search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    border-color: rgba(223,225,229,0);
  }
  .home-search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: 'Roboto', Arial, sans-serif;
    color: var(--text);
    background: transparent;
  }
  .home-search-box .search-icon {
    color: #9aa0a6;
    margin-right: 12px;
    font-size: 18px;
  }
  .home-search-box .mic-icon {
    color: #4285F4;
    cursor: pointer;
    font-size: 18px;
    margin-left: 8px;
  }

  .home-btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .home-btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-bg);
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    font-family: 'Roboto', Arial, sans-serif;
  }
  .home-btn:hover {
    border-color: var(--border);
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    background: var(--btn-hover);
  }

  /* top links on home */
  .home-top-links {
    position: absolute;
    top: 14px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .home-top-links a {
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    padding: 8px;
    border-radius: 4px;
  }
  .home-top-links a:hover { background: var(--hover-bg); }
  .sign-in-btn {
    background: #1a73e8 !important;
    color: white !important;
    border-radius: 4px;
    padding: 9px 20px !important;
    font-weight: 500;
  }
  .sign-in-btn:hover { background: #1765cc !important; }
  .customize-btn {
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    padding: 8px;
    border-radius: 4px;
    border: none;
    background: none;
    font-family: 'Roboto', Arial, sans-serif;
  }
  .customize-btn:hover { background: var(--hover-bg); }

  /* ===== RESULTS PAGE ===== */
  #results-page { display: none; }

  .results-header {
    border-bottom: 1px solid var(--header-border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .results-top {
    display: flex;
    align-items: center;
    padding: 10px 0 4px;
    gap: 16px;
  }

  .results-logo {
    font-family: 'Google Sans', Arial, sans-serif;
    font-size: 26px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .results-logo img { max-height: 34px; max-width: 120px; object-fit: contain; }

  .results-search-box {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px;
    width: 570px;
    max-width: calc(100vw - 260px);
    background: white;
    transition: box-shadow 0.15s;
  }
  .results-search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    border-color: rgba(223,225,229,0);
  }
  .results-search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: 'Roboto', Arial, sans-serif;
    color: var(--text);
    background: transparent;
  }
  .results-search-box .search-icon { color: #9aa0a6; font-size: 18px; margin-right: 10px; }
  .results-search-box .clear-icon { color: #9aa0a6; cursor: pointer; font-size: 18px; margin-right: 4px; }
  .results-search-box .divider { width: 1px; height: 24px; background: var(--border); margin: 0 8px; }
  .results-search-box .mic-icon { color: #4285F4; font-size: 18px; cursor: pointer; }

  .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .header-right a {
    font-size: 13px; color: var(--text); text-decoration: none; padding: 8px;
    border-radius: 4px;
  }
  .header-right a:hover { background: var(--hover-bg); }

  /* Tabs */
  .results-tabs {
    display: flex;
    gap: 0;
    padding-top: 4px;
    overflow-x: auto;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px 12px;
    font-size: 13px;
    color: #70757a;
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    font-family: 'Roboto', Arial, sans-serif;
    white-space: nowrap;
    transition: color 0.1s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--tab-active);
    border-bottom-color: var(--tab-active);
  }
  .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ===== RESULTS BODY ===== */
  .results-body { padding: 20px 0 20px 180px; max-width: 800px; }

  .results-stats { font-size: 13px; color: #70757a; margin-bottom: 22px; }

  /* Web Results */
  .web-result { margin-bottom: 28px; max-width: 620px; }
  .web-result .result-url { font-size: 13px; color: var(--snippet); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
  .web-result .result-favicon { width: 16px; height: 16px; border-radius: 50%; background: #e8eaed; flex-shrink: 0; }
  .web-result .result-title { font-size: 20px; color: var(--link); text-decoration: none; line-height: 1.3; cursor: pointer; }
  .web-result .result-title:hover { text-decoration: underline; }
  .web-result .result-snippet { font-size: 14px; color: var(--snippet); line-height: 1.58; margin-top: 4px; }
  .web-result .result-date { color: #70757a; }
  .web-result .breadcrumb { color: var(--snippet); font-size: 13px; }

  /* Image Results */
  /* tab visibility handled by .tab-content / .tab-content.active only */
  .images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    padding: 10px 20px 20px 180px;
  }
  .image-card {
    width: 100%;
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .image-card:hover { opacity: 0.9; }
  .image-card img { width: 100%; height: 150px; object-fit: cover; display: block; background: #e8eaed; }
  .image-card .img-label { font-size: 12px; color: var(--snippet); padding: 4px 2px; line-height: 1.3; }
  .image-card .img-source { font-size: 12px; color: #70757a; }

  /* Video Results */
  /* videos tab */
  .video-result { display: flex; gap: 14px; margin-bottom: 26px; max-width: 700px; padding-left: 180px; }
  .video-thumb { width: 160px; height: 90px; border-radius: 8px; object-fit: cover; background: #e8eaed; flex-shrink: 0; cursor: pointer; }
  .video-info { flex: 1; }
  .video-title { font-size: 16px; color: var(--link); cursor: pointer; margin-bottom: 4px; line-height: 1.3; }
  .video-title:hover { text-decoration: underline; }
  .video-meta { font-size: 13px; color: #70757a; margin-bottom: 4px; }
  .video-snippet { font-size: 13px; color: var(--snippet); line-height: 1.5; }
  .video-play-icon { background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; position: absolute; bottom: 8px; right: 8px; }
  .video-thumb-wrap { position: relative; flex-shrink: 0; }

  /* News Results */
  /* news tab */
  .news-result { display: flex; gap: 14px; margin-bottom: 22px; max-width: 700px; padding-left: 180px; border-bottom: 1px solid #ebebeb; padding-bottom: 22px; }
  .news-result:last-child { border-bottom: none; }
  .news-text { flex: 1; }
  .news-source { font-size: 12px; color: var(--snippet); font-weight: 500; margin-bottom: 2px; }
  .news-title { font-size: 16px; color: var(--link); cursor: pointer; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
  .news-title:hover { text-decoration: underline; }
  .news-snippet { font-size: 13px; color: var(--snippet); line-height: 1.5; margin-bottom: 4px; }
  .news-date { font-size: 12px; color: var(--news-date); }
  .news-img { width: 92px; height: 68px; border-radius: 8px; object-fit: cover; background: #e8eaed; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 8px;
    width: 680px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: white; z-index: 1;
  }
  .modal-header h2 { font-size: 18px; font-weight: 500; color: var(--text); }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #70757a; padding: 2px 8px; border-radius: 4px; }
  .modal-close:hover { background: var(--hover-bg); }
  .modal-body { padding: 20px 24px; }

  .modal-section { margin-bottom: 28px; }
  .modal-section h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }

  .modal-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .modal-row label { font-size: 13px; color: #5f6368; }
  .modal-row input[type="text"],
  .modal-row input[type="url"],
  .modal-row input[type="color"],
  .modal-row textarea {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Roboto', Arial, sans-serif;
    color: var(--text);
    width: 100%;
    outline: none;
    resize: vertical;
  }
  .modal-row input[type="color"] { padding: 2px 4px; height: 36px; width: 60px; cursor: pointer; }
  .modal-row input:focus, .modal-row textarea:focus { border-color: #1a73e8; }

  .modal-row-inline { display: flex; gap: 10px; align-items: flex-start; }
  .modal-row-inline .modal-row { flex: 1; }

  .result-preset { background: #f8f9fa; border-radius: 6px; padding: 12px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
  .result-preset-title { font-size: 12px; font-weight: 500; color: #5f6368; margin-bottom: 8px; }

  .image-preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .image-preset { background: #f8f9fa; border-radius: 6px; padding: 8px; border: 1px solid #e0e0e0; }
  .image-preset label { font-size: 11px; color: #5f6368; display: block; margin-bottom: 4px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0; background: white;
  }
  .btn-cancel {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 20px; font-size: 14px; cursor: pointer; font-family: 'Roboto', Arial, sans-serif;
    color: var(--text);
  }
  .btn-cancel:hover { background: var(--hover-bg); }
  .btn-save {
    background: #1a73e8; border: none; border-radius: 4px;
    padding: 8px 20px; font-size: 14px; color: white; cursor: pointer;
    font-family: 'Roboto', Arial, sans-serif; font-weight: 500;
  }
  .btn-save:hover { background: #1765cc; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .tabs-nav {
    display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  .tabs-nav-btn {
    padding: 8px 16px; font-size: 13px; color: #70757a; cursor: pointer;
    border: none; background: none; border-bottom: 2px solid transparent;
    font-family: 'Roboto', Arial, sans-serif;
  }
  .tabs-nav-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }

  .no-results { color: #70757a; font-size: 15px; padding: 20px 0 20px 180px; }

  @media (max-width: 768px) {
    .results-body, .video-result, .news-result { padding-left: 20px; }
    .images-grid { padding-left: 20px; padding-right: 20px; }
    .results-search-box { max-width: calc(100vw - 160px); }
    .home-logo { font-size: 52px; }
    .results-logo { font-size: 20px; }
    .video-result, .news-result { flex-direction: column; }
    .video-thumb { width: 100%; height: 160px; }
    .news-img { width: 80px; height: 60px; }
  }

  /* ===== SPLASH SCREEN ===== */
  #splash-screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.6s ease;
  }
  #splash-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  #splash-screen.hidden {
    display: none;
  }
  .splash-title {
    font-family: 'Google Sans', Arial, sans-serif;
    font-size: 18px;
    color: #5f6368;
    letter-spacing: 0.5px;
  }
  .splash-name {
    font-family: 'Google Sans', Arial, sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: #202124;
    margin-top: 6px;
    letter-spacing: -0.5px;
  }
  .splash-dots {
    display: flex;
    gap: 8px;
    margin-top: 32px;
  }
  .splash-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: splashBounce 1.2s ease-in-out infinite;
  }
  .splash-dot:nth-child(1) { background: #4285F4; animation-delay: 0s; }
  .splash-dot:nth-child(2) { background: #EA4335; animation-delay: 0.15s; }
  .splash-dot:nth-child(3) { background: #FBBC05; animation-delay: 0.3s; }
  .splash-dot:nth-child(4) { background: #34A853; animation-delay: 0.45s; }
  @keyframes splashBounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1.1); opacity: 1; }
  }
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity 0.6s ease;">
  <p style="font-family:sans-serif;font-size:14px;color:#202124;opacity:0.6;margin-bottom:6px;letter-spacing:0.5px;">An App by</p>
  <p style="font-family:sans-serif;font-size:26px;font-weight:700;color:#202124;letter-spacing:-0.5px;">Leon Dudhill</p>
  <div style="display:flex;gap:8px;margin-top:24px;"><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#4285F4;animation-delay:0.0s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#EA4335;animation-delay:0.15s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#FBBC05;animation-delay:0.3s"></div><div style="width:10px;height:10px;border-radius:50%;animation:splash_bounce 1.2s ease-in-out infinite;background:#34A853;animation-delay:0.44999999999999996s"></div></div>
</div>

<!-- ===== SPLASH SCREEN ===== -->
<div id="splash-screen">
  <div class="splash-title">An App by</div>
  <div class="splash-name">Leon Dudhill</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div id="home-page">
  <div class="home-top-links">
    <button class="customize-btn" onclick="openModal()">Customise</button>
    <a href="http://www.leondudhill.com/movie-email.html" target="_blank" id="gmail-link-home">Email</a>
    <a href="#" onclick="return false;" class="sign-in-btn" id="signin-link-home">Sign in</a>
  </div>

  <div class="home-logo" id="home-logo-el">
    <span class="logo-m">M</span><span class="logo-o1">o</span><span class="logo-v">v</span><span class="logo-i">i</span><span class="logo-e">e</span><span class="logo-space"></span><span class="logo-s">S</span><span class="logo-e2">e</span><span class="logo-a">a</span><span class="logo-r">r</span><span class="logo-c">c</span><span class="logo-h">h</span>
  </div>

  <div class="home-search-box" onclick="document.getElementById('home-input').focus()">
    <span class="search-icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </span>
    <input type="text" id="home-input" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
    <span class="mic-icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </span>
  </div>

  <div class="home-btn-row">
    <button class="home-btn" id="search-btn-el" onclick="doSearch()">Search</button>
    <button class="home-btn" id="lucky-btn-el" onclick="doSearch()">Try My Luck</button>
  </div>
</div>

<!-- ===== RESULTS PAGE ===== -->
<div id="results-page">
  <div class="results-header">
    <div class="results-top">
      <div class="results-logo" id="results-logo-el" onclick="showHome()">
        <span class="logo-m">M</span><span class="logo-o1">o</span><span class="logo-v">v</span><span class="logo-i">i</span><span class="logo-e">e</span><span class="logo-space"></span><span class="logo-s">S</span><span class="logo-e2">e</span><span class="logo-a">a</span><span class="logo-r">r</span><span class="logo-c">c</span><span class="logo-h">h</span>
      </div>

      <div class="results-search-box">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </span>

// ============================================================
// LOAD / SAVE CONFIG
// ============================================================
function loadConfig() {
  try {
    const saved = localStorage.getItem('movieSearchConfig');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge arrays: if saved has fewer entries than default, pad with defaults
      const merged = Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_CONFIG)), parsed);
      if (!parsed.webResults || parsed.webResults.length < DEFAULT_CONFIG.webResults.length) {
        merged.webResults = DEFAULT_CONFIG.webResults.map((def, i) =>
          (parsed.webResults && parsed.webResults[i]) ? parsed.webResults[i] : def
        );
      }
      if (!parsed.videos || parsed.videos.length < DEFAULT_CONFIG.videos.length) {
        merged.videos = DEFAULT_CONFIG.videos.map((def, i) =>
          (parsed.videos && parsed.videos[i]) ? parsed.videos[i] : def
        );
      }
      if (!parsed.images || parsed.images.length < DEFAULT_CONFIG.images.length) {
        merged.images = DEFAULT_CONFIG.images.map((def, i) =>
          (parsed.images && parsed.images[i]) ? parsed.images[i] : def
        );
      }
      if (!parsed.news || parsed.news.length < DEFAULT_CONFIG.news.length) {
        merged.news = DEFAULT_CONFIG.news.map((def, i) =>
          (parsed.news && parsed.news[i]) ? parsed.news[i] : def
        );
      }
      return merged;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}

function saveToStorage(cfg) {
  localStorage.setItem('movieSearchConfig', JSON.stringify(cfg));
}

let config = loadConfig();

// APPLY CONFIG
// ============================================================
function applyConfig() {
  document.body.style.background = config.bgColor;
  document.getElementById('home-page').style.background = config.bgColor;
  document.getElementById('results-page').style.background = config.bgColor;

  // Logos
  renderLogo('home-logo-el', true);
  renderLogo('results-logo-el', false);

  // Buttons & links
  const sb = document.getElementById('search-btn-el');
  const lb = document.getElementById('lucky-btn-el');
  if (sb) sb.textContent = config.searchBtnText || 'Search';
  if (lb) lb.textContent = config.luckyBtnText || 'Try My Luck';
  document.querySelectorAll('#gmail-link-home, #gmail-link-results').forEach(el => {
    if (el) el.textContent = config.emailLabel || 'Email';
  });
}

function renderLogo(elId, large) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (config.logoUrl) {
    el.innerHTML = `<img src="${config.logoUrl}" alt="Logo">`;
  } else {
    const name = config.siteName || 'Movie Search';
    const colors = ['#4285F4','#EA4335','#FBBC05','#34A853','#EA4335','#4285F4','#FBBC05','#34A853','#EA4335','#4285F4','#FBBC05','#34A853'];
    el.innerHTML = name.split('').map((c, i) => {
      if (c === ' ') return `<span style="display:inline-block;width:${large?10:6}px"></span>`;
      return `<span style="color:${colors[i%colors.length]}">${c}</span>`;
    }).join('');
  }
}

// ============================================================
// SEARCH
// ============================================================
function doSearch() {
  const query = (document.getElementById('home-input').value || document.getElementById('results-input').value).trim();
  if (!query) return;

  document.getElementById('home-page').style.display = 'none';
  document.getElementById('results-page').style.display = 'block';
  document.getElementById('results-input').value = query;

  renderWebResults(query);
  renderImages();
  renderVideos();
  renderNews();
  switchTab('web', document.querySelector('.tab-btn'));
}

function showHome() {
  document.getElementById('results-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'flex';
  document.getElementById('home-input').value = '';
}

// ============================================================
// RENDER WEB RESULTS
// ============================================================
function renderWebResults(query) {
  const container = document.getElementById('web-results-container');
  const count = (Math.floor(Math.random() * 9000) + 1000) * 1000;
  const ms = (Math.random() * 0.5 + 0.3).toFixed(2);
  document.getElementById('results-stats').textContent = `About ${count.toLocaleString()} results (${ms} seconds)`;

  container.innerHTML = config.webResults.map(r => `
    <div class="web-result">
      <div class="result-url">
        <div class="result-favicon"></div>
        <span class="breadcrumb">${r.url}</span>
      </div>
      <a class="result-title" href="https://${r.url.startsWith('www.')?r.url:'www.'+r.url}" target="_blank">${r.title}</a>
      <div class="result-snippet">
        ${r.date ? `<span class="result-date">${r.date} — </span>` : ''}${r.snippet}
      </div>
    </div>
  `).join('');
}

// ============================================================
// RENDER IMAGES
// ============================================================
function renderImages() {
  const container = document.getElementById('images-container');
  const tripled = [...config.images, ...config.images, ...config.images];
  container.innerHTML = tripled.map(img => `
    <div class="image-card">
      <img src="${img.url}" alt="${img.label}" onerror="this.style.background='#ccc'">
      <div class="img-label">${img.label}</div>
      <div class="img-source">${img.source}</div>
    </div>
  `).join('');
}

// ============================================================
// RENDER VIDEOS
// ============================================================
function renderVideos() {
  const container = document.getElementById('videos-container');
  container.innerHTML = config.videos.map(v => `
    <div class="video-result">
      <div class="video-thumb-wrap">
        <img class="video-thumb" src="${v.thumbnail}" alt="${v.title}" onerror="this.style.background='#555'">
        <div class="video-play-icon">▶</div>
      </div>
      <div class="video-info">
        <div class="video-title" onclick="window.open('${v.url}','_blank')">${v.title}</div>
        <div class="video-meta">${v.duration} · ${v.views} · ${v.date} · ${v.channel}</div>
        <div class="video-snippet">${v.snippet}</div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// RENDER NEWS
// ============================================================
function renderNews() {
  const container = document.getElementById('news-container');
  container.innerHTML = config.news.map(n => `
    <div class="news-result">
      <div class="news-text">
        <div class="news-source">${n.source}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-snippet">${n.snippet}</div>
        <div class="news-date">${n.date}</div>
      </div>
      <img class="news-img" src="${n.image}" alt="${n.title}" onerror="this.style.background='#ccc'">
    </div>
  `).join('');
}

  re.innerHTML = config.webResults.map((r, i) => `
    <div class="result-preset">
      <div class="result-preset-title">Result ${i+1}</div>
      <div class="modal-row"><label>Title</label><input type="text" id="r-title-${i}" value="${escHtml(r.title)}"></div>
      <div class="modal-row"><label>URL</label><input type="text" id="r-url-${i}" value="${escHtml(r.url)}"></div>
      <div class="modal-row"><label>Display URL / Breadcrumb</label><input type="text" id="r-durl-${i}" value="${escHtml(r.displayUrl)}"></div>
      <div class="modal-row"><label>Snippet</label><textarea id="r-snippet-${i}" rows="2">${escHtml(r.snippet)}</textarea></div>
      <div class="modal-row"><label>Date (optional)</label><input type="text" id="r-date-${i}" value="${escHtml(r.date||'')}"></div>
    </div>
  `).join('');

  // Images editor
  const ie = document.getElementById('images-presets-editor');
  ie.innerHTML = config.images.map((img, i) => `
    <div class="image-preset">
      <label>Image ${i+1} — URL</label>
      <input type="text" id="img-url-${i}" value="${escHtml(img.url)}" placeholder="https://...">
      <label style="margin-top:6px">Label</label>
      <input type="text" id="img-label-${i}" value="${escHtml(img.label)}">
      <label style="margin-top:6px">Source</label>
      <input type="text" id="img-src-${i}" value="${escHtml(img.source)}">
    </div>
  `).join('');

  // Videos editor
  const ve = document.getElementById('videos-presets-editor');
  ve.innerHTML = config.videos.map((v, i) => `
    <div class="result-preset">
      <div class="result-preset-title">Video ${i+1}</div>
      <div class="modal-row"><label>Title</label><input type="text" id="v-title-${i}" value="${escHtml(v.title)}"></div>
      <div class="modal-row"><label>URL (link when clicked)</label><input type="text" id="v-url-${i}" value="${escHtml(v.url)}"></div>
      <div class="modal-row"><label>Thumbnail URL</label><input type="text" id="v-thumb-${i}" value="${escHtml(v.thumbnail)}"></div>
      <div class="modal-row-inline">
        <div class="modal-row"><label>Channel</label><input type="text" id="v-channel-${i}" value="${escHtml(v.channel)}"></div>
        <div class="modal-row"><label>Duration</label><input type="text" id="v-duration-${i}" value="${escHtml(v.duration)}"></div>
        <div class="modal-row"><label>Views</label><input type="text" id="v-views-${i}" value="${escHtml(v.views)}"></div>
      </div>
      <div class="modal-row"><label>Snippet</label><textarea id="v-snippet-${i}" rows="2">${escHtml(v.snippet)}</textarea></div>
    </div>
  `).join('');

  // News editor
  const ne = document.getElementById('news-presets-editor');
  ne.innerHTML = config.news.map((n, i) => `
    <div class="result-preset">
      <div class="result-preset-title">Story ${i+1}</div>
      <div class="modal-row"><label>Headline</label><input type="text" id="n-title-${i}" value="${escHtml(n.title)}"></div>
      <div class="modal-row"><label>Source / Publisher</label><input type="text" id="n-source-${i}" value="${escHtml(n.source)}"></div>
      <div class="modal-row"><label>Snippet</label><textarea id="n-snippet-${i}" rows="2">${escHtml(n.snippet)}</textarea></div>
      <div class="modal-row"><label>Date</label><input type="text" id="n-date-${i}" value="${escHtml(n.date)}"></div>
      <div class="modal-row"><label>Image URL</label><input type="text" id="n-img-${i}" value="${escHtml(n.image)}"></div>
    </div>
  `).join('');
}

function saveConfig() {
  config.bgColor = document.getElementById('cfg-bg-color').value;
  config.siteName = document.getElementById('cfg-site-name').value;
  config.logoUrl = document.getElementById('cfg-logo-url').value;
  config.searchBtnText = document.getElementById('cfg-search-btn').value || 'Search';
  config.luckyBtnText = document.getElementById('cfg-lucky-btn').value || 'Try My Luck';
  config.emailLabel = document.getElementById('cfg-email-label').value || 'Email';

  config.webResults = config.webResults.map((r, i) => ({
    title: document.getElementById(`r-title-${i}`).value,
    url: document.getElementById(`r-url-${i}`).value,
    displayUrl: document.getElementById(`r-durl-${i}`).value,
    snippet: document.getElementById(`r-snippet-${i}`).value,
    date: document.getElementById(`r-date-${i}`).value
  }));

  config.images = config.images.map((img, i) => ({
    url: document.getElementById(`img-url-${i}`).value,
    label: document.getElementById(`img-label-${i}`).value,
    source: document.getElementById(`img-src-${i}`).value
  }));

  config.videos = config.videos.map((v, i) => ({
    title: document.getElementById(`v-title-${i}`).value,
    url: document.getElementById(`v-url-${i}`).value,
    thumbnail: document.getElementById(`v-thumb-${i}`).value,
    channel: document.getElementById(`v-channel-${i}`).value,
    duration: document.getElementById(`v-duration-${i}`).value,
    views: document.getElementById(`v-views-${i}`).value,
    date: v.date,
    snippet: document.getElementById(`v-snippet-${i}`).value
  }));

  config.news = config.news.map((n, i) => ({
    title: document.getElementById(`n-title-${i}`).value,
    source: document.getElementById(`n-source-${i}`).value,
    snippet: document.getElementById(`n-snippet-${i}`).value,
    date: document.getElementById(`n-date-${i}`).value,
    image: document.getElementById(`n-img-${i}`).value
  }));

  saveToStorage(config);
  applyConfig();
  closeModal();
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});


// ===== SPLASH SCREEN =====
(function() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  // Show only once per session
  if (sessionStorage.getItem('splashShown')) {
    splash.classList.add('hidden');
    return;
  }
  sessionStorage.setItem('splashShown', '1');
  // Fade in is instant (starts visible), wait 1.6s then fade out over 0.6s
  setTimeout(function() {
    splash.classList.add('fade-out');
    setTimeout(function() {
      splash.classList.add('hidden');
    }, 650);
  }, 1600);
})();


// Splash screen
(function() {
  var splash = document.getElementById('splash');
  if (!splash) return;
  if (sessionStorage.getItem('splashDone_search')) { splash.style.display='none'; return; }
  sessionStorage.setItem('splashDone_search','1');
  setTimeout(function() {
    splash.style.opacity='0';
    setTimeout(function() { splash.style.display='none'; }, 650);
  }, 1600);
})();

// Init
applyConfig();
</script>
</body>
