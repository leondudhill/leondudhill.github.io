<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipstack</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10;
  --surface: #0d1117;
  --border: #1e2030;
  --border2: #2a3040;
  --accent: #cc44ff;
  --accent2: #8800cc;
  --accent-dim: #1a0028;
  --dim: #3a4a5a;
  --text: #c8d8e8;
  --green: #39ff14;
  --orange: #ff6b35;
  --red: #ff3355;
  --yellow: #ffd700;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(180,0,255,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(100,0,200,0.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(255,255,255,0.01) 47px, rgba(255,255,255,0.01) 48px),
    repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(255,255,255,0.01) 47px, rgba(255,255,255,0.01) 48px);
  font-family: 'Share Tech Mono', monospace;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 10px 60px;
}

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0;
  animation: splashIn 0.4s ease 0.1s forwards;
}
@keyframes splashIn { to { opacity: 1; } }
#splash.out { animation: splashOut 0.4s ease forwards; }
@keyframes splashOut { to { opacity: 0; pointer-events: none; } }
.splash-by { font-size: clamp(0.95rem, 3vw, 1.2rem); font-weight: 400; color: #111; letter-spacing: 0.01em; }

/* ===== APP ===== */
.app { width: 500px; opacity:0; transform:translateY(16px); transition:opacity 0.5s,transform 0.5s; }
.app.in { opacity:1; transform:translateY(0); }

.shell {
  background: linear-gradient(160deg, #100818 0%, #080510 100%);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 20px 18px 24px;
  box-shadow: 0 0 0 1px #000, 0 60px 120px rgba(0,0,0,0.9), inset 0 1px 0 rgba(180,0,255,0.08);
  position: relative;
}
.shell::before {
  content:''; position:absolute; top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;
  background:linear-gradient(90deg,transparent,var(--accent2),var(--accent),var(--accent2),transparent);
  animation:topbar 4s ease-in-out infinite;
}
@keyframes topbar { 0%,100%{opacity:.4;} 50%{opacity:1;} }

/* ===== HEADER ===== */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.logo { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:900; letter-spacing:4px; color:var(--accent); text-shadow:0 0 20px rgba(180,0,255,0.4); }
.logo span { font-size:9px; font-weight:400; color:var(--dim); display:block; letter-spacing:3px; margin-top:2px; }
.hdr-stats { text-align:right; font-size:10px; color:var(--dim); letter-spacing:1px; }
.hdr-stats strong { color:var(--accent); font-size:13px; display:block; }

/* ===== ADD BAR ===== */
.add-section { margin-bottom:14px; }
.add-row { display:flex; gap:8px; margin-bottom:8px; }
.add-input {
  flex:1; background:#050810; border:1px solid var(--border2); color:var(--text);
  font-family:'Share Tech Mono',monospace; font-size:13px; padding:10px 12px; border-radius:3px;
  resize:none; min-height:52px; max-height:120px; overflow-y:auto;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 8px rgba(180,0,255,0.2); }
.add-input::placeholder { color:var(--dim); }

.add-btn {
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px;
  padding:0 16px; background:var(--accent-dim); border:1px solid var(--accent2);
  color:var(--accent); border-radius:3px; cursor:pointer; transition:all 0.2s;
  white-space:nowrap; min-width:80px;
}
.add-btn:hover { background:#280044; box-shadow:0 0 14px rgba(180,0,255,0.3); }
.add-btn:active { transform:scale(0.96); }

/* ===== LABEL ROW ===== */
.label-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.label-inp {
  background:#050810; border:1px solid var(--border); color:#8877aa;
  font-family:'Share Tech Mono',monospace; font-size:11px; padding:5px 8px; border-radius:2px;
  width:140px;
}
.label-inp:focus { outline:none; border-color:var(--accent); }
.label-inp::placeholder { color:var(--dim); }

.color-dots { display:flex; gap:5px; align-items:center; }
.cdot {
  width:16px; height:16px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  transition:transform 0.15s, border-color 0.15s; flex-shrink:0;
}
.cdot:hover { transform:scale(1.2); }
.cdot.sel { border-color:#fff; transform:scale(1.15); }

/* ===== SEARCH ===== */
.search-row { display:flex; gap:6px; margin-bottom:12px; align-items:center; }
.search-inp {
  flex:1; background:#050810; border:1px solid var(--border); color:var(--text);
  font-family:'Share Tech Mono',monospace; font-size:12px; padding:7px 10px; border-radius:3px;
}
.search-inp:focus { outline:none; border-color:var(--accent); }
.search-inp::placeholder { color:var(--dim); }
.sort-btn {
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
  padding:7px 10px; background:#050810; border:1px solid var(--border); color:var(--dim);
  border-radius:3px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.sort-btn.active { color:var(--accent); border-color:var(--accent); }
.count-badge { font-size:9px; color:var(--dim); letter-spacing:1px; white-space:nowrap; }

/* ===== STACK ===== */
.stack { display:flex; flex-direction:column; gap:6px; min-height:60px; }
.empty-msg { text-align:center; padding:40px; font-size:11px; color:var(--dim); letter-spacing:2px; border:1px dashed var(--border); border-radius:4px; }

/* ===== CLIP CARD ===== */
.clip {
  background:#08080f; border:1px solid var(--border);
  border-radius:4px; padding:12px 14px; cursor:pointer;
  transition:all 0.18s; position:relative; overflow:hidden;
  border-left:3px solid var(--border);
}
.clip::before { content:''; position:absolute; top:0;left:0;right:0;height:1px; background:transparent; transition:background 0.2s; }
.clip:hover { border-color:var(--border2); background:#0d0a14; }
.clip:hover::before { background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.4; }
.clip.active-clip { border-color:var(--accent) !important; background:#120a1e; box-shadow:0 0 16px rgba(180,0,255,0.15); }
.clip.active-clip::before { background:linear-gradient(90deg,transparent,var(--accent),transparent) !important; opacity:0.6 !important; }
.clip.just-copied { animation:copyFlash 0.4s ease; }
@keyframes copyFlash { 0%{background:#1a0030;} 50%{background:#220040;} 100%{background:#120a1e;} }

.clip-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:6px; }
.clip-label {
  font-size:9px; letter-spacing:2px; color:var(--dim); flex-shrink:0;
  padding:2px 6px; border-radius:2px; border:1px solid var(--border);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px;
}
.clip-label.has-label { color:var(--accent); border-color:var(--accent2); }
.clip-meta { font-size:9px; color:var(--dim); letter-spacing:1px; margin-left:auto; white-space:nowrap; flex-shrink:0; }
.clip-text {
  font-size:13px; color:var(--text); line-height:1.5; word-break:break-word;
  white-space:pre-wrap; max-height:80px; overflow:hidden;
  mask-image:linear-gradient(to bottom,#fff 60%,transparent 100%);
}
.clip-text.expanded { max-height:none; mask-image:none; }

.clip-actions { display:flex; gap:5px; margin-top:8px; align-items:center; }
.ca-btn {
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
  padding:4px 8px; background:transparent; border:1px solid var(--border);
  color:var(--dim); border-radius:2px; cursor:pointer; transition:all 0.15s;
}
.ca-btn:hover { color:var(--text); border-color:var(--border2); }
.ca-btn.copy-btn { color:var(--accent); border-color:var(--accent2); }
.ca-btn.copy-btn:hover { background:var(--accent-dim); box-shadow:0 0 8px rgba(180,0,255,0.2); }
.ca-btn.del-btn:hover { color:var(--red); border-color:var(--red); }
.ca-btn.pin-btn.pinned { color:var(--yellow); border-color:#664400; }
.clip-charcount { font-size:9px; color:var(--dim); margin-left:auto; letter-spacing:1px; }
.clip-color-bar { position:absolute; left:0;top:0;bottom:0;width:3px; border-radius:4px 0 0 4px; }

/* ===== ACTIVE INDICATOR ===== */
.active-label {
  display:inline-flex; align-items:center; gap:5px;
  font-size:9px; letter-spacing:2px; color:var(--accent);
  padding:3px 8px; border:1px solid var(--accent2);
  border-radius:2px; background:var(--accent-dim);
}
.active-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }

/* ===== ACTIVE BAR ===== */
.active-bar {
  background:#05080e; border:1px solid var(--border2); border-radius:3px;
  padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:10px;
  min-height:46px;
}
.active-bar-text { font-size:12px; color:#8877aa; flex:1; word-break:break-all; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.active-bar-text.has-content { color:var(--accent); }
.paste-btn {
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px;
  padding:8px 14px; background:var(--accent-dim); border:1px solid var(--accent);
  color:var(--accent); border-radius:3px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
  text-shadow:0 0 8px rgba(180,0,255,0.4);
}
.paste-btn:hover { background:#280044; box-shadow:0 0 18px rgba(180,0,255,0.35); }
.paste-btn:active { transform:scale(0.95); }
.paste-btn.flash { background:#330055; box-shadow:0 0 24px rgba(180,0,255,0.6); }

/* ===== CATEGORY FILTER ===== */
.cat-filter { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
.cf-btn {
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
  padding:4px 9px; background:#050810; border:1px solid var(--border); color:var(--dim);
  border-radius:2px; cursor:pointer; transition:all 0.15s;
}
.cf-btn:hover { color:#8877aa; border-color:var(--border2); }
.cf-btn.active { color:var(--accent); border-color:var(--accent2); background:var(--accent-dim); }

/* ===== BOTTOM ===== */
.bottom { display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-size:9px; color:var(--dim); letter-spacing:1px; }
.bottom span { color:var(--accent); }

/* ===== TOAST ===== */
#toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(10px);
  background:#1a0028; border:1px solid var(--accent); color:var(--accent);
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  padding:8px 18px; border-radius:3px; opacity:0; transition:all 0.25s;
  box-shadow:0 0 20px rgba(180,0,255,0.3); pointer-events:none; z-index:1000;
  white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:#050810; }
::-webkit-scrollbar-thumb { background:#2a1a3a; border-radius:2px; }

/* drag handle */
.drag-handle { cursor:grab; color:var(--dim); font-size:12px; padding:0 4px; user-select:none; }
.drag-handle:active { cursor:grabbing; }
.clip.dragging { opacity:0.4; }
.clip.drag-over { border-top:2px solid var(--accent); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-by">A tool by <strong>Leon Dudhill</strong></div>
</div>

  <div class="s-name">LEON DUDHILL</div>
  <div class="s-bar"></div>
</div>

<div class="app" id="app">
<div class="shell">

  <div class="header">
    <div>
      <div class="logo">CLIPSTACK<span>CLIPBOARD MANAGER</span></div>
    </div>
    <div class="hdr-stats">
      <strong id="clipCount">0</strong>
      <span>clips stored</span>
    </div>
  </div>

  <!-- ACTIVE CLIP BAR -->
  <div class="active-bar" id="activeBar">
    <div class="active-label"><div class="active-dot"></div>ACTIVE</div>
    <div class="active-bar-text" id="activeBarText">no clip selected — click one below</div>
    <button class="paste-btn" id="pasteBtn" onclick="copyActive()">COPY</button>
  </div>

  <!-- ADD NEW -->
  <div class="add-section">
    <div class="add-row">
      <textarea class="add-input" id="addInput" placeholder="paste or type something to save..." rows="2"></textarea>
      <button class="add-btn" onclick="addClip()">+ ADD</button>
    </div>
    <div class="label-row">
      <input class="label-inp" id="labelInp" placeholder="label (optional)..." maxlength="30">
      <div class="color-dots" id="colorDots"></div>
    </div>
  </div>

  <!-- SEARCH + SORT -->
  <div class="search-row">
    <input class="search-inp" id="searchInp" placeholder="search clips..." oninput="render()">
    <button class="sort-btn" id="sortBtn" onclick="toggleSort()">DATE ↓</button>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <!-- CATEGORY FILTER -->
  <div class="cat-filter" id="catFilter"></div>

  <!-- STACK -->
  <div class="stack" id="stack">
    <div class="empty-msg">NO CLIPS YET · ADD ONE ABOVE</div>
  </div>

  <div class="bottom">
    <span id="storageInfo">localStorage</span>
    <div>CLIPSTACK · LEON DUDHILL</div>
  </div>

</div>
</div>

<div id="toast"></div>

<script>
// =====================================================================
// CONSTANTS
// =====================================================================
const STORAGE_KEY = 'clipstack_v1';
const COLORS = ['#cc44ff','#00d4ff','#39ff14','#ff6b35','#ffd700','#ff3355','#ff44aa','#8888ff'];
const COLOR_NAMES = ['purple','cyan','green','orange','yellow','red','pink','blue'];

// =====================================================================
// STATE
// =====================================================================
let clips = [];        // array of clip objects
let activeId = null;   // currently selected clip id
let sortMode = 'date'; // 'date' | 'alpha' | 'uses'
let selectedColor = COLORS[0];
let dragId = null;
let filterLabel = null;

// =====================================================================
// SPLASH
// =====================================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('app').classList.add('in');
      initColorDots();
      load();
      render();
    }, 400);
  }, 1400);
});

// =====================================================================
// STORAGE
// =====================================================================
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
    updateStorageInfo();
  } catch(e) {
    toast('⚠ Storage full');
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      clips = JSON.parse(raw);
      // migrate old clips missing fields
      clips = clips.map(c => ({
        id: c.id || uid(),
        text: c.text || '',
        label: c.label || '',
        color: c.color || COLORS[0],
        pinned: c.pinned || false,
        uses: c.uses || 0,
        created: c.created || Date.now(),
        expanded: false,
      }));
    }
    // restore active
    if (clips.length > 0) {
      const saved = localStorage.getItem('clipstack_active');
      activeId = saved && clips.find(c => c.id === saved) ? saved : clips[0].id;
    }
  } catch(e) {
    clips = [];
  }
}

function updateStorageInfo() {
  try {
    const bytes = new Blob([localStorage.getItem(STORAGE_KEY)||'']).size;
    const kb = (bytes/1024).toFixed(1);
    document.getElementById('storageInfo').textContent = `${kb} KB used`;
  } catch(e) {}
}

// =====================================================================
// CLIP OPERATIONS
// =====================================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function addClip() {
  const text = document.getElementById('addInput').value.trim();
  if (!text) { toast('nothing to add'); return; }
  const label = document.getElementById('labelInp').value.trim();
  const clip = {
    id: uid(), text, label,
    color: selectedColor, pinned: false,
    uses: 0, created: Date.now(), expanded: false,
  };
  clips.unshift(clip);
  activeId = clip.id;
  localStorage.setItem('clipstack_active', activeId);
  save();
  document.getElementById('addInput').value = '';
  document.getElementById('labelInp').value = '';
  render();
  toast('clip added');
}

function deleteClip(id) {
  clips = clips.filter(c => c.id !== id);
  if (activeId === id) activeId = clips[0]?.id || null;
  localStorage.setItem('clipstack_active', activeId || '');
  save();
  render();
  toast('deleted');
}

function pinClip(id) {
  const c = clips.find(c => c.id === id);
  if (c) { c.pinned = !c.pinned; save(); render(); }
}

function selectClip(id) {
  activeId = id;
  const c = clips.find(c => c.id === id);
  if (c) { c.uses++; save(); }
  localStorage.setItem('clipstack_active', id);
  copyToClipboard(c.text, false);
  render();
}

function copyActive() {
  const c = clips.find(c => c.id === activeId);
  if (!c) { toast('no active clip'); return; }
  copyToClipboard(c.text, true);
  // Flash paste btn
  const btn = document.getElementById('pasteBtn');
  btn.classList.add('flash');
  btn.textContent = 'COPIED!';
  setTimeout(() => { btn.classList.remove('flash'); btn.textContent = 'COPY'; }, 900);
}

function copyToClipboard(text, showToast) {
  navigator.clipboard.writeText(text).then(() => {
    if (showToast) toast('📋 copied to clipboard');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (showToast) toast('📋 copied to clipboard');
  });
}

function toggleExpand(id) {
  const c = clips.find(c => c.id === id);
  if (c) { c.expanded = !c.expanded; render(); }
}

function editClip(id) {
  const c = clips.find(c => c.id === id);
  if (!c) return;
  const el = document.getElementById('text-'+id);
  if (!el) return;
  el.contentEditable = 'true';
  el.style.maxHeight = 'none';
  el.style.maskImage = 'none';
  el.focus();
  // select all
  const range = document.createRange();
  range.selectNodeContents(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  el.onblur = () => {
    c.text = el.innerText;
    el.contentEditable = 'false';
    save();
    render();
    toast('saved');
  };
}

// =====================================================================
// SORT / FILTER
// =====================================================================
function toggleSort() {
  const modes = ['date','alpha','uses'];
  sortMode = modes[(modes.indexOf(sortMode)+1)%modes.length];
  const labels = {date:'DATE ↓', alpha:'A → Z', uses:'MOST USED'};
  document.getElementById('sortBtn').textContent = labels[sortMode];
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInp').value.trim().toLowerCase();
  let list = [...clips];
  if (filterLabel) list = list.filter(c => c.label === filterLabel);
  if (q) list = list.filter(c => c.text.toLowerCase().includes(q) || c.label.toLowerCase().includes(q));
  // pinned first
  const pinned = list.filter(c => c.pinned);
  const rest   = list.filter(c => !c.pinned);
  const sort = arr => {
    if (sortMode === 'alpha') return arr.sort((a,b) => a.text.localeCompare(b.text));
    if (sortMode === 'uses')  return arr.sort((a,b) => b.uses - a.uses);
    return arr.sort((a,b) => b.created - a.created);
  };
  return [...pinned, ...sort(rest)];
}

// =====================================================================
// COLOR DOTS
// =====================================================================
function initColorDots() {
  const el = document.getElementById('colorDots');
  el.innerHTML = COLORS.map((c,i) =>
    `<div class="cdot${c===selectedColor?' sel':''}" style="background:${c};" onclick="selectColor('${c}',this)" title="${COLOR_NAMES[i]}"></div>`
  ).join('');
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('sel'));
  el.classList.add('sel');
}

// =====================================================================
// RENDER
// =====================================================================
function render() {
  const filtered = getFiltered();
  const stack = document.getElementById('stack');

  // Active bar
  const active = clips.find(c => c.id === activeId);
  const abt = document.getElementById('activeBarText');
  if (active) {
    abt.textContent = active.text.length > 80 ? active.text.slice(0,80)+'…' : active.text;
    abt.classList.add('has-content');
  } else {
    abt.textContent = 'no clip selected — click one below';
    abt.classList.remove('has-content');
  }

  // Count
  document.getElementById('clipCount').textContent = clips.length;
  document.getElementById('countBadge').textContent = filtered.length !== clips.length ? `${filtered.length} of ${clips.length}` : `${clips.length} total`;

  // Category filter pills
  const labels = [...new Set(clips.map(c=>c.label).filter(Boolean))];
  const cf = document.getElementById('catFilter');
  if (labels.length > 0) {
    cf.innerHTML = `<button class="cf-btn${!filterLabel?' active':''}" onclick="setFilter(null)">ALL</button>` +
      labels.map(l => `<button class="cf-btn${filterLabel===l?' active':''}" onclick="setFilter('${l.replace(/'/g,"\\'")}')">
        ${l.toUpperCase()}</button>`).join('');
    cf.style.display = 'flex';
  } else {
    cf.style.display = 'none';
  }

  // Empty
  if (filtered.length === 0) {
    stack.innerHTML = `<div class="empty-msg">${clips.length === 0 ? 'NO CLIPS YET · ADD ONE ABOVE' : 'NO MATCHES'}</div>`;
    return;
  }

  stack.innerHTML = filtered.map(c => clipHTML(c)).join('');

  // Attach drag events
  stack.querySelectorAll('.clip').forEach(el => {
    const id = el.dataset.id;
    el.addEventListener('dragstart', e => { dragId = id; el.classList.add('dragging'); });
    el.addEventListener('dragend',   e => { dragId = null; el.classList.remove('dragging'); document.querySelectorAll('.clip').forEach(c=>c.classList.remove('drag-over')); });
    el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', e => { el.classList.remove('drag-over'); });
    el.addEventListener('drop',      e => { e.preventDefault(); el.classList.remove('drag-over'); reorder(dragId, id); });
  });

  updateStorageInfo();
}

function clipHTML(c) {
  const isActive = c.id === activeId;
  const preview = c.expanded ? c.text : (c.text.length > 200 ? c.text.slice(0,200)+'…' : c.text);
  const longText = c.text.length > 200;
  const age = timeAgo(c.created);

  return `<div class="clip${isActive?' active-clip':''}" data-id="${c.id}" draggable="true" onclick="selectClip('${c.id}')">
    <div class="clip-color-bar" style="background:${c.color};"></div>
    <div class="clip-top">
      <span class="drag-handle" onclick="event.stopPropagation()">⠿</span>
      <span class="clip-label${c.label?' has-label':''}">${c.label || 'CLIP'}</span>
      <span class="clip-meta">${age}${c.uses>0?' · '+c.uses+'× used':''}</span>
    </div>
    <div class="clip-text${c.expanded?' expanded':''}" id="text-${c.id}">${escHtml(preview)}</div>
    <div class="clip-actions" onclick="event.stopPropagation()">
      <button class="ca-btn copy-btn" onclick="selectClip('${c.id}');copyActive()">COPY</button>
      <button class="ca-btn" onclick="editClip('${c.id}')">EDIT</button>
      ${longText?`<button class="ca-btn" onclick="toggleExpand('${c.id}')">${c.expanded?'LESS':'MORE'}</button>`:''}
      <button class="ca-btn pin-btn${c.pinned?' pinned':''}" onclick="pinClip('${c.id}')">${c.pinned?'📌 PINNED':'PIN'}</button>
      <button class="ca-btn del-btn" onclick="if(confirm('delete this clip?'))deleteClip('${c.id}')">DEL</button>
      <span class="clip-charcount">${c.text.length} chars</span>
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function setFilter(label) {
  filterLabel = label;
  render();
}

// =====================================================================
// REORDER (drag and drop)
// =====================================================================
function reorder(fromId, toId) {
  if (fromId === toId) return;
  const fromIdx = clips.findIndex(c => c.id === fromId);
  const toIdx   = clips.findIndex(c => c.id === toId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [item] = clips.splice(fromIdx, 1);
  clips.splice(toIdx, 0, item);
  save();
  render();
}

// =====================================================================
// TOAST
// =====================================================================
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// =====================================================================
// KEYBOARD
// =====================================================================
document.addEventListener('keydown', e => {
  // Ctrl/Cmd + Enter = add clip
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); addClip();
  }
  // Escape = clear search
  if (e.key === 'Escape' && document.activeElement !== document.getElementById('addInput')) {
    document.getElementById('searchInp').value = ''; render();
  }
  // Arrow keys to navigate clips (when not in input)
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const filtered = getFiltered();
  const idx = filtered.findIndex(c => c.id === activeId);
  if (e.key === 'ArrowDown' && idx < filtered.length-1) {
    e.preventDefault(); selectClip(filtered[idx+1].id); render();
  }
  if (e.key === 'ArrowUp' && idx > 0) {
    e.preventDefault(); selectClip(filtered[idx-1].id); render();
  }
  if (e.key === 'c' && (e.ctrlKey||e.metaKey)) return; // let browser handle
});

// Auto-detect paste into add input
document.getElementById('addInput').addEventListener('paste', () => {
  setTimeout(() => {
    // don't auto-add, just let them review
  }, 50);
});

// Ctrl+V anywhere (outside inputs) = paste into add field
document.addEventListener('paste', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'DIV') return;
  const text = e.clipboardData.getData('text');
  if (text) {
    document.getElementById('addInput').value = text;
    document.getElementById('addInput').focus();
    toast('pasted — press + ADD or Ctrl+Enter');
  }
});
</script>
