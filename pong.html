<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,180,0.015) 2px,
      rgba(0,255,180,0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #scoreboard {
    display: flex;
    gap: 80px;
    margin-bottom: 16px;
    align-items: center;
  }

  .score {
    font-size: 64px;
    color: #fff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    letter-spacing: 4px;
  }

  .vs {
    font-size: 18px;
    color: #0ff;
    opacity: 0.5;
    letter-spacing: 6px;
  }

  #labels {
    display: flex;
    gap: 180px;
    margin-bottom: 4px;
  }

  .label {
    font-size: 11px;
    color: #0ff;
    opacity: 0.45;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  #game-wrapper {
    position: relative;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow:
      0 0 30px rgba(0,255,255,0.15),
      0 0 80px rgba(0,255,255,0.05),
      inset 0 0 30px rgba(0,0,0,0.5);
    border-radius: 2px;
  }

  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  #message h1 {
    font-size: 48px;
    color: #fff;
    text-shadow: 0 0 20px #0ff, 0 0 60px #0ff;
    letter-spacing: 12px;
    text-transform: uppercase;
  }

  #message p {
    font-size: 13px;
    color: #0ff;
    opacity: 0.7;
    letter-spacing: 4px;
    margin-top: 12px;
    animation: blink 1.2s step-start infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0; }
  }

  #controls {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(0,255,255,0.35);
    letter-spacing: 3px;
    text-align: center;
    line-height: 2;
  }

  #leon-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
  #leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}


  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(800px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 1.6000)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>

<div id="labels">
  <span class="label">Player</span>
  <span class="label">CPU</span>
</div>
<div id="scoreboard">
  <span class="score" id="p1score">0</span>
  <span class="vs">VS</span>
  <span class="score" id="p2score">0</span>
</div>

<div id="game-wrapper">
  <canvas id="c" width="800" height="500"></canvas>
  <div id="message">
    <h1>PONG</h1>
    <p>Press SPACE to start</p>
  </div>
</div>

<div id="controls">
  W / S &nbsp;·&nbsp; Move Paddle &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &nbsp;·&nbsp; Pause
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PADDLE_W = 10, PADDLE_H = 90, BALL_SIZE = 10;
const PADDLE_SPEED = 6;
let gameState = 'idle'; // idle, playing, paused, scored
let p1Score = 0, p2Score = 0;
let frameCount = 0;

const p1 = { x: 30, y: H/2 - PADDLE_H/2, dy: 0, score: 0 };
const p2 = { x: W - 30 - PADDLE_W, y: H/2 - PADDLE_H/2 };

const ball = {
  x: W/2, y: H/2,
  dx: 0, dy: 0,
  speed: 6,
  trail: []
};

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'scored') startRound();
    else if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

function resetBall(dir = 1) {
  ball.x = W/2; ball.y = H/2;
  const angle = (Math.random() * 60 - 30) * Math.PI / 180;
  ball.speed = 6;
  ball.dx = dir * ball.speed * Math.cos(angle);
  ball.dy = ball.speed * Math.sin(angle);
  ball.trail = [];
}

function startRound() {
  resetBall(Math.random() > 0.5 ? 1 : -1);
  p1.y = H/2 - PADDLE_H/2;
  p2.y = H/2 - PADDLE_H/2;
  gameState = 'playing';
  document.getElementById('message').style.display = 'none';
}

function updatePaddles() {
  if (keys['w'] || keys['W'] || keys['ArrowUp']) p1.y -= PADDLE_SPEED;
  if (keys['s'] || keys['S'] || keys['ArrowDown']) p1.y += PADDLE_SPEED;
  p1.y = Math.max(0, Math.min(H - PADDLE_H, p1.y));

  // CPU AI - tracks ball with slight lag
  const cpuCenter = p2.y + PADDLE_H / 2;
  const cpuSpeed = 5.2;
  if (ball.dx > 0) { // only move when ball coming toward CPU
    if (cpuCenter < ball.y - 10) p2.y += cpuSpeed;
    else if (cpuCenter > ball.y + 10) p2.y -= cpuSpeed;
  }
  p2.y = Math.max(0, Math.min(H - PADDLE_H, p2.y));
}

function updateBall() {
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 10) ball.trail.shift();

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Top/bottom bounce
  if (ball.y - BALL_SIZE/2 <= 0) { ball.y = BALL_SIZE/2; ball.dy *= -1; }
  if (ball.y + BALL_SIZE/2 >= H) { ball.y = H - BALL_SIZE/2; ball.dy *= -1; }

  // Paddle collision - P1
  if (ball.x - BALL_SIZE/2 <= p1.x + PADDLE_W &&
      ball.x + BALL_SIZE/2 >= p1.x &&
      ball.y >= p1.y && ball.y <= p1.y + PADDLE_H &&
      ball.dx < 0) {
    ball.x = p1.x + PADDLE_W + BALL_SIZE/2;
    const hitPos = (ball.y - (p1.y + PADDLE_H/2)) / (PADDLE_H/2);
    const angle = hitPos * 60 * Math.PI / 180;
    ball.speed = Math.min(ball.speed + 0.4, 16);
    ball.dx = ball.speed * Math.cos(angle);
    ball.dy = ball.speed * Math.sin(angle);
  }

  // Paddle collision - P2
  if (ball.x + BALL_SIZE/2 >= p2.x &&
      ball.x - BALL_SIZE/2 <= p2.x + PADDLE_W &&
      ball.y >= p2.y && ball.y <= p2.y + PADDLE_H &&
      ball.dx > 0) {
    ball.x = p2.x - BALL_SIZE/2;
    const hitPos = (ball.y - (p2.y + PADDLE_H/2)) / (PADDLE_H/2);
    const angle = hitPos * 60 * Math.PI / 180;
    ball.speed = Math.min(ball.speed + 0.4, 16);
    ball.dx = -ball.speed * Math.cos(angle);
    ball.dy = ball.speed * Math.sin(angle);
  }

  // Score
  if (ball.x < 0) {
    p2Score++;
    document.getElementById('p2score').textContent = p2Score;
    scored();
  }
  if (ball.x > W) {
    p1Score++;
    document.getElementById('p1score').textContent = p1Score;
    scored();
  }
}

function scored() {
  gameState = 'scored';
  const msg = document.getElementById('message');
  msg.style.display = 'block';
  msg.querySelector('h1').textContent = p1Score >= 7 ? 'YOU WIN!' : p2Score >= 7 ? 'CPU WINS' : 'POINT!';
  msg.querySelector('p').textContent = (p1Score >= 7 || p2Score >= 7)
    ? 'Press SPACE to play again'
    : 'Press SPACE to continue';
  if (p1Score >= 7 || p2Score >= 7) { p1Score = 0; p2Score = 0; }
}

function drawGlow(fn, color, blur) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  fn();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#020a0a';
  ctx.fillRect(0, 0, W, H);

  // Center line dashes
  ctx.setLineDash([12, 16]);
  ctx.lineWidth = 2;
  drawGlow(() => {
    ctx.strokeStyle = 'rgba(0,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
  }, '#0ff', 8);
  ctx.setLineDash([]);

  // Ball trail
  ball.trail.forEach((t, i) => {
    const alpha = (i / ball.trail.length) * 0.4;
    const size = BALL_SIZE * (i / ball.trail.length);
    ctx.fillStyle = `rgba(0,255,220,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size/2, 0, Math.PI*2);
    ctx.fill();
  });

  // Ball
  drawGlow(() => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_SIZE/2, 0, Math.PI*2);
    ctx.fill();
  }, '#0ff', 25);

  // P1 Paddle
  drawGlow(() => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(p1.x, p1.y, PADDLE_W, PADDLE_H, 3);
    ctx.fill();
  }, '#0ff', 20);

  // P2 Paddle
  drawGlow(() => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(p2.x, p2.y, PADDLE_W, PADDLE_H, 3);
    ctx.fill();
  }, '#f0f', 20);

  // Paused overlay
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.font = '32px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', W/2, H/2 - 10);
    ctx.font = '13px Share Tech Mono';
    ctx.fillText('SPACE to resume', W/2, H/2 + 26);
    ctx.shadowBlur = 0;
  }
}

function loop() {
  frameCount++;
  if (gameState === 'playing') {
    updatePaddles();
    updateBall();
  }
  draw();
  requestAnimationFrame(loop);
}

loop();

(function(){
  var s=document.getElementById('leon-splash');
  setTimeout(function(){s.style.opacity='1';},50);
  setTimeout(function(){s.style.opacity='0';},3000);
  setTimeout(function(){s.style.display='none';s.style.pointerEvents='none';},3900);
})();
</script>


<!-- overlay-tap-fix -->


<script>
// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.querySelectorAll('.ov-sub, .overlay-sub, #start-hint, .ov-sub-mobile').forEach(function(el) {
    if (el.textContent.indexOf('SPACE') !== -1 || el.textContent.indexOf('start') !== -1 || el.textContent.indexOf('again') !== -1 || el.textContent.indexOf('continue') !== -1) {
      el.textContent = el.textContent.replace('Press SPACE to start', 'Tap to start').replace('Press SPACE to play again', 'Tap to play again').replace('Press SPACE to try again', 'Tap to try again').replace('Press SPACE to continue', 'Tap to continue');
    }
  });
}

document.getElementById('message').addEventListener('touchstart', function(e) {
  e.preventDefault();
    if (gameState==='idle'||gameState==='scored') { startRound(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});
document.getElementById('c').addEventListener('touchstart', function(e) {
  e.preventDefault();
    if (gameState==='idle'||gameState==='scored') { startRound(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});

document.getElementById('c').addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;
  var t = e.touches[0];
  var rect = document.getElementById('c').getBoundingClientRect();
  var scaleY = canvas.height / rect.height;
  var relY = (t.clientY - rect.top) * scaleY;
  p1.y = relY - 90/2; p1.y = Math.max(0, Math.min(H - 90, p1.y));
}, {passive:false});

</script>
</body>
</html>
