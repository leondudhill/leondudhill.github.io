<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BOMBERMAN</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px);
}
#leon-splash{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#000;text-align:center;gap:14px;
  z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;
}
#leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;}
#leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;}
#leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}
#back-btn{
  position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;
  text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;
  border-radius:4px;z-index:10000;transition:all .2s;
}
#back-btn:hover{color:#0ff;border-color:#0ff;}
#hud{
  display:flex;justify-content:space-between;align-items:flex-end;
  width:var(--gw,480px);margin-bottom:8px;padding:0 2px;flex-shrink:0;
}
.hud-block{display:flex;flex-direction:column;gap:2px;}
.hud-block.right{align-items:flex-end;}
.hud-label{font-size:9px;letter-spacing:5px;color:rgba(0,255,255,0.4);text-transform:uppercase;}
.hud-value{font-size:30px;color:#fff;letter-spacing:3px;text-shadow:0 0 15px #0ff,0 0 35px #0ff;}
.lives-row{display:flex;gap:5px;align-items:center;}
.life-pip{width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 8px #0ff,0 0 16px #0ff;transition:all .3s;}
.life-pip.dead{background:transparent;border:1px solid rgba(0,255,255,0.2);box-shadow:none;}
#game-wrap{position:relative;flex-shrink:0;}
#gc{display:block;border:1px solid rgba(0,255,255,0.2);box-shadow:0 0 30px rgba(0,255,255,0.1),0 0 80px rgba(0,255,255,0.04);border-radius:2px;}
#overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(0,0,0,0.82);
  text-align:center;z-index:20;gap:14px;
}
#overlay h1{font-size:clamp(28px,7vw,52px);color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:10px;text-transform:uppercase;}
#overlay .sub{font-size:12px;color:#0ff;opacity:.65;letter-spacing:5px;animation:blink 1.2s step-start infinite;}
#overlay .info{font-size:11px;color:rgba(0,255,255,0.5);letter-spacing:3px;line-height:2.2;}
.result-win{color:#00ffcc;text-shadow:0 0 15px #00ffcc,0 0 40px #00ffcc;font-size:15px;letter-spacing:6px;}
.result-dead{color:#ff3366;text-shadow:0 0 15px #ff3366,0 0 40px #ff3366;font-size:15px;letter-spacing:6px;}
@keyframes blink{0%,100%{opacity:.65}50%{opacity:0}}
#info-bar{
  width:var(--gw,480px);margin-top:6px;display:flex;justify-content:space-between;
  font-size:10px;letter-spacing:3px;color:rgba(0,255,255,0.3);flex-shrink:0;
}
/* Mobile */
#dpad{display:none;position:fixed;bottom:18px;left:18px;z-index:50;touch-action:none;}
#dpad-grid{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:3px;}
.dpad-btn{
  width:54px;height:54px;background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.25);
  color:rgba(0,255,255,0.7);font-size:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;border-radius:4px;
}
.dpad-btn:active{background:rgba(0,255,255,0.2);}
#bomb-btn{
  position:fixed;bottom:28px;right:24px;width:68px;height:68px;border-radius:50%;
  background:rgba(255,51,102,0.15);border:2px solid rgba(255,51,102,0.6);
  color:#ff3366;font-size:11px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;
  display:none;align-items:center;justify-content:center;z-index:50;
  text-shadow:0 0 8px #ff3366;box-shadow:0 0 12px rgba(255,51,102,0.3);
  touch-action:none;-webkit-tap-highlight-color:transparent;cursor:pointer;
}
</style>
</head>
<body>
<div id="leon-splash">
  <div class="ls-by">A game by</div>
  <div class="ls-name"><span>Leon Dudhill</span></div>
</div>
<a href="games.html" id="back-btn">← Back</a>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="score-el">0</span>
  </div>
  <div class="hud-block" style="align-items:center">
    <span class="hud-label">Level</span>
    <span class="hud-value" id="level-el">1</span>
  </div>
  <div class="hud-block right">
    <span class="hud-label">Lives</span>
    <div class="lives-row" id="lives-el"></div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="gc"></canvas>
  <div id="overlay">
    <h1>BOMBERMAN</h1>
    <div class="info">WASD / ARROWS — MOVE<br>SPACE — DROP BOMB</div>
    <div class="sub" id="start-hint">Press SPACE to start</div>
  </div>
</div>

<div id="info-bar">
  <span id="bp-el">BLAST: ■■□□□□</span>
  <span id="bc-el">BOMBS: 1</span>
  <span id="sp-el">SPEED: ■■□□□</span>
</div>

<div id="dpad">
  <div id="dpad-grid">
    <div></div><div class="dpad-btn" id="d-up">▲</div><div></div>
    <div class="dpad-btn" id="d-left">◀</div><div></div><div class="dpad-btn" id="d-right">▶</div>
    <div></div><div class="dpad-btn" id="d-down">▼</div><div></div>
  </div>
</div>
<div id="bomb-btn">BOMB</div>

<script>
// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const COLS=13, ROWS=11;
const EMPTY=0, WALL=1, BLOCK=2;
const BOMB_FUSE = 2500; // ms
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

// ─────────────────────────────────────────
// SIZING  (call before any draw)
// ─────────────────────────────────────────
let CELL = 44;
const cv = document.getElementById('gc');
const ctx = cv.getContext('2d');

function applySize() {
  const maxW = Math.floor(Math.min(window.innerWidth * 0.98, window.innerHeight * 0.78, 600) / COLS);
  const maxH = Math.floor((window.innerHeight - 145) / ROWS);
  CELL = Math.max(26, Math.min(maxW, maxH, 52));
  const GW = COLS * CELL, GH = ROWS * CELL;
  cv.width = GW; cv.height = GH;
  cv.style.width = GW + 'px'; cv.style.height = GH + 'px';
  document.documentElement.style.setProperty('--gw', GW + 'px');
  document.getElementById('hud').style.width = GW + 'px';
  document.getElementById('info-bar').style.width = GW + 'px';
}
applySize();
window.addEventListener('resize', applySize);

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
let gameState = 'idle';
let score = 0, level = 1, lives = 3;
let grid = [];           // grid[r][c] = EMPTY/WALL/BLOCK
let player = null;
let enemies = [];
let bombs = [];          // {x,y,col,row,explodeAt,power,owner}
let fires = [];          // {col,row,dieAt}
let particles = [];
let powerups = [];
let lastTs = 0;

// ─────────────────────────────────────────
// GRID
// ─────────────────────────────────────────
function buildGrid(lvl) {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = new Array(COLS).fill(EMPTY);
    for (let c = 0; c < COLS; c++) {
      // border + pillar pattern
      if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) { grid[r][c] = WALL; continue; }
      if (r % 2 === 0 && c % 2 === 0) { grid[r][c] = WALL; continue; }
    }
  }
  // Breakable blocks — keep spawn safe
  const safe = new Set(['1,1','1,2','2,1','1,3','3,1']);
  const density = Math.min(0.42 + (lvl - 1) * 0.04, 0.62);
  for (let r = 1; r < ROWS-1; r++) {
    for (let c = 1; c < COLS-1; c++) {
      if (grid[r][c] === WALL) continue;
      if (safe.has(`${r},${c}`)) continue;
      if (Math.random() < density) grid[r][c] = BLOCK;
    }
  }
}

function cellWalkable(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
  return grid[r][c] === EMPTY;
}

function bombAt(r, c) {
  return bombs.some(b => b.row === r && b.col === c);
}

// ─────────────────────────────────────────
// PLAYER  — grid-locked, one cell at a time
// ─────────────────────────────────────────
// Movement model: player slides smoothly between cells but is always
// moving toward exactly one target cell. A new move can only begin once
// the current slide is complete. This gives true Bomberman feel.

const PLAYER_MOVE_MS = 160; // ms to cross one cell

function mkPlayer() {
  return {
    col: 1, row: 1,
    x: 1 * CELL + CELL / 2,
    y: 1 * CELL + CELL / 2,
    // target cell (same as col/row when idle)
    tCol: 1, tRow: 1,
    moving: false,   // currently sliding to tCol/tRow?
    moveProgress: 0, // 0→1 progress of current slide
    moveSpeed: 1 / PLAYER_MOVE_MS, // fraction per ms
    startX: 0, startY: 0, // pixel origin of current slide
    maxBombs: 1,
    power: 2,
    placed: 0,
    alive: true,
    invince: 0,
    animT: 0,
  };
}

const DIRS4 = [[1,0],[0,1],[-1,0],[0,-1]];

// ─────────────────────────────────────────
// ENEMIES
// ─────────────────────────────────────────
function mkEnemy(col, row, type) {
  return {
    col, row,
    x: col * CELL + CELL/2,
    y: row * CELL + CELL/2,
    type,
    // Grid-locked movement (same slide system as player)
    tCol: col, tRow: row,
    moving: false,
    moveProgress: 0,
    moveSpeed: type === 1 ? 1/440 : 1/640, // fraction per ms
    startX: col * CELL + CELL/2,
    startY: row * CELL + CELL/2,
    alive: true,
    animT: Math.random() * 100,
    dirTimer: 0,
    dirDelay: type === 0 ? 0 : 0, // pick new dir immediately after each step
    bombTimer: type === 2 ? 3000 : 0,
  };
}

function placeEnemies(lvl) {
  enemies = [];
  const n = Math.min(2 + Math.floor(lvl * 1.4), 8);
  const spawns = [
    [COLS-2, ROWS-2],[COLS-2, 1],[1, ROWS-2],
    [COLS-3, ROWS-2],[COLS-2, ROWS-3],[COLS-4, 1],[1, ROWS-3],[COLS-3,1]
  ];
  let placed = 0;
  for (const [ec, er] of spawns) {
    if (placed >= n) break;
    if (grid[er] && grid[er][ec] === EMPTY) {
      const type = placed < 2 ? 0 : placed < 5 ? 1 : 2;
      enemies.push(mkEnemy(ec, er, type));
      placed++;
    }
  }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.animT += dt;

    if (e.moving) {
      e.moveProgress = Math.min(1, e.moveProgress + e.moveSpeed * dt);
      const tx = e.tCol * CELL + CELL/2;
      const ty = e.tRow * CELL + CELL/2;
      e.x = e.startX + (tx - e.startX) * e.moveProgress;
      e.y = e.startY + (ty - e.startY) * e.moveProgress;
      if (e.moveProgress >= 1) {
        e.col = e.tCol; e.row = e.tRow;
        e.x = tx; e.y = ty;
        e.moving = false;
      }
    }

    // Pick next cell when idle
    if (!e.moving) {
      pickEnemyStep(e);
    }

    // Bomber drops bombs
    if (e.type === 2) {
      e.bombTimer -= dt;
      if (e.bombTimer <= 0) {
        e.bombTimer = 3500 + Math.random() * 2000;
        if (!bombAt(e.row, e.col)) {
          bombs.push({ col: e.col, row: e.col, x: e.x, y: e.y,
            explodeAt: performance.now() + BOMB_FUSE, power: 2, owner: 'enemy' });
        }
      }
    }

    // Kill player on contact (grid cell match is enough given grid-lock)
    if (player && player.alive && player.invince <= 0) {
      if (e.col === player.col && e.row === player.row) hurtPlayer();
      // Also pixel proximity for mid-slide collisions
      else {
        const ddx = Math.abs(e.x - player.x), ddy = Math.abs(e.y - player.y);
        if (ddx < CELL * 0.55 && ddy < CELL * 0.55) hurtPlayer();
      }
    }
  }
}

function pickEnemyStep(e) {
  if (!player) return;
  // Try to move toward player; prefer axis with greater distance
  const pdx = player.col - e.col, pdy = player.row - e.row;
  const tryH = pdx !== 0 ? [Math.sign(pdx), 0] : null;
  const tryV = pdy !== 0 ? [0, Math.sign(pdy)] : null;

  let preferred = [];
  if (Math.abs(pdx) >= Math.abs(pdy)) {
    if (tryH) preferred.push(tryH);
    if (tryV) preferred.push(tryV);
  } else {
    if (tryV) preferred.push(tryV);
    if (tryH) preferred.push(tryH);
  }
  // Add shuffled fallbacks
  const fallback = DIRS4.slice().sort(() => Math.random() - .5);
  for (const d of fallback) if (!preferred.some(p => p[0]===d[0]&&p[1]===d[1])) preferred.push(d);

  for (const [dc, dr] of preferred) {
    const nc = e.col + dc, nr = e.row + dr;
    if (cellWalkable(nr, nc)) {
      e.tCol = nc; e.tRow = nr;
      e.startX = e.x; e.startY = e.y;
      e.moveProgress = 0; e.moving = true;
      return;
    }
  }
  // Truly stuck — stay put
}

// ─────────────────────────────────────────
// BOMBS & FIRE
// ─────────────────────────────────────────
function placeBomb() {
  if (!player || !player.alive) return;
  if (player.placed >= player.maxBombs) return;
  if (bombAt(player.row, player.col)) return;
  player.placed++;
  bombs.push({
    col: player.col, row: player.row,
    x: player.col * CELL + CELL/2,
    y: player.row * CELL + CELL/2,
    explodeAt: performance.now() + BOMB_FUSE,
    power: player.power,
    owner: 'player'
  });
}

function updateBombs(now) {
  for (let i = bombs.length - 1; i >= 0; i--) {
    if (now >= bombs[i].explodeAt) {
      triggerExplosion(i);
    }
  }
}

function triggerExplosion(idx) {
  const b = bombs[idx];
  bombs.splice(idx, 1);
  if (b.owner === 'player') player.placed = Math.max(0, player.placed - 1);

  const now = performance.now();
  const fireDur = 700;
  addFire(b.row, b.col, now + fireDur);

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dc, dr] of dirs) {
    for (let n = 1; n <= b.power; n++) {
      const r = b.row + dr * n, c = b.col + dc * n;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
      if (grid[r][c] === WALL) break;
      addFire(r, c, now + fireDur);
      if (grid[r][c] === BLOCK) {
        grid[r][c] = EMPTY;
        spawnPowerup(c, r);
        burst(c * CELL + CELL/2, r * CELL + CELL/2, '#00ff88', 8);
        break;
      }
      // chain reaction: detonate any bomb in path
      const bi = bombs.findIndex(x => x.col === c && x.row === r);
      if (bi !== -1) triggerExplosion(bi < idx ? bi : bi - 1);
    }
  }
}

function addFire(r, c, dieAt) {
  // Avoid duplicate fire tiles
  const existing = fires.find(f => f.row === r && f.col === c);
  if (existing) { existing.dieAt = Math.max(existing.dieAt, dieAt); return; }
  fires.push({ row: r, col: c, dieAt });

  // Kill enemies in fire
  for (const e of enemies) {
    if (e.alive && e.row === r && e.col === c) {
      e.alive = false;
      score += 100 * level;
      burst(c * CELL + CELL/2, r * CELL + CELL/2, '#ff3366', 12);
      updateHUD();
    }
  }
  // Hurt player
  if (player && player.alive && player.invince <= 0 && player.row === r && player.col === c) {
    hurtPlayer();
  }
  // Destroy powerup
  for (const pu of powerups) {
    if (pu.alive && pu.row === r && pu.col === c) pu.alive = false;
  }
}

function updateFires(now) {
  for (let i = fires.length - 1; i >= 0; i--) {
    if (now >= fires[i].dieAt) fires.splice(i, 1);
  }
}

// ─────────────────────────────────────────
// POWERUPS
// ─────────────────────────────────────────
const PU_TYPES = ['BLAST', 'BOMB', 'SPEED'];
function spawnPowerup(col, row) {
  if (Math.random() > 0.3) return;
  powerups.push({ col, row, type: PU_TYPES[Math.floor(Math.random() * 3)], alive: true, t: 0 });
}

function updatePowerups(dt) {
  for (const pu of powerups) {
    if (!pu.alive) continue;
    pu.t += dt;
    if (!player || !player.alive) continue;
    if (pu.col === player.col && pu.row === player.row) {
      pu.alive = false;
      applyPowerup(pu.type);
    }
  }
  powerups = powerups.filter(p => p.alive);
}

function applyPowerup(type) {
  if (type === 'BLAST') player.power = Math.min(6, player.power + 1);
  if (type === 'BOMB')  player.maxBombs = Math.min(4, player.maxBombs + 1);
  if (type === 'SPEED') player.moveSpeed = Math.min(1/60, player.moveSpeed * 1.25);
  score += 50;
  burst(player.x, player.y, '#ff00cc', 10);
  updateHUD();
}

// ─────────────────────────────────────────
// PLAYER UPDATE — grid-locked one cell at a time
// ─────────────────────────────────────────
const keys = {};
function updatePlayer(dt) {
  if (!player || !player.alive) return;
  player.animT += dt;
  if (player.invince > 0) player.invince -= dt;

  if (player.moving) {
    // Advance slide toward target cell
    player.moveProgress = Math.min(1, player.moveProgress + player.moveSpeed * dt);
    const tx = player.tCol * CELL + CELL/2;
    const ty = player.tRow * CELL + CELL/2;
    player.x = player.startX + (tx - player.startX) * player.moveProgress;
    player.y = player.startY + (ty - player.startY) * player.moveProgress;
    if (player.moveProgress >= 1) {
      player.col = player.tCol;
      player.row = player.tRow;
      player.x = tx; player.y = ty;
      player.moving = false;
    }
  }

  // Only start a new move when fully arrived at current cell
  if (!player.moving) {
    let dc = 0, dr = 0;
    if      (keys['ArrowLeft']  || keys['a'] || keys['A']) dc = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) dc =  1;
    else if (keys['ArrowUp']    || keys['w'] || keys['W']) dr = -1;
    else if (keys['ArrowDown']  || keys['s'] || keys['S']) dr =  1;

    if (dc !== 0 || dr !== 0) {
      const nc = player.col + dc, nr = player.row + dr;
      if (cellWalkable(nr, nc) && !bombAt(nr, nc)) {
        player.tCol = nc; player.tRow = nr;
        player.startX = player.x; player.startY = player.y;
        player.moveProgress = 0;
        player.moving = true;
      }
    }
  }

  // Fire damage — check grid cell
  if (player.invince <= 0) {
    if (fires.some(f => f.row === player.row && f.col === player.col)) hurtPlayer();
  }
}

function hurtPlayer() {
  if (!player || player.invince > 0) return;
  player.invince = 2500;
  lives--;
  burst(player.x, player.y, '#00ffcc', 16);
  updateHUD();
  if (lives <= 0) {
    gameState = 'gameover';
    player.alive = false;
    setTimeout(() => showOverlay('GAME OVER', 'dead', 'Space / tap to retry'), 900);
  }
}

// ─────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────
function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, col, r: 1.5 + Math.random()*2 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.003 * dt;
    p.life -= dt / 600;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─────────────────────────────────────────
// WIN CHECK
// ─────────────────────────────────────────
function checkWin() {
  if (enemies.every(e => !e.alive)) {
    gameState = 'levelclear';
    score += 500 * level;
    updateHUD();
    setTimeout(() => {
      level++;
      if (level > 10) {
        showOverlay('YOU WIN!', 'win', 'All 10 levels cleared!');
      } else {
        startLevel(level);
      }
    }, 1400);
  }
}

// ─────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────
function drawAll(now) {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020a0a';
  ctx.fillRect(0, 0, W, H);

  // Dot grid
  ctx.fillStyle = 'rgba(0,255,255,0.035)';
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.arc(c*CELL+CELL/2, r*CELL+CELL/2, 1, 0, Math.PI*2); ctx.fill();
  }

  if (!grid.length) return; // not started yet

  // Grid tiles
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = grid[r][c], x = c*CELL, y = r*CELL;
    if (t === WALL) {
      ctx.fillStyle = '#051a1a';
      ctx.fillRect(x, y, CELL, CELL);
      ctx.strokeStyle = 'rgba(0,255,255,0.14)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
    } else if (t === BLOCK) {
      ctx.fillStyle = '#0a2010';
      ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
      ctx.strokeStyle = 'rgba(0,255,100,0.28)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x+2, y+2, CELL-4, CELL-4);
      ctx.strokeStyle = 'rgba(0,255,100,0.09)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+5,y+5); ctx.lineTo(x+CELL-5,y+CELL-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+CELL-5,y+5); ctx.lineTo(x+5,y+CELL-5); ctx.stroke();
    }
  }

  // Fire
  for (const f of fires) {
    const age = 1 - Math.max(0, (f.dieAt - now) / 700);
    const fade = 1 - age * age;
    const x = f.col * CELL, y = f.row * CELL;
    ctx.save();
    ctx.globalAlpha = fade * 0.85;
    ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(x+2, y+2, CELL-4, CELL-4);
    ctx.globalAlpha = fade * 0.9;
    ctx.fillStyle = '#ffcc00';
    const s = (CELL-10) * (0.5 + 0.5 * Math.sin(now * 0.03 + f.col + f.row));
    ctx.fillRect(x+(CELL-s)/2, y+(CELL-s)/2, s, s);
    ctx.globalAlpha = fade * 0.7;
    ctx.fillStyle = '#ffffff';
    const s2 = s * 0.45;
    ctx.fillRect(x+(CELL-s2)/2, y+(CELL-s2)/2, s2, s2);
    ctx.restore();
  }

  // Powerups
  for (const pu of powerups) {
    if (!pu.alive) continue;
    const x = pu.col*CELL+CELL/2, y = pu.row*CELL+CELL/2;
    const bob = Math.sin(pu.t * 0.004) * 3;
    ctx.save();
    ctx.shadowColor = '#ff00cc'; ctx.shadowBlur = 14;
    ctx.fillStyle = 'rgba(255,0,204,0.12)';
    ctx.beginPath(); ctx.arc(x, y+bob, CELL*0.36, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ff00cc'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y+bob, CELL*0.36, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#ff00cc';
    ctx.font = `bold ${Math.round(CELL*0.28)}px Share Tech Mono`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pu.type === 'BLAST' ? '+B' : pu.type === 'BOMB' ? '+X' : '+S', x, y+bob);
    ctx.restore();
  }

  // Bombs
  for (const b of bombs) {
    const timeLeft = b.explodeAt - now;
    const frac = timeLeft / BOMB_FUSE; // 1→0
    const pulse = 0.75 + 0.25 * Math.sin(now * (0.008 + (1-frac)*0.04));
    const rad = CELL * 0.3 * pulse;
    ctx.save();
    ctx.shadowColor = frac < 0.3 ? '#ff4400' : '#ffff00'; ctx.shadowBlur = 18;
    ctx.fillStyle = frac < 0.3 ? '#ff6600' : '#eecc00';
    ctx.beginPath(); ctx.arc(b.x, b.y, rad, 0, Math.PI*2); ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(b.x - rad*0.25, b.y - rad*0.3, rad*0.3, 0, Math.PI*2); ctx.fill();
    // Fuse
    ctx.strokeStyle = 'rgba(255,180,0,0.9)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - rad);
    ctx.quadraticCurveTo(b.x + CELL*0.2, b.y - rad - CELL*0.18, b.x + CELL*0.14, b.y - rad - CELL*0.3);
    ctx.stroke();
    // Spark
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(b.x + CELL*0.14, b.y - rad - CELL*0.3, 2.5*pulse, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const col = e.type===0 ? '#ff3366' : e.type===1 ? '#ff8800' : '#cc00ff';
    const colL = e.type===0 ? '#ff88aa' : e.type===1 ? '#ffcc44' : '#ee66ff';
    const bob = Math.sin(e.animT * 0.008) * CELL * 0.07;
    const rad = CELL * 0.33;
    ctx.save();
    ctx.shadowColor = col; ctx.shadowBlur = 16;
    const g = ctx.createRadialGradient(e.x-rad*.2, e.y-rad*.2, rad*.1, e.x, e.y, rad);
    g.addColorStop(0, colL); g.addColorStop(1, col);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + bob, rad, rad * (1 + Math.abs(bob)/CELL), 0, 0, Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(e.x-rad*.28, e.y-rad*.08+bob, rad*.2, rad*.24, -0.15, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(e.x+rad*.28, e.y-rad*.08+bob, rad*.2, rad*.24,  0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(e.x-rad*.26, e.y-rad*.06+bob, rad*.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x+rad*.28, e.y-rad*.06+bob, rad*.1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player
  if (player && player.alive) {
    // Flicker during invincibility
    if (player.invince > 0 && Math.floor(player.invince / 150) % 2 === 0) {
      // skip draw
    } else {
      const r = CELL * 0.35;
      ctx.save();
      ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 22;
      const g = ctx.createRadialGradient(player.x-r*.2, player.y-r*.25, r*.08, player.x, player.y, r);
      g.addColorStop(0, '#aaffee'); g.addColorStop(1, '#00aa88');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.fill();
      // Visor
      ctx.fillStyle = 'rgba(0,20,30,0.85)';
      ctx.beginPath(); ctx.ellipse(player.x, player.y-r*.08, r*.44, r*.27, 0, 0, Math.PI*2); ctx.fill();
      // Glint
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.ellipse(player.x-r*.12, player.y-r*.17, r*.13, r*.08, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTs, 50);
  lastTs = ts;
  const now = performance.now();

  if (gameState === 'playing') {
    updatePlayer(dt);
    updateEnemies(dt);
    updateBombs(now);
    updateFires(now);
    updatePowerups(dt);
    updateParticles(dt);
    checkWin();
  } else if (gameState === 'levelclear' || gameState === 'gameover') {
    updateParticles(dt);
  }

  drawAll(now);
}

// ─────────────────────────────────────────
// OVERLAY
// ─────────────────────────────────────────
function showOverlay(title, type, hint) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = '';
  const h = document.createElement('h1'); h.textContent = title; ov.appendChild(h);
  if (type === 'win') { const r = document.createElement('div'); r.className='result-win'; r.textContent='ALL LEVELS CLEARED'; ov.appendChild(r); }
  if (type === 'dead') { const r = document.createElement('div'); r.className='result-dead'; r.textContent='GAME OVER'; ov.appendChild(r); }
  const s = document.createElement('div'); s.className='sub'; s.textContent=hint; ov.appendChild(s);
  ov.style.display = 'flex';
}
function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

// ─────────────────────────────────────────
// START / HUD
// ─────────────────────────────────────────
function startLevel(lvl) {
  bombs = []; fires = []; particles = []; powerups = [];
  buildGrid(lvl);
  player = mkPlayer();
  placeEnemies(lvl);
  gameState = 'playing';
  hideOverlay();
  updateHUD();
}

function startGame() {
  score = 0; level = 1; lives = 3;
  startLevel(1);
}

function updateHUD() {
  document.getElementById('score-el').textContent = score;
  document.getElementById('level-el').textContent = level;
  const le = document.getElementById('lives-el');
  le.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'life-pip' + (i >= lives ? ' dead' : '');
    le.appendChild(d);
  }
  if (player) {
    const bp = player.power;
    document.getElementById('bp-el').textContent = 'BLAST: ' + '■'.repeat(bp) + '□'.repeat(Math.max(0, 6-bp));
    document.getElementById('bc-el').textContent = 'BOMBS: ' + player.maxBombs;
    const sp = Math.round((player.moveSpeed - 1/PLAYER_MOVE_MS) / (1/60 - 1/PLAYER_MOVE_MS) * 4) + 1;
    document.getElementById('sp-el').textContent = 'SPEED: ' + '■'.repeat(Math.min(5,Math.max(1,sp))) + '□'.repeat(Math.max(0,5-Math.min(5,Math.max(1,sp))));
  }
}

// ─────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'gameover') { startGame(); return; }
    if (gameState === 'playing') placeBomb();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('overlay').addEventListener('click', () => {
  if (gameState === 'idle' || gameState === 'gameover') startGame();
});
document.getElementById('overlay').addEventListener('touchend', e => {
  e.preventDefault();
  if (gameState === 'idle' || gameState === 'gameover') startGame();
}, { passive: false });

// Mobile D-pad
if (isMobile) {
  document.getElementById('dpad').style.display = 'block';
  document.getElementById('bomb-btn').style.display = 'flex';
  const dmap = { 'd-up':'ArrowUp','d-down':'ArrowDown','d-left':'ArrowLeft','d-right':'ArrowRight' };
  for (const [id, key] of Object.entries(dmap)) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, { passive: false });
    el.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
    el.addEventListener('touchcancel',() => { keys[key] = false; });
  }
  document.getElementById('bomb-btn').addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'gameover') { startGame(); return; }
    if (gameState === 'playing') placeBomb();
  }, { passive: false });
}

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
updateHUD();
requestAnimationFrame(loop);

(function(){
  const s = document.getElementById('leon-splash');
  setTimeout(() => s.style.opacity = '1', 50);
  setTimeout(() => s.style.opacity = '0', 2800);
  setTimeout(() => { s.style.display = 'none'; s.style.pointerEvents = 'none'; }, 3700);
})();
</script>
