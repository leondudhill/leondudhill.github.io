<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREAKOUT</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,180,0.012) 2px,
      rgba(0,255,180,0.012) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 800px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .hud-block { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .hud-block.right { align-items: flex-end; }

  .hud-label {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(0,255,255,0.4);
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 36px;
    color: #fff;
    text-shadow: 0 0 15px #0ff, 0 0 35px #0ff;
    letter-spacing: 3px;
  }

  .hud-lives {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .life-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #0ff, 0 0 16px #0ff;
    transition: all 0.3s;
  }
  .life-dot.dead {
    background: transparent;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: none;
  }

  #game-wrapper {
    position: relative;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow:
      0 0 30px rgba(0,255,255,0.12),
      0 0 80px rgba(0,255,255,0.04),
      inset 0 0 30px rgba(0,0,0,0.5);
    border-radius: 2px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    text-align: center;
  }

  #overlay h1 {
    font-size: 52px;
    color: #fff;
    text-shadow: 0 0 20px #0ff, 0 0 60px #0ff;
    letter-spacing: 14px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #overlay .sub {
    font-size: 13px;
    color: #0ff;
    opacity: 0.65;
    letter-spacing: 5px;
    animation: blink 1.2s step-start infinite;
  }

  #overlay .level-info {
    font-size: 15px;
    color: #0ff;
    letter-spacing: 6px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 0; }
  }

  #controls {
    margin-top: 12px;
    font-size: 11px;
    color: rgba(0,255,255,0.3);
    letter-spacing: 3px;
    text-align: center;
    line-height: 2;
    width: 800px;
  }

  #level-badge {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(0,255,255,0.4);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2px;
  }

  #leon-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;z-index:9999;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
  #leon-splash .ls-by{font-size:13px;color:rgba(0,255,255,0.5);letter-spacing:8px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name{font-size:42px;color:#fff;text-shadow:0 0 20px #0ff,0 0 60px #0ff;letter-spacing:4px;font-family:'Share Tech Mono',monospace;}
  #leon-splash .ls-name span{color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc;}

  /* ── MOBILE SCALING ── */
  @media (max-width: 900px) {
    body { padding: 50px 8px 16px !important; justify-content: flex-start !important; overflow-y: auto !important; overflow-x: hidden !important; }
    canvas { max-width: 96vw !important; height: auto !important; }
    #layout, #hud, #scoreboard, #labels, #side-left, #side-right { max-width: 96vw !important; }
  }

</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="score-display">0</span>
  </div>
  <div class="hud-block" style="align-items:center">
    <span class="hud-label" style="letter-spacing:3px">Level</span>
    <span class="hud-value" id="level-display">1</span>
  </div>
  <div class="hud-block right">
    <span class="hud-label">Lives</span>
    <div class="hud-lives" id="lives-display"></div>
  </div>
</div>

<div id="game-wrapper">
  <canvas id="c" width="800" height="540"></canvas>
  <div id="overlay">
    <h1>BREAKOUT</h1>
    <div class="sub">Press SPACE to start</div>
  </div>
</div>

<div id="controls">
  ← → or A D &nbsp;·&nbsp; Move Paddle &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &nbsp;·&nbsp; Launch / Pause
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// --- Config ---
const PADDLE_W = 100, PADDLE_H = 12, PADDLE_Y = H - 36;
const BALL_R = 7;
const BRICK_ROWS = 6, BRICK_COLS = 12;
const BRICK_W = 58, BRICK_H = 20, BRICK_GAP = 4;
const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFFSET_Y = 60;
const MAX_LIVES = 3;

// Row colors: neon palette cycling cyan→green→yellow→orange→pink→magenta
const ROW_COLORS = [
  { fill: '#ff00cc', glow: '#ff00cc', pts: 70 },
  { fill: '#ff3366', glow: '#ff3366', pts: 60 },
  { fill: '#ff9900', glow: '#ff9900', pts: 50 },
  { fill: '#ffff00', glow: '#ffff00', pts: 40 },
  { fill: '#00ff88', glow: '#00ff88', pts: 30 },
  { fill: '#00ffff', glow: '#00ffff', pts: 20 },
];

let state = 'idle'; // idle, playing, paused, dead, win, gameover
let score = 0, lives = MAX_LIVES, level = 1;
let bricks = [], particles = [];

const paddle = { x: W/2 - PADDLE_W/2, y: PADDLE_Y, w: PADDLE_W };
const ball = { x: W/2, y: PADDLE_Y - BALL_R - 2, dx: 0, dy: 0, speed: 0, onPaddle: true, trail: [] };

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'idle' || state === 'win') { level = 1; score = 0; lives = MAX_LIVES; startLevel(); }
    else if (state === 'gameover') { level = 1; score = 0; lives = MAX_LIVES; startLevel(); }
    else if (state === 'dead') startRound();
    else if (state === 'playing') {
      if (ball.onPaddle) launchBall();
      else state = 'paused';
    }
    else if (state === 'paused') state = 'playing';
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

// Mouse/touch support
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  paddle.x = mx - paddle.w / 2;
  clampPaddle();
});

function clampPaddle() {
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}

function updateLivesUI() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement('div');
    d.className = 'life-dot' + (i >= lives ? ' dead' : '');
    el.appendChild(d);
  }
}

function makeBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        color: ROW_COLORS[r],
        alive: true,
        hp: r < 2 ? 2 : 1, // top 2 rows take 2 hits
      });
    }
  }
}

function getLevelSpeed() { return 5.5 + (level - 1) * 0.7; }

function startLevel() {
  makeBricks();
  particles = [];
  paddle.w = Math.max(60, PADDLE_W - (level - 1) * 8);
  resetBall();
  state = 'playing';
  document.getElementById('level-display').textContent = level;
  document.getElementById('score-display').textContent = score;
  updateLivesUI();
  hideOverlay();
}

function startRound() {
  resetBall();
  state = 'playing';
  hideOverlay();
}

function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = PADDLE_Y - BALL_R - 2;
  ball.dx = 0; ball.dy = 0;
  ball.onPaddle = true;
  ball.trail = [];
}

function launchBall() {
  ball.speed = getLevelSpeed();
  const angle = -Math.PI/2 + (Math.random() * 0.6 - 0.3);
  ball.dx = ball.speed * Math.cos(angle);
  ball.dy = ball.speed * Math.sin(angle);
  ball.onPaddle = false;
}

function showOverlay(title, sub, levelInfo = '') {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.querySelector('h1').textContent = title;
  ov.querySelector('.sub').textContent = sub;
  let li = ov.querySelector('.level-info');
  if (!li) { li = document.createElement('div'); li.className = 'level-info'; ov.insertBefore(li, ov.querySelector('.sub')); }
  li.textContent = levelInfo;
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// --- Particles ---
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    p.dy += 0.08;
    p.life -= p.decay;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * p.life), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// --- Update ---
function update() {
  // Paddle movement
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x -= 7;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += 7;
  clampPaddle();

  if (ball.onPaddle) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = PADDLE_Y - BALL_R - 2;
    return;
  }

  // Ball trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounces
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.dx = -Math.abs(ball.dx); }
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); }

  // Paddle collision
  if (ball.dy > 0 &&
      ball.x >= paddle.x && ball.x <= paddle.x + paddle.w &&
      ball.y + BALL_R >= PADDLE_Y && ball.y + BALL_R <= PADDLE_Y + PADDLE_H + 4) {
    const hitPos = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1 to 1
    const angle = hitPos * 65 * Math.PI / 180;
    ball.dy = -ball.speed * Math.cos(angle);
    ball.dx = ball.speed * Math.sin(angle);
    ball.y = PADDLE_Y - BALL_R - 1;
  }

  // Brick collision
  let bricksLeft = 0;
  for (const b of bricks) {
    if (!b.alive) continue;
    bricksLeft++;

    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {

      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        bricksLeft--;
        score += b.color.pts * level;
        document.getElementById('score-display').textContent = score;
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color.fill, 14);
      } else {
        // damaged but alive - flash
        b.damaged = true;
        setTimeout(() => b.damaged = false, 80);
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color.fill, 5);
      }

      // Determine bounce direction
      const overlapL = (ball.x + BALL_R) - b.x;
      const overlapR = (b.x + b.w) - (ball.x - BALL_R);
      const overlapT = (ball.y + BALL_R) - b.y;
      const overlapB = (b.y + b.h) - (ball.y - BALL_R);
      const minH = Math.min(overlapL, overlapR);
      const minV = Math.min(overlapT, overlapB);
      if (minH < minV) ball.dx *= -1;
      else ball.dy *= -1;
      break;
    }
  }

  // Win level
  if (bricksLeft === 0) {
    level++;
    if (level > 5) {
      state = 'win';
      showOverlay('YOU WIN!', 'Press SPACE to play again', `Final Score: ${score}`);
    } else {
      state = 'idle';
      showOverlay(`LEVEL ${level}`, 'Press SPACE to continue', `Score: ${score}`);
      setTimeout(() => { if (state === 'idle') { startLevel(); } }, 100);
      // actually just wait for space
    }
    return;
  }

  // Ball lost
  if (ball.y - BALL_R > H) {
    lives--;
    updateLivesUI();
    if (lives <= 0) {
      state = 'gameover';
      showOverlay('GAME OVER', 'Press SPACE to try again', `Score: ${score}`);
    } else {
      state = 'dead';
      showOverlay('BALL LOST', 'Press SPACE to continue', `${lives} ${lives === 1 ? 'life' : 'lives'} remaining`);
    }
  }

  updateParticles();
}

// --- Draw ---
function drawGlow(fn, color, blur) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  fn();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020a0a';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Bricks
  bricks.forEach(b => {
    if (!b.alive) return;
    const alpha = b.damaged ? 0.4 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = b.color.glow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = b.hp > 1 ? b.color.fill : b.color.fill;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    // Inner shine
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, 5, 2);
    ctx.fill();
    // Crack for damaged bricks
    if (b.hp > 1 && !b.damaged) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w*0.3, b.y + 3);
      ctx.lineTo(b.x + b.w*0.5, b.y + b.h - 3);
      ctx.stroke();
    }
    ctx.restore();
  });

  // Ball trail
  ball.trail.forEach((t, i) => {
    const alpha = (i / ball.trail.length) * 0.35;
    const size = Math.max(0.1, BALL_R * (i / ball.trail.length));
    ctx.fillStyle = `rgba(0,255,220,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI*2);
    ctx.fill();
  });

  // Ball
  drawGlow(() => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
    ctx.fill();
  }, '#0ff', 22);

  // Paddle
  drawGlow(() => {
    const grad = ctx.createLinearGradient(paddle.x, PADDLE_Y, paddle.x + paddle.w, PADDLE_Y);
    grad.addColorStop(0, '#00ffcc');
    grad.addColorStop(0.5, '#ffffff');
    grad.addColorStop(1, '#00ffcc');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(paddle.x, PADDLE_Y, paddle.w, PADDLE_H, 4);
    ctx.fill();
  }, '#0ff', 18);

  // Particles
  drawParticles();

  // Pause overlay
  if (state === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.font = '32px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', W/2, H/2 - 10);
    ctx.font = '13px Share Tech Mono';
    ctx.fillText('SPACE to resume', W/2, H/2 + 26);
    ctx.shadowBlur = 0;
  }
}

// Main loop
function loop() {
  if (state === 'playing') update();
  draw();
  requestAnimationFrame(loop);
}

// Init
updateLivesUI();
document.getElementById('level-display').textContent = level;
loop();

(function(){
  var s=document.getElementById('leon-splash');
  setTimeout(function(){s.style.opacity='1';},50);
  setTimeout(function(){s.style.opacity='0';},3000);
  setTimeout(function(){s.style.display='none';s.style.pointerEvents='none';},3900);
})();
</script>

<script>
(function(){
  var c=document.getElementById('c');
  c.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(typeof gameState!=='undefined'){
      if(gameState==='idle'||gameState==='over'||gameState==='win'){ startGame&&startGame(); }
      else if(gameState==='paused'){ gameState='playing'; }
    }
  },{passive:false});
  c.addEventListener('touchmove',function(e){
    e.preventDefault();
    var t=e.touches[0];
    var rect=c.getBoundingClientRect();
    var scaleX=c.width/rect.width;
    var relX=(t.clientX-rect.left)*scaleX;
    if(typeof paddle!=='undefined'){ paddle.x=relX-paddle.w/2; paddle.x=Math.max(0,Math.min(c.width-paddle.w,paddle.x)); }
  },{passive:false});
})();
</script>
</body>
</html>
