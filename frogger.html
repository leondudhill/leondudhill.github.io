<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON FROGGER</title>
<link rel="icon" href="favicon.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Share Tech Mono',monospace; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px); pointer-events:none; z-index:10; }
  #hud { display:flex; justify-content:space-between; align-items:flex-end; width:560px; margin-bottom:8px; padding:0 4px; }
  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-block.right { align-items:flex-end; } .hud-block.center { align-items:center; }
  .hud-label { font-size:10px; letter-spacing:5px; color:rgba(0,255,255,0.4); text-transform:uppercase; }
  .hud-value { font-size:28px; color:#fff; text-shadow:0 0 15px #0ff,0 0 35px #0ff; letter-spacing:3px; }
  #lives-row { display:flex; gap:6px; align-items:center; margin-top:2px; }
  #game-wrapper { position:relative; }
  canvas { display:block; border:1px solid rgba(0,255,255,0.2); box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04); border-radius:2px; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); text-align:center; gap:8px; }
  #overlay h1 { font-size:48px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:10px; text-transform:uppercase; }
  #overlay h1 span { color:#00ffcc; text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc; }
  .ov-detail { font-size:12px; color:#0ff; opacity:0.6; letter-spacing:4px; }
  .ov-sub { font-size:13px; color:#0ff; opacity:0.65; letter-spacing:5px; animation:blink 1.2s step-start infinite; margin-top:10px; }
  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:0} }
  #splash { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; text-align:center; gap:16px; z-index:20; opacity:0; transition:opacity 0.8s ease; }
  #splash .splash-name { font-size:20px; color:rgba(0,255,255,0.6); letter-spacing:8px; text-transform:uppercase; }
  #splash .splash-title { font-size:44px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:4px; margin-top:8px; }
  #splash .splash-title span { color:#00ffcc; text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc; }
  #controls { margin-top:10px; font-size:11px; color:rgba(0,255,255,0.3); letter-spacing:3px; text-align:center; line-height:2; }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    body { padding: 0 !important; overflow: hidden !important; height: 100dvh !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
    #hud, #scoreboard, #labels { width: min(560px, 96vw) !important; padding: 44px 8px 4px !important; flex-shrink: 0; box-sizing: border-box; }
    #controls { display: none !important; }
    #game-wrapper { flex: 1; display: flex !important; align-items: center !important; justify-content: center !important; width: 100vw !important; min-height: 0; }
    canvas {
      width: min(96vw, calc((100dvh - 76px) * 1.0000)) !important;
      height: auto !important;
      display: block;
    }
  }
</style>
</head>
<body>
<a href="games.html" id="back-btn" style="position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,255,255,0.5);text-decoration:none;text-transform:uppercase;border:1px solid rgba(0,255,255,0.2);padding:6px 14px;border-radius:4px;z-index:10000;" onmouseover="this.style.color='#0ff';this.style.borderColor='#0ff'" onmouseout="this.style.color='rgba(0,255,255,0.5)';this.style.borderColor='rgba(0,255,255,0.2)'">← Back</a>

<div id="hud">
  <div class="hud-block"><span class="hud-label">Score</span><span class="hud-value" id="score-el">0</span></div>
  <div class="hud-block center"><span class="hud-label">Level</span><span class="hud-value" id="level-el">1</span></div>
  <div class="hud-block right"><span class="hud-label">Lives</span><div id="lives-row"></div></div>
</div>
<div id="game-wrapper">
  <canvas id="c" width="560" height="560"></canvas>
  <div id="splash">
    <div class="splash-name">A game by</div>
    <div class="splash-title"><span>Leon Dudhill</span></div>
  </div>
  <div id="overlay" style="display:none;">
    <h1>NEON <span>FROGGER</span></h1>
    <div class="ov-detail">reach the lily pads · don't get hit</div>
    <div class="ov-detail" style="color:#ffff00;opacity:0.7">ride logs · avoid cars</div>
    <div class="ov-sub">Press SPACE to start</div>
  </div>
</div>
<div id="controls">← ↑ ↓ → · Move &nbsp;|&nbsp; P · Pause</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TAU = Math.PI * 2;
const CELL = 40;
const COLS = 14, ROWS = 14;

const LANES = [
  { type:'safe',  color:'#0a2a0a' },
  { type:'water', color:'#001830', speed:1.8, dir: 1, objW:100, gap:160, objColor:'#5c3a1e' },
  { type:'water', color:'#001830', speed:2.2, dir:-1, objW:130, gap:180, objColor:'#6b4423' },
  { type:'water', color:'#001830', speed:1.5, dir: 1, objW:90,  gap:150, objColor:'#4a2e14' },
  { type:'water', color:'#001830', speed:2.6, dir:-1, objW:80,  gap:170, objColor:'#7a4d2a' },
  { type:'water', color:'#001830', speed:1.2, dir: 1, objW:150, gap:200, objColor:'#5c3a1e' },
  { type:'safe',  color:'#0a1a0a' },
  { type:'road',  color:'#111118', speed:2.0, dir:-1, objW:50,  gap:130, objColor:'#ff2222' },
  { type:'road',  color:'#111118', speed:2.8, dir: 1, objW:60,  gap:150, objColor:'#ffaa00' },
  { type:'road',  color:'#111118', speed:1.6, dir:-1, objW:55,  gap:140, objColor:'#ff66cc' },
  { type:'road',  color:'#111118', speed:3.2, dir: 1, objW:45,  gap:120, objColor:'#00ffcc' },
  { type:'road',  color:'#111118', speed:2.4, dir:-1, objW:65,  gap:160, objColor:'#ff3366' },
  { type:'safe',  color:'#0a1a0a' },
  { type:'safe',  color:'#0a2a0a' },
];

const LILY_COLS = [1, 3, 6, 9, 12];
let lilyFilled = [false,false,false,false,false];

let gameState = 'splash';
let score=0, best=0, lives=3, level=1;
let frog, laneObjs, particles, floaters;
let tick=0, deathTimer=0;
let rideObj=null;
const KEYS={};

function initObjs(){
  laneObjs=[];
  LANES.forEach((lane,row)=>{
    if(lane.type==='safe'){laneObjs.push([]);return;}
    const objs=[];
    let x=Math.random()*W;
    for(let i=0;i<6;i++){
      objs.push({x,row,w:lane.objW,h:CELL-6});
      x+=lane.objW+lane.gap+Math.random()*40;
    }
    laneObjs.push(objs);
  });
}

function resetFrog(){
  frog={col:6.5,row:13,px:0,py:0,dead:false,dir:0};
  frog.px=frog.col*CELL; frog.py=frog.row*CELL;
  rideObj=null;
}

document.addEventListener('keydown',e=>{
  if(KEYS[e.key]) return; KEYS[e.key]=true;
  if(gameState==='splash') return;
  if(e.key===' '){e.preventDefault();if(gameState==='idle'||gameState==='gameover') startGame();else if(gameState==='waiting') respawn();}
  if(e.key==='p'||e.key==='P'){if(gameState==='playing') gameState='paused';else if(gameState==='paused') gameState='playing';}
  if(gameState!=='playing') return;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();moveFrog(0,-1);}
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){e.preventDefault();moveFrog(0,1);}
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){e.preventDefault();moveFrog(-1,0);}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){e.preventDefault();moveFrog(1,0);}
});
document.addEventListener('keyup',e=>{KEYS[e.key]=false;});

function startGame(){
  score=0;lives=3;level=1;
  lilyFilled=[false,false,false,false,false];
  particles=[];floaters=[];
  initObjs();resetFrog();
  gameState='playing';hideOverlay();updateHUD();
}
function respawn(){
  particles=[];floaters=[];
  resetFrog();gameState='playing';hideOverlay();
}
function nextLevel(){
  level++;lilyFilled=[false,false,false,false,false];
  initObjs();resetFrog();updateHUD();
  addFloater(W/2,H/2,'LEVEL '+level+'!');
}
function moveFrog(dc,dr){
  if(frog.dead) return;
  const nc=frog.col+dc, nr=frog.row+dr;
  if(nc<0||nc>=COLS||nr<0||nr>13) return;
  frog.col=nc;frog.row=nr;
  frog.px=frog.col*CELL;frog.py=frog.row*CELL;
  frog.dir=dc!==0?(dc>0?1:-1):0;
  rideObj=null;
  score+=10;if(dr<0) score+=10;
  updateHUD();
  spawnParticles(frog.px+CELL/2,frog.py+CELL/2,'#00ffcc',4);
}

function update(){
  tick++;
  if(gameState==='dead'){
    deathTimer--;
    if(deathTimer<=0){
      lives--;updateHUD();
      if(lives<=0){if(score>best)best=score;gameState='gameover';showOverlay('GAME OVER','Score: '+score,'Press SPACE to try again');}
      else{gameState='waiting';showOverlay('SPLAT!',lives+(lives===1?' life':' lives')+' remaining','Press SPACE to continue');}
    }
    updateParticles();updateFloaters();return;
  }
  if(gameState!=='playing'){updateParticles();updateFloaters();return;}

  const speedMult=1+(level-1)*0.15;
  LANES.forEach((lane,row)=>{
    if(lane.type==='safe') return;
    const spd=lane.speed*speedMult;
    laneObjs[row].forEach(o=>{
      o.x+=lane.dir*spd;
      if(lane.dir>0&&o.x>W+o.w) o.x=-o.w-20;
      if(lane.dir<0&&o.x<-o.w-20) o.x=W+o.w;
    });
  });

  const fr=Math.floor(frog.row);
  if(fr>=1&&fr<=5){
    let onLog=false;
    laneObjs[fr].forEach(o=>{
      if(frog.px+CELL*0.3<o.x+o.w&&frog.px+CELL*0.7>o.x){
        onLog=true;rideObj=o;
        frog.px+=LANES[fr].dir*LANES[fr].speed*speedMult;
        frog.col=frog.px/CELL;
      }
    });
    if(!onLog){frogDie('splash');return;}
    if(frog.px<-CELL||frog.px>W){frogDie('splash');return;}
  }
  if(fr>=7&&fr<=11){
    laneObjs[fr].forEach(o=>{
      if(frog.px+CELL*0.25<o.x+o.w-4&&frog.px+CELL*0.75>o.x+4) frogDie('squish');
    });
  }
  if(fr===0){
    const lilyIdx=LILY_COLS.findIndex(lc=>Math.abs(frog.col-lc)<0.9);
    if(lilyIdx>=0&&!lilyFilled[lilyIdx]){
      lilyFilled[lilyIdx]=true;score+=200;updateHUD();
      addFloater(frog.px+CELL/2,frog.py,'+200');
      spawnParticles(frog.px+CELL/2,frog.py+CELL/2,'#00ffcc',20);
      resetFrog();
      if(lilyFilled.every(Boolean)){score+=1000;updateHUD();addFloater(W/2,H/2,'LEVEL CLEAR! +1000');setTimeout(nextLevel,1500);}
    } else {frogDie('splash');}
  }
  updateParticles();updateFloaters();
}

function frogDie(type){
  if(frog.dead||gameState==='dead') return;
  frog.dead=true;gameState='dead';deathTimer=60;
  const color=type==='splash'?'#0088ff':'#ff3333';
  spawnParticles(frog.px+CELL/2,frog.py+CELL/2,color,22);
  spawnParticles(frog.px+CELL/2,frog.py+CELL/2,'#00ff88',10);
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*TAU,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,color,life:1,decay:0.025+Math.random()*0.025,size:2+Math.random()*3});}
}
function updateParticles(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;});}
function addFloater(x,y,val){floaters.push({x,y,val,life:1});}
function updateFloaters(){floaters=floaters.filter(f=>f.life>0);floaters.forEach(f=>{f.y-=0.7;f.life-=0.018;});}

function updateHUD(){
  document.getElementById('score-el').textContent=score;
  document.getElementById('level-el').textContent=level;
  const lr=document.getElementById('lives-row');lr.innerHTML='';
  for(let i=0;i<lives;i++){const d=document.createElement('div');d.style.cssText='width:16px;height:16px;background:#00ffcc;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;box-shadow:0 0 8px #00ffcc;';lr.appendChild(d);}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  LANES.forEach((lane,row)=>{
    const y=row*CELL;
    ctx.fillStyle=lane.color;ctx.fillRect(0,y,W,CELL);
    if(lane.type==='road'){
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([20,20]);
      ctx.beginPath();ctx.moveTo(0,y+CELL/2);ctx.lineTo(W,y+CELL/2);ctx.stroke();ctx.setLineDash([]);
    }
    if(lane.type==='water'){
      ctx.fillStyle=`rgba(0,${80+Math.sin(tick*0.03+row)*20},${150+Math.sin(tick*0.04+row*0.5)*30},0.3)`;
      ctx.fillRect(0,y,W,CELL);
    }
    if(lane.type==='safe'){
      ctx.strokeStyle='rgba(0,255,204,0.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,y+CELL);ctx.lineTo(W,y+CELL);ctx.stroke();
    }
  });

  LILY_COLS.forEach((lc,i)=>{
    const x=lc*CELL+CELL/2,y=CELL/2,pulse=0.8+Math.sin(tick*0.08+i)*0.2;
    if(lilyFilled[i]){ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=16;}
    else{ctx.fillStyle=`rgba(0,${160+Math.sin(tick*0.06+i)*30},80,0.8)`;ctx.shadowColor='#00cc44';ctx.shadowBlur=8*pulse;}
    ctx.beginPath();ctx.ellipse(x,y,CELL*0.42,CELL*0.32,0,0,TAU);ctx.fill();
    if(!lilyFilled[i]){
      ctx.strokeStyle='rgba(0,255,100,0.3)';ctx.lineWidth=1;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(x,y-CELL*0.3);ctx.lineTo(x,y+CELL*0.3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-CELL*0.3,y);ctx.lineTo(x+CELL*0.3,y);ctx.stroke();
    }
    ctx.shadowBlur=0;
  });

  LANES.forEach((lane,row)=>{
    if(lane.type==='safe') return;
    const y=row*CELL;
    laneObjs[row].forEach(o=>{
      if(lane.type==='water'){
        ctx.fillStyle=lane.objColor;ctx.shadowColor=lane.objColor;ctx.shadowBlur=6;
        ctx.beginPath();ctx.roundRect(o.x,y+3,o.w,o.h,8);ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5;ctx.shadowBlur=0;
        for(let lx=o.x+15;lx<o.x+o.w-10;lx+=18){ctx.beginPath();ctx.moveTo(lx,y+5);ctx.lineTo(lx,y+CELL-5);ctx.stroke();}
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath();ctx.ellipse(o.x+6,y+CELL/2,4,CELL/2-5,0,0,TAU);ctx.fill();
        ctx.beginPath();ctx.ellipse(o.x+o.w-6,y+CELL/2,4,CELL/2-5,0,0,TAU);ctx.fill();
      } else {
        ctx.fillStyle=lane.objColor;ctx.shadowColor=lane.objColor;ctx.shadowBlur=14;
        ctx.beginPath();ctx.roundRect(o.x,y+5,o.w,o.h,5);ctx.fill();
        ctx.fillStyle='rgba(200,240,255,0.3)';ctx.shadowBlur=0;
        ctx.beginPath();ctx.roundRect(o.x+o.w*0.2,y+8,o.w*0.6,o.h*0.45,3);ctx.fill();
        ctx.fillStyle='#ffffaa';ctx.shadowColor='#ffffaa';ctx.shadowBlur=8;
        const hx=LANES[row].dir>0?o.x+o.w-8:o.x+2;
        ctx.fillRect(hx,y+8,5,5);ctx.fillRect(hx,y+o.h-2,5,5);
        ctx.shadowBlur=0;
      }
    });
  });

  particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,TAU);ctx.fill();ctx.restore();});

  if(gameState==='playing'||gameState==='dead') drawFrog();

  floaters.forEach(f=>{ctx.save();ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle='#fff';ctx.shadowColor='#0ff';ctx.shadowBlur=8;ctx.font='bold 13px Share Tech Mono';ctx.textAlign='center';ctx.fillText(f.val,f.x,f.y);ctx.restore();});

  if(gameState==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.shadowColor='#0ff';ctx.shadowBlur=20;
    ctx.font='32px Share Tech Mono';ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font='13px Share Tech Mono';ctx.fillText('P to resume',W/2,H/2+26);
    ctx.shadowBlur=0;
  }
}

function drawFrog(){
  if(frog.dead&&Math.floor(tick/4)%2===0) return;
  const x=frog.px,y=frog.py,cx=x+CELL/2,cy=y+CELL/2,r=CELL*0.38;
  ctx.save();ctx.shadowColor='#00ffcc';ctx.shadowBlur=16;
  ctx.fillStyle='#00cc66';ctx.beginPath();ctx.ellipse(cx,cy+2,r,r*0.82,0,0,TAU);ctx.fill();
  ctx.fillStyle='#00ee77';ctx.beginPath();ctx.ellipse(cx,cy-4,r*0.7,r*0.6,0,0,TAU);ctx.fill();
  ctx.shadowBlur=8;
  [-7,7].forEach(ox=>{
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+ox,cy-8,5,0,TAU);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx+ox+0.5,cy-8,2.5,0,TAU);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+ox+1,cy-9,1,0,TAU);ctx.fill();
  });
  ctx.fillStyle='#009944';ctx.shadowBlur=0;
  ctx.beginPath();ctx.ellipse(cx-r*0.7,cy+r*0.5,r*0.35,r*0.2,-0.4,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*0.7,cy+r*0.5,r*0.35,r*0.2,0.4,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-r*0.6,cy-r*0.1,r*0.25,r*0.15,-0.8,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*0.6,cy-r*0.1,r*0.25,r*0.15,0.8,0,TAU);ctx.fill();
  ctx.restore();
}

function showOverlay(title,detail,sub){const ov=document.getElementById('overlay');ov.style.display='flex';ov.innerHTML=`<h1>${title}</h1><div class="ov-detail">${detail}</div><div class="ov-sub">${sub}</div>`;}
function hideOverlay(){document.getElementById('overlay').style.display='none';}

// Splash sequence
(function(){
  const splash=document.getElementById('splash');
  setTimeout(()=>{splash.style.opacity='1';},50);
  setTimeout(()=>{splash.style.opacity='0';},3000);
  setTimeout(()=>{splash.style.display='none';document.getElementById('overlay').style.display='flex';gameState='idle';},3900);
})();

// Mobile touch swipe controls
(function(){
  const c=document.getElementById('c');
  let sx,sy;
  // Tap overlay to start
  document.getElementById('overlay').addEventListener('touchstart',function(e){
    e.preventDefault();
    if(gameState==='idle'||gameState==='gameover') startGame();
    else if(gameState==='waiting') respawn();
  },{passive:false});
  c.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(gameState==='idle'||gameState==='gameover'){startGame();return;}
    if(gameState==='waiting'){respawn();return;}
    if(gameState==='paused'){gameState='playing';return;}
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;
  },{passive:false});
  c.addEventListener('touchend',function(e){
    e.preventDefault();
    if(gameState!=='playing') return;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)<8&&Math.abs(dy)<8) return;
    if(Math.abs(dx)>Math.abs(dy)){moveFrog(dx>0?1:-1,0);}
    else{moveFrog(0,dy>0?1:-1);}
  },{passive:false});
})();

particles=[];floaters=[];
laneObjs=LANES.map(()=>[]);
resetFrog();updateHUD();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

<script>
// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.querySelectorAll('.ov-sub, .overlay-sub, #start-hint, .ov-sub-mobile').forEach(function(el) {
    if (el.textContent.indexOf('SPACE') !== -1 || el.textContent.indexOf('start') !== -1 || el.textContent.indexOf('again') !== -1 || el.textContent.indexOf('continue') !== -1) {
      el.textContent = el.textContent.replace('Press SPACE to start', 'Tap to start').replace('Press SPACE to play again', 'Tap to play again').replace('Press SPACE to try again', 'Tap to try again').replace('Press SPACE to continue', 'Tap to continue');
    }
  });
}

document.getElementById('overlay').addEventListener('touchstart', function(e) {
  e.preventDefault();
    if (gameState==='idle'||gameState==='gameover') { startGame(); return; }
  if (gameState==='waiting') { respawn(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});

var _sx, _sy;
document.getElementById('c').addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0]; _sx = t.clientX; _sy = t.clientY;
    if (gameState==='idle'||gameState==='gameover') { startGame(); return; }
  if (gameState==='waiting') { respawn(); return; }
  if (gameState==='paused') { gameState='playing'; return; }
}, {passive:false});
document.getElementById('c').addEventListener('touchend', function(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;
  var t = e.changedTouches[0];
  var dx = t.clientX - _sx, dy = t.clientY - _sy;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
  if (Math.abs(dx) > Math.abs(dy)) { moveFrog(dx>0?1:-1, 0); }
  else { moveFrog(0, dy>0?1:-1); }
}, {passive:false});

</script>
