<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Share Tech Mono',monospace; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,180,0.012) 2px,rgba(0,255,180,0.012) 4px); pointer-events:none; z-index:10; }
 
  /* ── LAYOUT ── */
  #layout { display:flex; gap:20px; align-items:flex-start; }
  #side-left, #side-right { display:flex; flex-direction:column; gap:16px; width:120px; padding-top:8px; }
  .panel { display:flex; flex-direction:column; gap:4px; }
  .panel-label { font-size:10px; letter-spacing:5px; color:rgba(0,255,255,0.4); text-transform:uppercase; }
  .panel-value { font-size:28px; color:#fff; text-shadow:0 0 15px #0ff,0 0 35px #0ff; letter-spacing:3px; }
  #game-wrapper { position:relative; }
  canvas { display:block; border:1px solid rgba(0,255,255,0.2); box-shadow:0 0 30px rgba(0,255,255,0.12),0 0 80px rgba(0,255,255,0.04); border-radius:2px; }
  #next-canvas { border:1px solid rgba(0,255,255,0.15); border-radius:2px; }
 
  /* ── OVERLAY ── */
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.88); text-align:center; gap:10px; }
  #overlay h1 { font-size:46px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:12px; text-transform:uppercase; }
  .ov-detail { font-size:11px; color:#0ff; opacity:0.6; letter-spacing:4px; }
  .ov-sub { font-size:12px; color:#0ff; opacity:0.65; letter-spacing:5px; animation:blink 1.2s step-start infinite; margin-top:8px; }
  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:0} }
 
  /* ── DESKTOP CONTROLS HINT ── */
  #controls { margin-top:10px; font-size:10px; color:rgba(0,255,255,0.3); letter-spacing:2px; text-align:center; line-height:2; }
 
  /* ── BACK BUTTON ── */
  #back-btn { position:fixed; top:16px; left:16px; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:rgba(0,255,255,0.5); text-decoration:none; text-transform:uppercase; border:1px solid rgba(0,255,255,0.2); padding:6px 14px; border-radius:4px; transition:color 0.2s, border-color 0.2s; z-index:100; }
  #back-btn:hover, #back-btn:active { color:#0ff; border-color:#0ff; }
 
  /* ── TOUCH D-PAD (hidden on desktop) ── */
  #touch-controls { display:none; }
 
  /* ── SPLASH ── */
  #leon-splash { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; text-align:center; gap:14px; z-index:9999; opacity:0; transition:opacity 0.8s ease; pointer-events:none; }
  #leon-splash .ls-by { font-size:13px; color:rgba(0,255,255,0.5); letter-spacing:8px; text-transform:uppercase; }
  #leon-splash .ls-name { font-size:42px; color:#fff; text-shadow:0 0 20px #0ff,0 0 60px #0ff; letter-spacing:4px; }
  #leon-splash .ls-name span { color:#00ffcc; text-shadow:0 0 20px #00ffcc,0 0 60px #00ffcc; }
 
  /* ══════════════════════════════════════
     MOBILE STYLES
  ══════════════════════════════════════ */
  @media (max-width:600px) {
    body { justify-content:flex-start; padding-top:54px; overflow-y:auto; overflow-x:hidden; }
 
    #layout { flex-direction:column; align-items:center; gap:8px; width:100vw; }
 
    /* Score row above board */
    #side-left { flex-direction:row; width:auto; gap:20px; padding-top:0; order:1; }
    .panel-value { font-size:20px; }
 
    /* Board */
    #game-wrapper { order:2; width:min(300px, 94vw); }
    #c { width:100% !important; height:auto !important; aspect-ratio:1/2; }
 
    /* Next + Best row below board */
    #side-right { flex-direction:row; width:auto; gap:20px; order:3; align-items:center; }
    #next-canvas { width:60px !important; height:60px !important; }
 
    /* Hide keyboard hint */
    #controls { display:none; }
 
    /* D-pad */
    #touch-controls {
      display:grid;
      grid-template-areas:
        ". rotate ."
        "left drop right"
        ". down .";
      gap:10px;
      margin-top:12px;
      order:4;
      padding-bottom:20px;
    }
    .tc-btn {
      width:64px; height:64px;
      background:rgba(0,255,204,0.06);
      border:1px solid rgba(0,255,204,0.25);
      border-radius:12px;
      color:#0ff;
      font-size:24px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transition:background 0.08s, border-color 0.08s;
    }
    .tc-btn:active { background:rgba(0,255,204,0.22); border-color:#0ff; box-shadow:0 0 10px rgba(0,255,204,0.3); }
    #tc-rotate { grid-area:rotate; }
    #tc-left   { grid-area:left; }
    #tc-drop   { grid-area:drop; font-size:11px; letter-spacing:1px; width:64px; height:44px; }
    #tc-right  { grid-area:right; }
    #tc-down   { grid-area:down; }
 
    /* Tap-to-start hint in overlay */
    .ov-sub-mobile { font-size:12px; color:#0ff; opacity:0.65; letter-spacing:4px; animation:blink 1.2s step-start infinite; margin-top:8px; }
  }
</style>
</head>
<body>
 
<a href="games.html" id="back-btn">← Back</a>
<div id="leon-splash"><div class="ls-by">A game by</div><div class="ls-name"><span>Leon Dudhill</span></div></div>
 
<div id="layout">
  <div id="side-left">
    <div class="panel"><span class="panel-label">Score</span><span class="panel-value" id="score-el">0</span></div>
    <div class="panel"><span class="panel-label">Level</span><span class="panel-value" id="level-el">1</span></div>
    <div class="panel"><span class="panel-label">Lines</span><span class="panel-value" id="lines-el">0</span></div>
  </div>
 
  <div id="game-wrapper">
    <canvas id="c" width="300" height="600"></canvas>
    <div id="overlay">
      <h1>TETRIS</h1>
      <div class="ov-detail" id="ov-controls-hint">← → Move &nbsp;·&nbsp; ↑ Rotate &nbsp;·&nbsp; SPACE Drop</div>
      <div class="ov-sub" id="ov-start-hint">Press SPACE to start</div>
    </div>
  </div>
 
  <div id="side-right">
    <div class="panel"><span class="panel-label">Next</span><canvas id="next-canvas" width="100" height="100"></canvas></div>
    <div class="panel"><span class="panel-label">Best</span><span class="panel-value" id="best-el">0</span></div>
  </div>
</div>
 
<div id="controls">← → Move &nbsp;|&nbsp; ↑ / Z Rotate &nbsp;|&nbsp; ↓ Soft drop &nbsp;|&nbsp; SPACE Hard drop &nbsp;|&nbsp; P Pause</div>
 
<!-- Touch D-pad (shown on mobile only via CSS) -->
<div id="touch-controls">
  <button class="tc-btn" id="tc-rotate">↻</button>
  <button class="tc-btn" id="tc-left">←</button>
  <button class="tc-btn" id="tc-drop">DROP</button>
  <button class="tc-btn" id="tc-right">→</button>
  <button class="tc-btn" id="tc-down">↓</button>
</div>
 
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const COLS = 10, ROWS = 20, CELL = 30;
 
const PIECES = {
  I: { cells:[[0,1],[1,1],[2,1],[3,1]], color:'#00ffff' },
  O: { cells:[[0,0],[1,0],[0,1],[1,1]], color:'#ffff00' },
  T: { cells:[[1,0],[0,1],[1,1],[2,1]], color:'#cc44ff' },
  S: { cells:[[1,0],[2,0],[0,1],[1,1]], color:'#00ff88' },
  Z: { cells:[[0,0],[1,0],[1,1],[2,1]], color:'#ff3366' },
  J: { cells:[[0,0],[0,1],[1,1],[2,1]], color:'#3366ff' },
  L: { cells:[[2,0],[0,1],[1,1],[2,1]], color:'#ff8800' },
};
const PIECE_KEYS = Object.keys(PIECES);
 
let state = 'idle';
let board = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
let current = null, next = null;
let score = 0, best = 0, level = 1, lines = 0;
let dropTimer = 0, dropInterval = 48;
let particles = [], floaters = [], lineClearAnim = [];
let tick = 0, lockDelay = 0;
 
const KEYS = {};
const SCORE_TABLE = [0, 100, 300, 500, 800];
 
const stars = Array.from({length:60}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.1+0.2, b:Math.random()*0.4+0.2, t:Math.random()*Math.PI*2
}));
 
// ── Detect mobile to update overlay hint ─────────────────────────────────────
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.getElementById('ov-controls-hint').textContent = 'Use the buttons below to play';
  document.getElementById('ov-start-hint').textContent = 'Tap the board to start';
}
 
// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (KEYS[e.key]) return;
  KEYS[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'idle' || state === 'gameover') { startGame(); return; }
    if (state === 'playing') hardDrop();
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
  if (state !== 'playing') return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); moveH(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); moveH(1); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); softDrop(); }
  if (e.key === 'ArrowUp' || e.key === 'z' || e.key === 'Z') { e.preventDefault(); rotate(); }
});
document.addEventListener('keyup', e => { KEYS[e.key] = false; });
 
// ── TAP CANVAS TO START ───────────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'gameover') { startGame(); }
}, { passive: false });
 
// ── SWIPE ON CANVAS ───────────────────────────────────────────────────────────
let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  swipeStartX = t.clientX; swipeStartY = t.clientY; swipeStartTime = Date.now();
}, { passive: true });
 
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = t.clientY - swipeStartY;
  const dt = Date.now() - swipeStartTime;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (dt > 400) return; // too slow = not a swipe
  if (absDx < 15 && absDy < 15) { rotate(); return; } // tiny tap = rotate
  if (absDx > absDy) {
    // Horizontal swipe
    moveH(dx > 0 ? 1 : -1);
  } else {
    // Vertical swipe
    if (dy > 30) hardDrop();
    else if (dy < -20) rotate();
  }
}, { passive: true });
 
// ── D-PAD BUTTONS ─────────────────────────────────────────────────────────────
function tcBind(id, fn) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
  btn.addEventListener('click', fn); // fallback for mouse testing
}
 
// Held left/right with repeat
let holdLeft = false, holdRight = false, holdDown = false;
let holdInterval = null;
 
function startHold(dir) {
  if (state !== 'playing') return;
  if (dir === 'l') { holdLeft = true; moveH(-1); }
  if (dir === 'r') { holdRight = true; moveH(1); }
  if (dir === 'd') { holdDown = true; softDrop(); }
  if (!holdInterval) {
    holdInterval = setInterval(() => {
      if (state !== 'playing') { stopHold(); return; }
      if (holdLeft) moveH(-1);
      if (holdRight) moveH(1);
      if (holdDown) softDrop();
    }, 80);
  }
}
function stopHold() {
  holdLeft = false; holdRight = false; holdDown = false;
  clearInterval(holdInterval); holdInterval = null;
}
 
['tc-left','tc-right','tc-down'].forEach(id => {
  const btn = document.getElementById(id);
  if (!btn) return;
  const dir = id === 'tc-left' ? 'l' : id === 'tc-right' ? 'r' : 'd';
  btn.addEventListener('touchstart', e => { e.preventDefault(); if (state === 'idle' || state === 'gameover') startGame(); else startHold(dir); }, { passive:false });
  btn.addEventListener('touchend',   e => { e.preventDefault(); stopHold(); }, { passive:false });
  btn.addEventListener('touchcancel',e => { stopHold(); }, { passive:false });
});
 
document.getElementById('tc-rotate').addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'gameover') { startGame(); return; }
  if (state === 'playing') rotate();
}, { passive: false });
 
document.getElementById('tc-drop').addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'gameover') { startGame(); return; }
  if (state === 'playing') hardDrop();
}, { passive: false });
 
// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() {
  board = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
  score = 0; level = 1; lines = 0;
  dropTimer = 0; dropInterval = 48;
  particles = []; floaters = []; lineClearAnim = [];
  next = randomPiece();
  spawnPiece();
  state = 'playing';
  hideOverlay();
  updateHUD();
}
 
function randomPiece() {
  const k = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
  const p = PIECES[k];
  return { cells: p.cells.map(c=>[...c]), color: p.color, key: k };
}
 
function spawnPiece() {
  current = next; next = randomPiece();
  const maxC = Math.max(...current.cells.map(([c])=>c));
  const offX = Math.floor((COLS - maxC - 1) / 2);
  current.cells = current.cells.map(([c,r])=>[c+offX, r]);
  current.x = 0; current.y = 0; lockDelay = 0;
  drawNext();
  if (!isValid(current.cells)) gameOver();
}
 
function gameOver() {
  if (score > best) best = score;
  state = 'gameover';
  updateHUD();
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) if(board[r][c]) board[r][c]='#ff3333';
  const restartHint = isMobile ? 'Tap to play again' : 'Press SPACE to play again';
  setTimeout(()=> showOverlay('GAME OVER', 'Score: '+score+'  ·  Best: '+best, restartHint), 600);
}
 
function moveH(dx) {
  const moved = current.cells.map(([c,r])=>[c+dx,r]);
  if (isValid(moved)) { current.cells = moved; lockDelay = 0; }
}
function softDrop() {
  const moved = current.cells.map(([c,r])=>[c,r+1]);
  if (isValid(moved)) { current.cells = moved; score++; updateHUD(); dropTimer = 0; }
  else lockPiece();
}
function hardDrop() {
  let dropped = 0;
  while (true) {
    const moved = current.cells.map(([c,r])=>[c,r+1]);
    if (isValid(moved)) { current.cells = moved; dropped++; } else break;
  }
  score += dropped * 2; updateHUD(); spawnHardDropParticles(); lockPiece();
}
function rotate() {
  const cx = current.cells.reduce((s,[c])=>s+c,0)/current.cells.length;
  const cy = current.cells.reduce((s,[,r])=>s+r,0)/current.cells.length;
  const rotated = current.cells.map(([c,r])=>[Math.round(cx+(r-cy)), Math.round(cy-(c-cx))]);
  for (const dx of [0,-1,1,-2,2]) {
    const kicked = rotated.map(([c,r])=>[c+dx,r]);
    if (isValid(kicked)) { current.cells = kicked; lockDelay=0; return; }
  }
}
function isValid(cells) { return cells.every(([c,r]) => c>=0 && c<COLS && r<ROWS && (r<0 || !board[r][c])); }
 
function lockPiece() {
  current.cells.forEach(([c,r])=>{ if(r>=0) board[r][c]=current.color; });
  spawnLockParticles(); clearLines(); spawnPiece(); dropTimer = 0;
}
function clearLines() {
  const cleared = [];
  for (let r=ROWS-1; r>=0; r--) if (board[r].every(c=>c!==null)) cleared.push(r);
  if (!cleared.length) return;
  cleared.forEach(r => lineClearAnim.push({row:r, life:1}));
  cleared.forEach(r => { board.splice(r,1); board.unshift(Array(COLS).fill(null)); });
  const pts = SCORE_TABLE[cleared.length] * level;
  score += pts; lines += cleared.length;
  level = Math.floor(lines/10)+1;
  dropInterval = Math.max(4, 48-(level-1)*4);
  updateHUD(); addFloater(W/2, H/2, '+'+pts); spawnLineClearParticles(cleared.length);
}
 
function update() {
  tick++;
  if (state !== 'playing') { updateParticles(); updateFloaters(); return; }
  if (KEYS['ArrowLeft'])  { if (tick%6===0) moveH(-1); }
  if (KEYS['ArrowRight']) { if (tick%6===0) moveH(1); }
  if (KEYS['ArrowDown'])  { if (tick%2===0) softDrop(); }
  dropTimer++;
  if (dropTimer >= dropInterval) {
    dropTimer = 0;
    const moved = current.cells.map(([c,r])=>[c,r+1]);
    if (isValid(moved)) { current.cells = moved; }
    else { lockDelay++; if (lockDelay >= 30) lockPiece(); }
  }
  lineClearAnim.forEach(a=>a.life-=0.05);
  lineClearAnim=lineClearAnim.filter(a=>a.life>0);
  updateParticles(); updateFloaters();
}
 
function spawnLockParticles() {
  current.cells.forEach(([c,r])=>{
    for(let i=0;i<2;i++){
      const a=Math.random()*Math.PI*2, s=0.5+Math.random()*2;
      particles.push({x:c*CELL+CELL/2,y:r*CELL+CELL/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,color:current.color,life:1,decay:0.05,size:2+Math.random()*2});
    }
  });
}
function spawnLineClearParticles(count) {
  for(let i=0;i<count*20;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*5;
    const colors=['#00ffff','#ffff00','#ff3366','#00ff88','#ff8800','#cc44ff'];
    particles.push({x:Math.random()*W,y:H/2+Math.random()*100-50,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,color:colors[Math.floor(Math.random()*colors.length)],life:1,decay:0.02+Math.random()*0.02,size:2+Math.random()*4});
  }
}
function spawnHardDropParticles() {
  current.cells.forEach(([c,r])=>{
    const a=-Math.PI/2+(Math.random()-0.5)*0.8, s=2+Math.random()*3;
    particles.push({x:c*CELL+CELL/2,y:r*CELL+CELL/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:current.color,life:1,decay:0.04,size:2+Math.random()*3});
  });
}
function updateParticles(){ particles=particles.filter(p=>p.life>0); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;}); }
function addFloater(x,y,val){ floaters.push({x,y,val,life:1}); }
function updateFloaters(){ floaters=floaters.filter(f=>f.life>0); floaters.forEach(f=>{f.y-=0.6;f.life-=0.02;}); }
 
function updateHUD() {
  document.getElementById('score-el').textContent = score;
  document.getElementById('level-el').textContent = level;
  document.getElementById('lines-el').textContent = lines;
  document.getElementById('best-el').textContent = best;
}
function drawNext() {
  nctx.clearRect(0,0,100,100); nctx.fillStyle='#020a0a'; nctx.fillRect(0,0,100,100);
  if (!next) return;
  const NC=18, maxC=Math.max(...next.cells.map(([c])=>c))+1, maxR=Math.max(...next.cells.map(([,r])=>r))+1;
  const offX=Math.floor((100-maxC*NC)/2), offY=Math.floor((100-maxR*NC)/2);
  next.cells.forEach(([c,r])=>{ drawCell(nctx, offX+c*NC, offY+r*NC, NC, next.color); });
}
function drawCell(c2, x, y, size, color) {
  c2.fillStyle=color; c2.shadowColor=color; c2.shadowBlur=10;
  c2.fillRect(x+1,y+1,size-2,size-2);
  c2.fillStyle='rgba(255,255,255,0.25)'; c2.fillRect(x+2,y+2,size-4,3); c2.fillRect(x+2,y+2,3,size-4);
  c2.strokeStyle='rgba(255,255,255,0.1)'; c2.lineWidth=1; c2.strokeRect(x+2,y+2,size-4,size-4);
  c2.shadowBlur=0;
}
function getGhostY() {
  let cells = current.cells.map(c=>[...c]);
  while (true) { const down=cells.map(([c,r])=>[c,r+1]); if(isValid(down)) cells=down; else break; }
  return cells;
}
function draw() {
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#020a0a'; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ const tw=0.3+Math.sin(tick*0.018+s.t)*0.15; ctx.globalAlpha=s.b*tw*1.5; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(0,255,204,0.05)'; ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]) drawCell(ctx,c*CELL,r*CELL,CELL,board[r][c]);
  lineClearAnim.forEach(a=>{ ctx.save(); ctx.globalAlpha=a.life*0.6; ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=20; ctx.fillRect(0,a.row*CELL,W,CELL); ctx.restore(); });
  if (state==='playing' && current) {
    const ghost=getGhostY();
    ghost.forEach(([c,r])=>{ if(r<0)return; ctx.strokeStyle=current.color; ctx.lineWidth=1; ctx.globalAlpha=0.25; ctx.strokeRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2); ctx.globalAlpha=1; });
    current.cells.forEach(([c,r])=>{ if(r<0)return; drawCell(ctx,c*CELL,r*CELL,CELL,current.color); });
  }
  particles.forEach(p=>{ ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2); ctx.fill(); ctx.restore(); });
  floaters.forEach(f=>{ ctx.save(); ctx.globalAlpha=Math.max(0,f.life); ctx.fillStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=8; ctx.font='bold 16px Share Tech Mono'; ctx.textAlign='center'; ctx.fillText(f.val,f.x,f.y); ctx.restore(); });
  ctx.strokeStyle='rgba(0,255,204,0.3)'; ctx.lineWidth=1.5; ctx.shadowColor='#00ffcc'; ctx.shadowBlur=8; ctx.strokeRect(0,0,W,H); ctx.shadowBlur=0;
  if(state==='paused'){ ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.shadowColor='#0ff'; ctx.shadowBlur=20; ctx.font='28px Share Tech Mono'; ctx.fillText('PAUSED',W/2,H/2-10); ctx.font='12px Share Tech Mono'; ctx.fillText(isMobile?'Tap ↻ to resume':'P to resume',W/2,H/2+22); ctx.shadowBlur=0; }
}
function showOverlay(title,detail,sub){ const ov=document.getElementById('overlay'); ov.style.display='flex'; ov.innerHTML=`<h1>${title}</h1><div class="ov-detail">${detail}</div><div class="ov-sub">${sub}</div>`; }
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }
 
updateHUD();
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
 
(function(){
  var s=document.getElementById('leon-splash');
  setTimeout(function(){s.style.opacity='1';},50);
  setTimeout(function(){s.style.opacity='0';},3000);
  setTimeout(function(){s.style.display='none';s.style.pointerEvents='none';},3900);
})();
</script>
